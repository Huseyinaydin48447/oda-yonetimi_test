<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Oda Yönetimi PRO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e1d9;
    --text:#1a1a18;--muted:#7a7a72;--accent:#1a5c3a;--accent-light:#e8f2ec;
    --accent-mid:#2d7a52;--danger:#c0392b;--danger-light:#fdf0ee;
    --amber:#b45309;--amber-light:#fef3c7;--radius:12px;--radius-sm:8px;
    --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
    --topbar-height: 60px;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x: hidden;
  }

  /* APP LAYOUT */
  .app { max-width: 450px; margin: 0 auto; min-height: 100vh; background: var(--bg); transition: max-width 0.3s; }
  .app.full-width { max-width: none; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

  /* TOPBAR */
  .topbar {
    background: var(--accent);
    height: var(--topbar-height);
    display: flex; align-items: center; gap: 10px; padding: 0 16px;
    position: sticky; top: 0; z-index: 1000;
  }
  .topbar-icon { width: 34px; height: 34px; background: rgba(255,255,255,.15); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; }
  .topbar-title-group { flex: 1; min-width: 0; }
  .topbar h1 { font-size: 16px; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar p { font-size: 11px; color: rgba(255,255,255,.65); }

  .mode-btns { display: flex; gap: 5px; }
  .mode-btn { 
    padding: 6px 12px; font-size: 11px; font-weight: 600; border-radius: 99px; 
    border: 1.5px solid rgba(255,255,255,.25); background: transparent; color: rgba(255,255,255,.7); cursor: pointer;
  }
  .mode-btn.active { background: #fff; color: var(--accent); border-color: #fff; opacity: 1; }

  /* NAV */
  .nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: var(--topbar-height); z-index: 999; }
  .nav-btn { flex: 1; padding: 12px 4px; font-size: 12px; font-weight: 600; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.15s; }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* GRID - 15x18 FULL SCREEN */
  .grid-container { flex: 1; display: flex; flex-direction: column; background: #d1d1ca; overflow: hidden; }
  .room-grid { 
    display: grid; 
    grid-template-columns: repeat(18, 1fr); 
    grid-template-rows: repeat(15, 1fr); 
    gap: 1px; 
    height: calc(100vh - var(--topbar-height)); 
    width: 100%;
  }
  .room-cell {
    background: #fff; display: flex; align-items: center; justify-content: center;
    font-size: clamp(8px, 2vw, 12px); font-weight: 700; color: #444;
    cursor: pointer; position: relative; user-select: none;
  }
  .room-cell:active { background: var(--accent-light); }
  .room-flag { position: absolute; top: 2px; right: 2px; width: 5px; height: 5px; border-radius: 50%; background: #00e5ff; box-shadow: 0 0 5px #00e5ff; }

  /* PANEL */
  .room-panel { position: fixed; inset: 0; background: #f8f9fa; z-index: 2000; display: flex; flex-direction: column; transform: translateY(100%); transition: 0.4s cubic-bezier(0, 0, 0.2, 1); }
  .room-panel.open { transform: translateY(0); }
  .panel-header { background: var(--accent); padding: 16px; display: flex; align-items: center; justify-content: space-between; color: #fff; }
  .panel-room-badge { background: #fff; color: var(--accent); padding: 4px 12px; border-radius: 6px; font-weight: 800; font-family: 'DM Mono'; font-size: 18px; }

  /* PANEL ŞIK BUTONLAR */
  .panel-menu-grid { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .menu-card {
    background: #fff; border-radius: 20px; padding: 24px; display: flex; align-items: center; gap: 20px;
    box-shadow: var(--shadow); border: 1px solid var(--border); cursor: pointer; transition: 0.2s;
  }
  .menu-card:active { transform: scale(0.96); background: #fafafa; }
  .menu-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .menu-icon.meter { background: var(--accent-light); color: var(--accent); }
  .menu-icon.plate { background: var(--amber-light); color: var(--amber); }
  .menu-text h3 { font-size: 18px; font-weight: 700; color: var(--text); }
  .menu-text p { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .menu-arrow { margin-left: auto; color: var(--border); font-size: 20px; }

  /* EKRANLAR */
  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }
  .search-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
  input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 15px; background: #fff; }
  .btn-primary { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }

  /* FOTOĞRAF ÖNİZLEME */
  .thumb-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
  .thumb-item { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-del { position: absolute; top: 2px; right: 2px; background: var(--danger); color: #fff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }

  /* KAYIT KARTLARI */
  .entry-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .entry-head { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; background: #fff; }
  .entry-head:active { background: var(--surface2); }
  .date-badge { background: var(--accent-light); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .img-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 12px; scrollbar-width: none; }
  .img-thumb-card { width: 120px; height: 90px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 9999; display: none; box-shadow: var(--shadow-lg); }
  .loader { border: 2px solid rgba(255,255,255,.3); border-top: 2px solid #fff; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9000; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  #lb-img { max-width: 100%; max-height: 100%; object-fit: contain; }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- ÜST BAR -->
  <div class="topbar">
    <div class="topbar-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div class="topbar-title-group">
      <h1 id="topbar-title">Demirbaş Takibi</h1>
      <p id="topbar-sub">Supabase Bulut Sistemi</p>
    </div>
    <div class="mode-btns">
      <button class="mode-btn" id="m-d" onclick="setMode('demirbaş')">Demirbaş</button>
      <button class="mode-btn" id="m-e" onclick="setMode('elektrik')">Sayaç</button>
    </div>
  </div>

  <!-- DEMİRBAŞ ARA YÜZÜ -->
  <div id="ui-d">
    <div class="nav">
      <button class="nav-btn" id="t-0" onclick="setTab(0)">Ara</button>
      <button class="nav-btn" id="t-1" onclick="setTab(1)">Ekle</button>
      <button class="nav-btn" id="t-2" onclick="setTab(2)">Tüm Odalar</button>
    </div>

    <!-- ARA SEKME -->
    <div class="screen" id="s-0">
      <div class="search-wrap">
        <input type="number" id="sinput" placeholder="Oda no girin (Örn: 307)" oninput="doSearch(this.value)">
      </div>
      <div id="sresult"></div>
    </div>

    <!-- EKLE SEKME -->
    <div class="screen" id="s-1">
      <div style="margin-bottom:15px">
        <label style="font-size:12px; color:var(--muted); font-weight:600">ODA NUMARASI</label>
        <input type="number" id="f-room" placeholder="307">
      </div>
      <div style="margin-bottom:15px">
        <label style="font-size:12px; color:var(--muted); font-weight:600">TARİH</label>
        <input type="date" id="f-date">
      </div>
      <div style="margin-bottom:15px">
        <label style="font-size:12px; color:var(--muted); font-weight:600">NOTLAR</label>
        <textarea id="f-note" placeholder="Açıklama ekleyin..." rows="3"></textarea>
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:12px; color:var(--muted); font-weight:600">FOTOĞRAFLAR</label>
        <input type="file" id="f-file" multiple accept="image/*" onchange="handleFiles(this.files)" style="margin-top:5px">
        <div id="f-preview" class="thumb-grid"></div>
      </div>
      <button class="btn-primary" id="btn-save" onclick="saveEntry()">KAYDI TAMAMLA</button>
    </div>

    <!-- LİSTE SEKME -->
    <div class="screen" id="s-2">
      <div id="rlist"></div>
    </div>
  </div>

  <!-- SAYAÇ GRID (FULL) -->
  <div id="ui-e" style="display:none;" class="grid-container">
    <div class="room-grid" id="egrid"></div>
  </div>
</div>

<!-- ODA PANELİ -->
<div class="room-panel" id="room-panel">
  <div class="panel-header">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="panel-room-badge" id="panel-room-title">000</div>
      <span style="font-weight:600;">Oda İşlemleri</span>
    </div>
    <div onclick="closePanel()" style="cursor:pointer; font-size:24px; padding:5px;">✕</div>
  </div>

  <div id="panel-main" class="panel-menu-grid">
    <!-- Sayaç Kartı -->
    <div class="menu-card" onclick="showSubList('elektrik')">
      <div class="menu-icon meter">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41M12 7a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5z"/></svg>
      </div>
      <div class="menu-text">
        <h3>Sayaç Göster</h3>
        <p>Elektrik okumaları ve görselleri</p>
      </div>
      <div class="menu-arrow">❯</div>
    </div>

    <!-- Plaka Kartı -->
    <div class="menu-card" onclick="showSubList('plaka')">
      <div class="menu-icon plate">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M7 10h10M7 14h5"/></svg>
      </div>
      <div class="menu-text">
        <h3>Plaka Göster</h3>
        <p>Tanımlı araç plaka kayıtları</p>
      </div>
      <div class="menu-arrow">❯</div>
    </div>
  </div>

  <div id="panel-list" style="display:none; padding:16px; flex:1; overflow-y:auto;">
    <button onclick="backToPanelMain()" style="background:var(--accent-light); border:none; color:var(--accent); font-weight:700; padding:10px 16px; border-radius:8px; margin-bottom:20px; cursor:pointer;">← ANA MENÜ</button>
    <div id="list-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="lightbox" id="lb" onclick="this.classList.remove('open')">
    <img id="lb-img" src="">
</div>

<script>
/* KONFİGÜRASYON */
const SB_URL = 'https://tpfdsmexywjnsbkfphwq.supabase.co';
const SB_KEY = 'sb_publishable_3pKKUsVjgXPlF-DCzc2ofQ_Qmq3f00L';

let currentMode = 'demirbaş';
let currentTab = 0;
let pendingFiles = [];
let roomWithEntries = new Set();

function q(id) { return document.getElementById(id); }
function showToast(m) { 
    const t = q('toast'); t.textContent = m; t.style.display = 'block'; 
    setTimeout(() => t.style.display = 'none', 2500); 
}

/* --- HAFIZA SİSTEMİ --- */
function saveState() {
    const state = {
        mode: currentMode,
        tab: currentTab,
        search: q('sinput').value,
        openRoom: q('room-panel').classList.contains('open') ? q('panel-room-title').textContent : null
    };
    localStorage.setItem('app_state_v2', JSON.stringify(state));
}

function loadState() {
    const raw = localStorage.getItem('app_state_v2');
    if (!raw) { setTab(0); return; }
    const state = JSON.parse(raw);
    
    setMode(state.mode || 'demirbaş');
    setTab(state.tab || 0);
    if (state.search) { q('sinput').value = state.search; doSearch(state.search); }
    if (state.openRoom) { openPanel(state.openRoom); }
}

/* --- MOD VE SEKME --- */
function setMode(m) {
    currentMode = m;
    const isE = (m === 'elektrik');
    q('app').classList.toggle('full-width', isE);
    q('ui-d').style.display = isE ? 'none' : 'block';
    q('ui-e').style.display = isE ? 'flex' : 'none';
    q('m-d').classList.toggle('active', !isE);
    q('m-e').classList.toggle('active', isE);
    q('topbar-title').textContent = isE ? 'Sayaç Takibi' : 'Demirbaş Takibi';
    if (isE) renderGrid();
    saveState();
}

function setTab(t) {
    currentTab = t;
    document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === t));
    document.querySelectorAll('.screen').forEach((s, i) => s.classList.toggle('active', i === `s-${t}`));
    if (t === 2) loadAllRooms();
    saveState();
}

/* --- GRID OLUŞTURMA (15x18) --- */
function renderGrid() {
    const grid = q('egrid');
    grid.innerHTML = '';
    for (let f = 1; f <= 15; f++) {
        for (let r = 1; r <= 18; r++) {
            const rno = (f * 100) + r;
            const cell = document.createElement('div');
            cell.className = 'room-cell';
            cell.innerHTML = `<span>${rno}</span>`;
            if (roomWithEntries.has(rno.toString())) {
                const flag = document.createElement('div');
                flag.className = 'room-flag';
                cell.appendChild(flag);
            }
            cell.onclick = () => openPanel(rno);
            grid.appendChild(cell);
        }
    }
}

/* --- ODA PANELİ --- */
function openPanel(rno) {
    q('panel-room-title').textContent = rno;
    q('room-panel').classList.add('open');
    backToPanelMain();
    saveState();
}

function closePanel() {
    q('room-panel').classList.remove('open');
    saveState();
}

function backToPanelMain() {
    q('panel-main').style.display = 'flex';
    q('panel-list').style.display = 'none';
}

async function showSubList(mode) {
    const rno = q('panel-room-title').textContent;
    q('panel-main').style.display = 'none';
    q('panel-list').style.display = 'block';
    q('list-content').innerHTML = '<div class="empty">Yükleniyor...</div>';
    
    const data = await fetchEntries(mode, rno);
    if (!data || data.length === 0) {
        q('list-content').innerHTML = '<div class="empty">Kayıt bulunamadı.</div>';
    } else {
        renderEntries(data, q('list-content'));
    }
}

/* --- GÖRSEL İŞLEMLER --- */
async function handleFiles(files) {
    for (let f of files) {
        const compressed = await compressImage(f);
        pendingFiles.push(compressed);
    }
    renderPreview();
}

function compressImage(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                const max = 1200;
                if (w > h && w > max) { h *= max/w; w = max; }
                else if (h > max) { w *= max/h; h = max; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                canvas.toBlob(blob => {
                    resolve(new File([blob], file.name, {type: 'image/jpeg'}));
                }, 'image/jpeg', 0.8);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

function renderPreview() {
    const wrap = q('f-preview');
    wrap.innerHTML = '';
    pendingFiles.forEach((f, i) => {
        const url = URL.createObjectURL(f);
        const item = document.createElement('div');
        item.className = 'thumb-item';
        item.innerHTML = `<img src="${url}"><div class="thumb-del" onclick="removeFile(${i})">✕</div>`;
        wrap.appendChild(item);
    });
}

function removeFile(i) {
    pendingFiles.splice(i, 1);
    renderPreview();
}

/* --- SUPABASE API --- */
async function api(path, method = 'GET', body = null) {
    const opts = {
        method,
        headers: {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${SB_URL}${path}`, opts);
    return res.json();
}

async function uploadFile(file, room) {
    const ext = file.name.split('.').pop();
    const name = `${Date.now()}_${Math.random().toString(36).substr(2,5)}.${ext}`;
    const bucket = currentMode === 'elektrik' ? 'meters' : 'photos';
    const path = `${room}/${name}`;
    
    const res = await fetch(`${SB_URL}/storage/v1/object/${bucket}/${path}`, {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': file.type },
        body: file
    });
    if (!res.ok) throw new Error('Yükleme hatası');
    return `${SB_URL}/storage/v1/object/public/${bucket}/${path}`;
}

async function saveEntry() {
    const room = q('f-room').value;
    const date = q('f-date').value;
    const note = q('f-note').value;
    
    if (!room || !date || pendingFiles.length === 0) {
        showToast("Eksik bilgi: Oda, Tarih ve Fotoğraf zorunlu!");
        return;
    }

    const btn = q('btn-save');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> KAYDEDİLİYOR...';

    try {
        const urls = [];
        for (let f of pendingFiles) {
            const url = await uploadFile(f, room);
            urls.push(url);
        }

        const payload = {
            room_no: room,
            checkin_date: date,
            note: note,
            mode: currentMode,
            photo_urls: urls
        };

        await api('/rest/v1/entries', 'POST', payload);
        showToast("Başarıyla kaydedildi!");
        
        // Reset form
        q('f-room').value = '';
        q('f-note').value = '';
        pendingFiles = [];
        renderPreview();
        if (currentTab === 0) doSearch(room);
        loadRoomsWithEntries(); // Grid bayraklarını tazele
    } catch (e) {
        showToast("Hata oluştu: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'KAYDI TAMAMLA';
    }
}

async function fetchEntries(mode, rno) {
    return api(`/rest/v1/entries?room_no=eq.${rno}&mode=eq.${mode}&order=checkin_date.desc`);
}

async function loadRoomsWithEntries() {
    const data = await api(`/rest/v1/entries?select=room_no&mode=eq.elektrik`);
    roomWithEntries = new Set(data.map(d => d.room_no.toString()));
    if (currentMode === 'elektrik') renderGrid();
}

async function loadAllRooms() {
    const wrap = q('rlist');
    wrap.innerHTML = '<div class="empty">Yükleniyor...</div>';
    const data = await api(`/rest/v1/entries?mode=eq.${currentMode}&order=room_no.asc,checkin_date.desc`);
    if (data.length === 0) {
        wrap.innerHTML = '<div class="empty">Henüz hiç kayıt yok.</div>';
        return;
    }
    wrap.innerHTML = '';
    renderEntries(data, wrap);
}

async function doSearch(val) {
    const resWrap = q('sresult');
    if (!val) { resWrap.innerHTML = ''; return; }
    resWrap.innerHTML = '<div class="empty">Aranıyor...</div>';
    const data = await fetchEntries(currentMode, val);
    if (data.length === 0) {
        resWrap.innerHTML = '<div class="empty">Sonuç bulunamadı.</div>';
    } else {
        resWrap.innerHTML = '';
        renderEntries(data, resWrap);
    }
    saveState();
}

function renderEntries(data, container) {
    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'entry-card';
        card.innerHTML = `
            <div class="entry-head">
                <span class="date-badge">${item.checkin_date}</span>
                <span style="font-weight:700; font-size:14px">Oda ${item.room_no}</span>
            </div>
            <div class="img-scroll">
                ${(item.photo_urls || []).map(u => `<img src="${u}" class="img-thumb-card" onclick="zoomImg('${u}')">`).join('')}
            </div>
            ${item.note ? `<div style="padding:0 12px 12px 12px; font-size:13px; color:#555;">${item.note}</div>` : ''}
        `;
        container.appendChild(card);
    });
}

function zoomImg(u) {
    q('lb-img').src = u;
    q('lb').classList.add('open');
}

/* BAŞLAT */
window.onload = () => {
    q('f-date').value = new Date().toISOString().split('T')[0];
    loadRoomsWithEntries();
    loadState();
};
</script>
