<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oda Yönetimi · Demirbaş & Elektrik</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
        :root {
            --bg: #f5f4f0; --surface: #fff; --surface2: #f0efe9; --border: #e2e1d9;
            --text: #1a1a18; --muted: #7a7a72; --accent: #1a5c3a; --accent-light: #e8f2ec;
            --danger: #c0392b; --amber: #b45309; --radius: 12px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        .app { max-width: 550px; margin: 0 auto; min-height: 100vh; background: var(--bg); }
        .app.wide { max-width: 1400px; }

        /* Topbar */
        .topbar { background: var(--accent); padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .topbar h1 { font-size: 16px; font-weight: 600; color: #fff; flex: 1; }
        .mode-btns { display: flex; gap: 5px; }
        .mode-btn { padding: 5px 12px; font-size: 11px; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.3); background: transparent; color: #fff; opacity: 0.7; }
        .mode-btn.active { opacity: 1; background: rgba(255,255,255,0.2); border-color: #fff; }

        /* Sayaç Üst Statlar */
        .elektra-top-stats { display: flex; gap: 6px; padding: 12px; overflow-x: auto; background: #fff; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .stat-badge { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; padding: 8px 12px; border-radius: 10px; min-width: 70px; cursor: pointer; border: 2px solid transparent; }
        .stat-badge.active-filter { border-color: rgba(0,0,0,0.3); transform: scale(1.05); }
        .stat-badge .count { font-size: 16px; font-weight: 700; color: #fff; }
        .stat-badge .s-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.9); }

        .bg-dt { background: #1565c0; } .bg-dk { background: #6a1a9a; } .bg-co { background: #2e7d32; }
        .bg-t { background: #4caf50; } .bg-k { background: #ff6d00; } .bg-ooi { background: #880e4f; }
        .bg-bos { background: #fff; color: #888; border: 1px solid #ddd; }

        /* Sayaç Grid 18x15 */
        .grid-container { padding: 12px; overflow-x: auto; background: var(--bg); }
        .room-grid { display: grid; grid-template-columns: repeat(18, 55px); gap: 2px; width: max-content; margin: 0 auto; }
        .room-cell { height: 40px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); position: relative; }
        .room-flag { position: absolute; top: 2px; right: 2px; width: 6px; height: 6px; border-radius: 50%; background: #00e5ff; }

        /* ODA PANELİ (SAYAÇ DETAY) - FULL SCREEN */
        .room-panel { position: fixed; inset: 0; background: #f8f9fa; z-index: 1500; display: flex; flex-direction: column; transform: translateY(100%); transition: 0.4s cubic-bezier(0, 0, 0.2, 1); }
        .room-panel.open { transform: translateY(0); }
        
        .panel-header { background: var(--accent); padding: 16px; display: flex; align-items: center; justify-content: space-between; color: #fff; }
        .panel-room-info { display: flex; align-items: center; gap: 10px; }
        .panel-room-badge { background: #fff; color: var(--accent); padding: 4px 12px; border-radius: 6px; font-weight: 800; font-family: 'DM Mono'; font-size: 18px; }
        
        .nav-tabs { display: flex; border-bottom: 1px solid var(--border); background: #fff; }
        .nav-tab-btn { flex: 1; padding: 15px; font-size: 12px; font-weight: 700; border: none; background: #fff; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; }
        .nav-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        /* KAYITLAR DASHBOARD DÜZENİ */
        .panel-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        
        .meter-dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); /* Yan yana sığdırma */
            gap: 12px; 
            align-items: start;
        } 

        .meter-card { 
            background: #fff; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .meter-card-header { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; border-bottom: 1px solid #f1f1f1; }
        .meter-date { font-weight: 700; font-size: 12px; color: var(--accent); }
        
        .meter-card-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; padding: 4px; }
        .meter-img { aspect-ratio: 1/1; overflow: hidden; cursor: pointer; background: #eee; }
        .meter-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .meter-card-footer { padding: 10px; font-size: 13px; color: #555; line-height: 1.4; border-top: 1px solid #f9f9f9; }

        /* Formlar */
        .form-card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--border); max-width: 450px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; font-family: inherit; font-size: 14px; background: #fafafa; }
        .btn-primary { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* Lightbox */
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .lightbox.open { display: flex; }
        #lb-img { max-width: 95%; max-height: 85%; object-fit: contain; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 50px; z-index: 30000; display: none; }
        .loader { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Demirbaş Orijinal Navigasyon */
        .nav { display: flex; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 58px; z-index: 999; }
        .nav-btn { flex: 1; padding: 12px; font-size: 12px; font-weight: 600; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
        .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .screen { display: none; padding: 16px; }
        .screen.active { display: block; }
        .entry-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
        .entry-head { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    </style>
</head>
<body class="app wide">

    <div class="topbar">
        <h1 id="topbar-title">Oda Yönetimi</h1>
        <div class="mode-btns">
            <button class="mode-btn" id="mode-d" onclick="setMode('demirbaş')">Demirbaş</button>
            <button class="mode-btn active" id="mode-e" onclick="setMode('elektrik')">Sayaç</button>
        </div>
    </div>

    <!-- ELEKTRA (SAYAÇ) GÖRÜNÜMÜ -->
    <div id="elektra-ui">
        <div class="elektra-top-stats" id="estats"></div>
        <div class="grid-container">
            <div class="room-grid" id="egrid"></div>
        </div>
    </div>

    <!-- DEMİRBAŞ GÖRÜNÜMÜ (Orijinal hali korundu) -->
    <div id="demirbas-ui" style="display:none">
        <div class="nav">
            <button class="nav-btn active" onclick="goTab(0)">Ara</button>
            <button class="nav-btn" onclick="goTab(1)">Ekle</button>
        </div>
        <div class="screen active" id="tab0">
            <input type="number" id="ds-input" placeholder="Oda no girin...">
            <button class="btn-primary" style="margin-top:10px" onclick="searchRoom()">Ara</button>
            <div id="search-results" style="margin-top:20px"></div>
        </div>
        <div class="screen" id="tab1">
            <label>Oda No</label><input type="number" id="f-room">
            <label>Tarih</label><input type="date" id="f-date">
            <label>Not</label><textarea id="f-note" rows="3"></textarea>
            <button class="btn-primary" onclick="q('f-file').click()">Resim Seç</button>
            <input type="file" id="f-file" multiple style="display:none" onchange="handleNewFiles(this.files)">
            <div id="f-preview" style="display:flex; gap:5px; margin-top:10px"></div>
            <button class="btn-primary" id="save-btn" onclick="saveNewEntry()" style="margin-top:20px">Kaydet</button>
        </div>
    </div>

    <!-- SAYAÇ DETAY PANELİ (Profesyonel Dashboard) -->
    <div class="room-panel" id="room-panel">
        <div class="panel-header">
            <div class="panel-room-info">
                <div class="panel-room-badge" id="panel-room-title">000</div>
                <span style="font-weight: 500; font-size: 14px;">Sayaç Kayıtları</span>
            </div>
            <div onclick="closePanel()" style="cursor:pointer; font-size:24px">✕</div>
        </div>
        
        <div class="nav-tabs">
            <button class="nav-tab-btn active" id="tab-btn-list" onclick="switchPTab('list')">OKUMALAR</button>
            <button class="nav-tab-btn" id="tab-btn-add" onclick="switchPTab('add')">YENİ EKLE</button>
            <button class="nav-tab-btn" id="tab-btn-status" onclick="switchPTab('status')">DURUM</button>
        </div>

        <div class="panel-scroll">
            <!-- Kayıt Listesi (Dashboard Tipi Yan Yana) -->
            <div id="p-list" style="display:block">
                <div class="meter-dashboard" id="entries-list"></div>
            </div>

            <!-- Ekleme Formu -->
            <div id="p-add" style="display:none">
                <div class="form-card">
                    <label>OKUMA TARİHİ</label>
                    <input type="date" id="ef-date">
                    <label>AÇIKLAMA</label>
                    <textarea id="ef-note" rows="3" placeholder="Notunuz..."></textarea>
                    <button class="btn-primary" onclick="q('ef-file').click()" style="background:#fff; color:var(--accent); border:1.5px dashed var(--accent); margin-bottom:15px">📷 FOTOĞRAF EKLE</button>
                    <input type="file" id="ef-file" multiple style="display:none" onchange="handleNewFiles(this.files, 'elektra')">
                    <div id="ef-preview" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:15px"></div>
                    <button id="ef-save-btn" onclick="saveElektraEntry()" class="btn-primary">OKUMAYI KAYDET</button>
                </div>
            </div>

            <!-- Durum Seçimi -->
            <div id="p-status" style="display:none">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width: 400px; margin: 0 auto;" id="status-opts"></div>
            </div>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lb" onclick="closeLb()">
        <img id="lb-img" src="">
    </div>

    <div class="toast" id="toast"></div>

<script>
const SB = 'https://tpfdsmexywjnsbkfphwq.supabase.co';
const KEY = 'sb_publishable_3pKKUsVjgXPlF-DCzc2ofQ_Qmq3f00L';

let roomStatuses = {};
let roomsWithEntries = new Set();
let currentRoom = null;
let activeStatFilter = null;
let pendingFiles = [];

const q = id => document.getElementById(id);
const months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

async function api(path, opts = {}) {
    return fetch(SB + path, {
        ...opts,
        headers: {
            'apikey': KEY,
            'Authorization': 'Bearer ' + KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
            ...(opts.headers || {})
        }
    });
}

// --- INITIALIZE ---
window.onload = () => {
    setMode('elektrik');
    q('f-date').value = new Date().toISOString().slice(0,10);
    q('ef-date').value = new Date().toISOString().slice(0,10);
};

function setMode(m) {
    q('mode-d').classList.toggle('active', m === 'demirbaş');
    q('mode-e').classList.toggle('active', m === 'elektrik');
    q('demirbas-ui').style.display = m === 'demirbaş' ? 'block' : 'none';
    q('elektra-ui').style.display = m === 'elektrik' ? 'block' : 'none';
    if(m === 'elektrik') initElektra();
}

async function initElektra() {
    await loadStatuses();
    await loadRoomsWithEntries();
    renderStats();
    renderGrid();
}

async function loadStatuses() {
    try {
        const res = await api('/rest/v1/rooms?select=room_no,status');
        const data = await res.json();
        roomStatuses = {};
        data.forEach(r => roomStatuses[r.room_no] = r.status);
    } catch(e) {}
}

async function loadRoomsWithEntries() {
    try {
        const res = await api(`/rest/v1/entries?mode=eq.elektrik&select=room_no`);
        const data = await res.json();
        roomsWithEntries = new Set(data.map(d => String(d.room_no)));
    } catch(e) {}
}

function renderStats() {
    const counts = { 'dolu-temiz':0, 'dolu-kirli':0, 'cout':0, 'temiz':0, 'kirli':0, 'ooi':0 };
    Object.values(roomStatuses).forEach(s => { if(counts[s] !== undefined) counts[s]++; });
    const stats = [
        {id:'dolu-temiz', label:'DT', class:'bg-dt'}, {id:'dolu-kirli', label:'DK', class:'bg-dk'},
        {id:'cout', label:'C/O', class:'bg-co'}, {id:'temiz', label:'TEMİZ', class:'bg-t'},
        {id:'kirli', label:'KİRLİ', class:'bg-k'}, {id:'ooi', label:'OOI', class:'bg-ooi'}
    ];
    q('estats').innerHTML = stats.map(s => `
        <div class="stat-badge ${s.class} ${activeStatFilter === s.id ? 'active-filter' : ''}" onclick="toggleFilter('${s.id}')">
            <span class="count">${counts[s.id]}</span>
            <span class="s-label">${s.label}</span>
        </div>
    `).join('');
}

function toggleFilter(status) {
    activeStatFilter = activeStatFilter === status ? null : status;
    renderStats(); renderGrid();
}

function renderGrid() {
    const grid = q('egrid'); grid.innerHTML = '';
    for (let f = 1; f <= 15; f++) {
        for (let r = 1; r <= 18; r++) {
            const rno = f * 100 + r;
            const status = roomStatuses[rno] || 'bos';
            if(activeStatFilter && status !== activeStatFilter) continue;
            const cell = document.createElement('div');
            let color = 'bg-bos';
            if(status === 'dolu-temiz') color = 'bg-dt';
            else if(status === 'dolu-kirli') color = 'bg-dk';
            else if(status === 'cout') color = 'bg-co';
            else if(status === 'temiz') color = 'bg-t';
            else if(status === 'kirli') color = 'bg-k';
            else if(status === 'ooi') color = 'bg-ooi';
            cell.className = `room-cell ${color}`;
            cell.textContent = rno;
            if(roomsWithEntries.has(String(rno))) {
                const flag = document.createElement('div'); flag.className = 'room-flag'; cell.appendChild(flag);
            }
            cell.onclick = () => openPanel(rno);
            grid.appendChild(cell);
        }
    }
}

// --- PANEL ---
async function openPanel(rno) {
    currentRoom = rno;
    q('panel-room-title').textContent = rno;
    q('room-panel').classList.add('open');
    switchPTab('list'); loadEntries();
}

function closePanel() {
    q('room-panel').classList.remove('open');
    pendingFiles = []; q('ef-preview').innerHTML = '';
}

function switchPTab(t) {
    ['list','add','status'].forEach(x => {
        q('p-' + x).style.display = (x === t) ? 'block' : 'none';
        q('tab-btn-' + x).classList.toggle('active', x === t);
    });
    if(t === 'status') renderStatusSelection();
}

async function loadEntries() {
    const wrap = q('entries-list');
    wrap.innerHTML = '<div style="padding:20px; text-align:center">Yükleniyor...</div>';
    try {
        const res = await api(`/rest/v1/entries?room_no=eq.${currentRoom}&mode=eq.elektrik&order=checkin_date.desc`);
        const data = await res.json();
        if(!data.length) { wrap.innerHTML = '<div style="grid-column: 1/-1; padding:40px; text-align:center; color:#888">Kayıt yok.</div>'; return; }
        
        wrap.innerHTML = data.map(e => `
            <div class="meter-card">
                <div class="meter-card-header">
                    <span class="meter-date">📅 ${fmtDate(e.checkin_date)}</span>
                    <div style="display:flex; gap:8px">
                        <button onclick="toggleEdit('${e.id}')" style="border:none; background:none; cursor:pointer; font-size:14px">✏️</button>
                        <button onclick="deleteEntry('${e.id}')" style="border:none; background:none; cursor:pointer; font-size:14px">🗑️</button>
                    </div>
                </div>
                <div class="meter-card-gallery">
                    ${(e.photo_urls || []).map(u => `<div class="meter-img"><img src="${u}" onclick="openLb('${u}')" loading="lazy"></div>`).join('')}
                </div>
                <div class="meter-card-footer">
                    ${e.note || '<span style="color:#ccc">Not yok</span>'}
                </div>
                <div id="edit-${e.id}" style="display:none; padding:10px; background:#f9f9f9; border-top:1px solid #eee">
                    <input type="date" id="edate-${e.id}" value="${e.checkin_date}">
                    <textarea id="enote-${e.id}" style="font-size:12px">${e.note || ''}</textarea>
                    <button onclick="saveEdit('${e.id}')" class="btn-primary" style="padding:10px; font-size:12px">GÜNCELLE</button>
                </div>
            </div>
        `).join('');
    } catch(e) { wrap.innerHTML = 'Hata.'; }
}

// --- FILE / SAVE ---
function handleNewFiles(files, type) {
    for (let f of files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const id = Math.random().toString(36).substr(2,5);
            pendingFiles.push({ id, file: f, data: e.target.result });
            renderPreviews(type);
        };
        reader.readAsDataURL(f);
    }
}

function renderPreviews(type) {
    const wrap = type === 'elektra' ? q('ef-preview') : q('f-preview');
    wrap.innerHTML = pendingFiles.map(f => `
        <div style="position:relative; width:60px; height:60px">
            <img src="${f.data}" style="width:100%; height:100%; object-fit:cover; border-radius:5px; border:1px solid #ddd">
            <div style="position:absolute; top:-5px; right:-5px; background:red; color:#fff; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:10px" onclick="pendingFiles = pendingFiles.filter(x=>x.id!=='${f.id}'); renderPreviews('${type}');">✕</div>
        </div>
    `).join('');
}

async function saveElektraEntry() {
    if(!pendingFiles.length) { showToast('Resim ekleyin','error'); return; }
    const btn = q('ef-save-btn'); btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
    try {
        const urls = [];
        for(let f of pendingFiles) {
            const name = `${Date.now()}_${Math.random().toString(36).substr(2,8)}.jpg`;
            const upload = await fetch(`${SB}/storage/v1/object/meters/${currentRoom}/${name}`, {
                method: 'POST',
                headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'image/jpeg' },
                body: f.file
            });
            if(upload.ok) urls.push(`${SB}/storage/v1/object/public/meters/${currentRoom}/${name}`);
        }
        const res = await api('/rest/v1/entries', {
            method: 'POST',
            body: JSON.stringify({ 
                room_no: String(currentRoom), 
                checkin_date: q('ef-date').value, 
                note: q('ef-note').value, 
                mode: 'elektrik', 
                photo_urls: urls 
            })
        });
        if(res.ok) {
            showToast('Kaydedildi');
            pendingFiles = []; q('ef-preview').innerHTML = ''; q('ef-note').value = '';
            switchPTab('list'); loadEntries(); loadRoomsWithEntries(); renderGrid();
        }
    } catch(e) { showToast('Hata oluştu','error'); }
    finally { btn.disabled = false; btn.innerHTML = 'OKUMAYI KAYDET'; }
}

// --- DÜZENLEME / SİLME ---
function toggleEdit(id) {
    const el = q('edit-' + id);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function saveEdit(id) {
    try {
        await api(`/rest/v1/entries?id=eq.${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ checkin_date: q('edate-' + id).value, note: q('enote-' + id).value })
        });
        showToast('Güncellendi'); loadEntries();
    } catch(e) { showToast('Hata'); }
}

async function deleteEntry(id) {
    if(!confirm('Kayıt silinsin mi?')) return;
    await api(`/rest/v1/entries?id=eq.${id}`, { method: 'DELETE' });
    showToast('Silindi'); loadEntries(); loadRoomsWithEntries(); renderGrid();
}

// --- DURUM ---
function renderStatusSelection() {
    const statuses = [
        {id:'dolu-temiz', label:'DT', class:'bg-dt'}, {id:'dolu-kirli', label:'DK', class:'bg-dk'},
        {id:'cout', label:'C/O', class:'bg-co'}, {id:'temiz', label:'TEMİZ', class:'bg-t'},
        {id:'kirli', label:'KİRLİ', class:'bg-k'}, {id:'ooi', label:'OOI', class:'bg-ooi'},
        {id:'bos', label:'BOŞ', class:'bg-bos'}
    ];
    const current = roomStatuses[currentRoom] || 'bos';
    q('status-opts').innerHTML = statuses.map(s => `
        <div class="stat-badge ${s.class}" style="padding:20px 10px; border-radius:12px; color:${s.id==='bos'?'#888':'#fff'}; font-weight:800; width:100%; border:${current===s.id?'2.5px solid #212529':'none'}" onclick="updateStatus('${s.id}')">
            ${s.label}
        </div>
    `).join('');
}

async function updateStatus(s) {
    await api('/rest/v1/rooms', {
        method: 'POST',
        headers: { 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ room_no: currentRoom, status: s })
    });
    roomStatuses[currentRoom] = s;
    showToast('Güncellendi'); renderStatusSelection(); renderStats(); renderGrid();
}

function showToast(msg, type = 'success') {
    const t = q('toast');
    t.textContent = msg;
    t.style.background = type === 'error' ? '#c0392b' : '#1a5c3a';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function openLb(u) { q('lb-img').src = u; q('lb').classList.add('open'); }
function closeLb() { q('lb').classList.remove('open'); }

// --- DEMİRBAŞ ARA (ORİJİNAL) ---
function goTab(i) {
    document.querySelectorAll('.screen').forEach((s, j) => s.classList.toggle('active', i === j));
    document.querySelectorAll('.nav-btn').forEach((b, j) => b.classList.toggle('active', i === j));
}

async function searchRoom() {
    const val = q('ds-input').value;
    if(!val) return;
    const res = await api(`/rest/v1/entries?room_no=eq.${val}&mode=eq.demirbaş&order=checkin_date.desc`);
    const data = await res.json();
    q('search-results').innerHTML = data.map(e => `
        <div class="entry-card">
            <div class="entry-head"><span class="date-badge">📅 ${fmtDate(e.checkin_date)}</span></div>
            <div style="display:flex; gap:5px; padding:10px; overflow-x:auto">
                ${(e.photo_urls || []).map(u => `<img src="${u}" style="width:70px; height:70px; object-fit:cover; border-radius:5px" onclick="openLb('${u}')">`).join('')}
            </div>
            <div style="padding:10px; font-size:14px">${e.note || ''}</div>
        </div>
    `).join('') || 'Kayıt yok.';
}

async function saveNewEntry() {
    const room = q('f-room').value;
    if(!room || !pendingFiles.length) return;
    const urls = [];
    for(let f of pendingFiles) {
        const name = `${Date.now()}_${Math.random().toString(36).substr(2,8)}.jpg`;
        const upload = await fetch(`${SB}/storage/v1/object/photos/${room}/${name}`, {
            method: 'POST',
            headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'image/jpeg' },
            body: f.file
        });
        if(upload.ok) urls.push(`${SB}/storage/v1/object/public/photos/${room}/${name}`);
    }
    await api('/rest/v1/entries', {
        method: 'POST',
        body: JSON.stringify({ room_no: String(room), checkin_date: q('f-date').value, note: q('f-note').value, mode: 'demirbaş', photo_urls: urls })
    });
    showToast('Kaydedildi');
    pendingFiles = []; q('f-preview').innerHTML = ''; q('f-room').value = ''; goTab(0);
}
</script>
</body>
</html>
