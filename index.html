<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oda Yönetimi · Demirbaş & Elektrik</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e1d9;
    --text:#1a1a18;--muted:#7a7a72;--accent:#1a5c3a;--accent-light:#e8f2ec;
    --accent-mid:#2d7a52;--danger:#c0392b;--danger-light:#fdf0ee;
    --amber:#b45309;--amber-light:#fef3c7;--radius:12px;--radius-sm:8px;
    --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; }
  .app { max-width:1300px; margin:0 auto; min-height:100vh; background:var(--bg); }

  /* TOPBAR */
  .topbar { background:var(--accent); padding:10px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; position:sticky; top:0; z-index:100; }
  .topbar h1 { font-size:16px; font-weight:700; color:#fff; letter-spacing:0.5px; }
  .topbar p { font-size:11px; color:rgba(255,255,255,.65); margin:0; }
  .mode-btns { display:flex; gap:5px; margin-left:auto; }
  .mode-btn { padding:5px 10px; font-size:11px; font-weight:600; border-radius:99px; cursor:pointer; border:1.5px solid rgba(255,255,255,.25); background:transparent; color:rgba(255,255,255,.7); transition:all .15s; font-family:'DM Sans',sans-serif; }
  .mode-btn.active { background:rgba(255,255,255,.25); border-color:rgba(255,255,255,.6); color:#fff; }
  .conn-badge { font-size:10px; color:#ccc; display:flex; align-items:center; gap:4px; padding:2px 8px; background:rgba(0,0,0,0.2); border-radius:20px; }
  .conn-dot { width:6px; height:6px; border-radius:50%; background:#aaa; }
  .conn-dot.ok { background:#4caf50; }

  /* STAT BADGES (sayaç modunda gösterilir) */
  .stat-badge { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; color:#fff; background:rgba(255,255,255,0.15); cursor:default; }
  .stat-badge .count { font-size:14px; font-weight:700; }
  .sb-dolu-temiz { background: #1565c0; }
  .sb-dolu-kirli { background: #6a1a9a; }
  .sb-cout       { background: #2e7d32; }
  .sb-temiz      { background: #4caf50; color:#000; }
  .sb-kirli      { background: #ff6d00; }
  .sb-ooi        { background: #880e4f; }
  .sb-ariza      { background: #546e7a; }
  .sb-onaylı     { background: #4a148c; }

  /* NAV */
  .nav { display:flex; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:50px; z-index:99; overflow-x:auto; }
  .nav-btn { flex:1; padding:11px 4px; font-size:12px; font-weight:500; border:none; background:transparent; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; font-family:'DM Sans',sans-serif; transition:all .15s; white-space:nowrap; }
  .nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .screen { display:none; padding:16px; }
  .screen.active { display:block; }
  /* demirbaş form elemanları */
  input,select,textarea { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:15px; background:var(--surface); color:var(--text); font-family:'DM Sans',sans-serif; transition:border-color .15s,box-shadow .15s; -webkit-appearance:none; }
  input:focus,select:focus,textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,92,58,.1); }
  .field { margin-bottom:14px; }
  .label { font-size:12px; color:var(--muted); margin-bottom:5px; display:block; font-weight:500; }
  .btn { padding:11px 18px; border-radius:var(--radius-sm); font-size:14px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); font-family:'DM Sans',sans-serif; transition:all .15s; display:inline-flex; align-items:center; gap:6px; }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-danger { background:var(--danger-light); color:var(--danger); border-color:#f5c6c2; }
  /* demirbaş kart stilleri aynen korunacak, ekstra sayaç stilleri aşağıda */

  /* SAYAÇ PANELİ ÖZEL STİLLERİ */
  .grid-container { padding:12px; overflow-x:auto; }
  .floor-section { margin-bottom:8px; }
  .floor-label { font-size:20px; color:var(--muted); margin-bottom:4px; font-weight:600; }
  .room-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(65px, 1fr)); gap:4px; }
  .room-cell { height:38px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:600; cursor:pointer; border:1px solid rgba(0,0,0,0.05); position:relative; background:var(--surface); color:var(--text); transition:transform 0.1s, filter 0.1s; }
  .room-cell:hover { transform:scale(1.06); z-index:2; filter:brightness(1.15); }
  .status-dolu-temiz  { background:#1565c0; color:#fff; }
  .status-dolu-kirli  { background:#6a1a9a; color:#fff; }
  .status-cout        { background:#2e7d32; color:#fff; }
  .status-cout-b      { background:#1b5e20; color:#fff; }
  .status-temiz       { background:#4caf50; color:#fff; }
  .status-temiz-b     { background:#009688; color:#fff; }
  .status-kirli       { background:#ff6d00; color:#fff; }
  .status-kirli-b     { background:#d32f2f; color:#fff; }
  .status-ooi         { background:#880e4f; color:#fff; }
  .status-ariza       { background:#546e7a; color:#fff; }
  .status-onaylı      { background:#4a148c; color:#fff; }
  .status-onaylı-b    { background:#7b1fa2; color:#fff; }
  .status-bos         { background:#fff; color:#888; border:1px dashed #ccc; }
  .room-flag { position:absolute; top:2px; right:2px; width:6px; height:6px; border-radius:50%; background:#00e5ff; }

  .panel-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; }
  .panel-overlay.open { display:block; }
  .room-panel { position:fixed; top:0; right:0; bottom:0; width:540px; max-width:100vw; background:var(--surface); z-index:501; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.28s; overflow:hidden; box-shadow:-4px 0 20px rgba(0,0,0,0.15); }
  .room-panel.open { transform:translateX(0); }
  .panel-header { background:var(--accent); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .panel-header h2 { font-size:15px; color:#fff; }
  .panel-room-badge { background:rgba(255,255,255,0.2); padding:4px 12px; border-radius:6px; font-size:20px; font-weight:700; color:#fff; margin-right:10px; }
  .panel-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
  .panel-tabs { display:flex; border-bottom:1px solid var(--border); }
  .ptab { flex:1; padding:12px; text-align:center; font-size:13px; font-weight:600; border:none; background:transparent; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; font-family:'DM Sans',sans-serif; }
  .ptab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .panel-body { flex:1; overflow-y:auto; }
  .tab-pane { display:none; padding:14px 16px; }
  .tab-pane.active { display:block; }
  .entry-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
  .entry-head { padding:10px 14px; display:flex; align-items:center; gap:8px; cursor:pointer; }
  .type-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .type-badge.giris { background:#e8f2ec; color:#1a5c3a; }
  .type-badge.cikis { background:#fef3c7; color:#b45309; }
  .chevron { transition:transform 0.2s; color:var(--muted); }
  .chevron.open { transform:rotate(90deg); }
  .entry-body { max-height:0; overflow:hidden; transition:max-height 0.3s; }
  .entry-body.open { max-height:2000px; }
  .img-scroll { display:flex; gap:6px; overflow-x:auto; padding:8px 14px; }
  .img-thumb { width:80px; height:60px; border-radius:6px; overflow:hidden; border:1px solid var(--border); flex-shrink:0; cursor:pointer; position:relative; }
  .img-thumb img { width:100%; height:100%; object-fit:cover; }
  .edit-panel { display:none; padding:12px 14px; border-top:1px solid var(--border); background:var(--surface2); }
  .edit-panel.open { display:block; }
  .elegant-form { background:var(--surface); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
  .form-label { font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
  .type-btns { display:flex; gap:8px; }
  .type-btn { flex:1; padding:14px; border-radius:var(--radius-sm); font-size:14px; font-weight:700; border:2px solid var(--border); background:var(--surface2); cursor:pointer; }
  .type-btn.active-giris { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
  .type-btn.active-cikis { border-color:var(--amber); background:var(--amber-light); color:var(--amber); }
  .photo-drop { border:2px dashed var(--border); border-radius:var(--radius-sm); padding:20px; text-align:center; cursor:pointer; background:var(--surface2); }
  .photo-drop:hover { border-color:var(--accent); background:var(--accent-light); }
  .preview-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .prev-item { position:relative; width:70px; height:50px; border-radius:6px; overflow:hidden; border:1px solid var(--border); }
  .prev-item img { width:100%; height:100%; object-fit:cover; }
  .prev-del { position:absolute; top:2px; right:2px; background:rgba(192,57,43,0.85); color:#fff; border:none; font-size:10px; cursor:pointer; border-radius:3px; padding:0 4px; }
  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; flex-direction:column; }
  .lightbox.open { display:flex; }
  .lb-top { display:flex; justify-content:space-between; padding:10px 14px; }
  .lb-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
  .lb-img-wrap { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .lb-img-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
  .lb-nav { display:flex; gap:10px; justify-content:center; padding:10px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; z-index:9999; display:none; white-space:nowrap; }
  .toast.show { display:block; }
  .toast.success { background:var(--accent); }
  .toast.error { background:var(--danger); }
  .ml-cikis-btn { padding:5px 10px; font-size:11px; font-weight:600; border-radius:6px; border:1px solid #e8a020; background:var(--amber-light); color:var(--amber); cursor:pointer; }
  .confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; }
  .confirm-overlay.open { display:flex; }
  .confirm-sheet { background:var(--surface); border-radius:var(--radius); padding:20px; width:320px; }
  .confirm-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
  .list-container { display:none; padding:12px; }
  .list-container.active { display:block; }
  .grid-container.hidden { display:none; }
  .readonly-view { display:none; padding:16px; }
  .readonly-view.active { display:block; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- TOPBAR -->
  <div class="topbar" id="topbar">
    <h1 id="topbar-title">Demirbaş Takibi</h1>
    <span id="topbar-sub" style="font-size:11px; color:rgba(255,255,255,.65);"></span>
    <div class="conn-badge" id="conn-badge"><div class="conn-dot" id="conn-dot"></div><span id="conn-text">Bağlanıyor...</span></div>
    <div class="mode-btns">

      <button class="mode-btn" id="mode-e" onclick="setMode('elektrik')">Sayaç</button>
    </div>
  </div>

  <!-- DEMIRBAS NAV & SCREENS -->
  <div id="demirbas-nav" class="nav">

  <div id="demirbas-screens">

    <div class="screen" id="s1">...</div>
    <div class="screen" id="s2">...</div>
  </div>

  <!-- SAYAÇ PANELİ (gizli başlar) -->
  <div id="elektra-panel" style="display:none;"></div>
</div>

<!-- LIGHTBOX, TOAST, CONFIRM (ortak) -->
<div class="lightbox" id="lb">...</div>
<div class="confirm-overlay" id="confirm-overlay">...</div>
<div class="toast" id="toast"></div>

</html>
