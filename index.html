<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oda Yönetimi · Demirbaş & Elektrik</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
        :root {
            --bg: #f5f4f0; --surface: #fff; --surface2: #f0efe9; --border: #e2e1d9;
            --text: #1a1a18; --muted: #7a7a72; --accent: #1a5c3a; --accent-light: #e8f2ec;
            --danger: #c0392b; --amber: #b45309; --radius: 12px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        .app { max-width: 550px; margin: 0 auto; min-height: 100vh; background: var(--bg); }
        .app.wide { max-width: 1400px; }

        /* Topbar */
        .topbar { background: var(--accent); padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .topbar h1 { font-size: 16px; font-weight: 600; color: #fff; flex: 1; }
        .mode-btns { display: flex; gap: 5px; }
        .mode-btn { padding: 5px 12px; font-size: 11px; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.3); background: transparent; color: #fff; opacity: 0.7; }
        .mode-btn.active { opacity: 1; background: rgba(255,255,255,0.2); border-color: #fff; }

        /* Filtreleme Butonları */
        .elektra-top-stats { display: flex; gap: 6px; padding: 12px; overflow-x: auto; background: #fff; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .elektra-top-stats::-webkit-scrollbar { display: none; }
        .stat-badge { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; padding: 8px 12px; border-radius: 10px; min-width: 70px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .stat-badge.active-filter { border-color: rgba(0,0,0,0.3); transform: scale(1.05); }
        .stat-badge .count { font-size: 16px; font-weight: 700; color: #fff; }
        .stat-badge .s-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.9); }

        .bg-dt { background: #1565c0; } .bg-dk { background: #6a1a9a; } .bg-co { background: #2e7d32; }
        .bg-t { background: #4caf50; } .bg-k { background: #ff6d00; } .bg-ooi { background: #880e4f; }
        .bg-ar { background: #546e7a; } .bg-on { background: #4a148c; } .bg-bos { background: #fff; color: #888; border: 1px solid #ddd; }

        /* Grid - 18x15 */
        .grid-container { padding: 12px; overflow-x: auto; background: var(--bg); }
        .room-grid { display: grid; grid-template-columns: repeat(18, 55px); gap: 2px; width: max-content; margin: 0 auto; }
        .room-cell { height: 40px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); position: relative; }
        .room-flag { position: absolute; top: 2px; right: 2px; width: 6px; height: 6px; border-radius: 50%; background: #00e5ff; }

        /* Oda Paneli */
        .room-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 480px; background: #fff; z-index: 10001; transform: translateX(100%); transition: 0.3s ease; display: flex; flex-direction: column; box-shadow: -5px 0 25px rgba(0,0,0,0.2); }
        .room-panel.open { transform: translateX(0); }
        
        /* Kayıtların Yatay Kayması */
        .entries-horizontal-scroll { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scroll-snap-type: x mandatory; }
        .entry-card-mini { flex: 0 0 280px; scroll-snap-align: start; background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: fit-content;}
        
        .photo-grid-mini { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 8px; background: #f9f9f9; }
        .photo-item-mini { aspect-ratio: 1/1; overflow: hidden; cursor: pointer; }
        .photo-item-mini img { width: 100%; height: 100%; object-fit: cover; }

        /* Sekmeler */
        .nav-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .nav-tab-btn { flex: 1; padding: 15px; font-size: 12px; font-weight: 700; border: none; background: #fff; cursor: pointer; border-bottom: 3px solid transparent; color: var(--muted); }
        .nav-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-pane { display: none; flex: 1; overflow-y: auto; padding: 16px; }
        .tab-pane.active { display: block; }

        /* Formlar */
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; font-family: inherit; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* Lightbox */
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; align-items: center; justify-content: center; }
        .lightbox.open { display: flex; }
        #lb-img { max-width: 95%; max-height: 90%; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 50px; z-index: 30000; display: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="app wide">

    <div class="topbar">
        <h1>Oda Yönetimi</h1>
        <div class="mode-btns">
            <button class="mode-btn" id="mode-d" onclick="setMode('demirbaş')">Demirbaş</button>
            <button class="mode-btn active" id="mode-e" onclick="setMode('elektrik')">Sayaç</button>
        </div>
    </div>

    <div id="elektra-ui">
        <div class="elektra-top-stats" id="estats"></div>
        <div class="grid-container">
            <div class="room-grid" id="egrid"></div>
        </div>
    </div>

    <div id="demirbas-ui" style="display:none; padding:20px">
        <input type="number" id="ds-input" placeholder="Oda no ile ara..." style="margin-bottom:10px">
        <button onclick="searchDemirbas()" class="btn-save">ARA</button>
        <div id="ds-results" style="margin-top:20px"></div>
    </div>

    <!-- ODA PANELİ -->
    <div id="panel-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:10000" onclick="closePanel()"></div>
    <div class="room-panel" id="room-panel">
        <div style="background:var(--accent); color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center">
            <h2 id="panel-room-title">ODA -</h2>
            <span onclick="closePanel()" style="cursor:pointer; font-size:24px">✕</span>
        </div>
        
        <div class="nav-tabs">
            <button class="nav-tab-btn active" id="tab-btn-list" onclick="switchPTab('list')">KAYITLAR</button>
            <button class="nav-tab-btn" id="tab-btn-add" onclick="switchPTab('add')">EKLE</button>
            <button class="nav-tab-btn" id="tab-btn-status" onclick="switchPTab('status')">DURUM</button>
        </div>

        <div id="p-list" class="tab-pane active" style="padding:0">
            <div class="entries-horizontal-scroll" id="entries-scroll"></div>
        </div>

        <div id="p-add" class="tab-pane">
            <input type="date" id="ef-date">
            <textarea id="ef-note" rows="3" placeholder="Sayaç notu..."></textarea>
            <button onclick="q('ef-file').click()" style="width:100%; padding:12px; border:2px dashed #ccc; border-radius:10px; margin-bottom:12px; background:#fff">📷 Fotoğraf Seç</button>
            <input type="file" id="ef-file" multiple style="display:none" onchange="handleNewFiles(this.files)">
            <div id="ef-preview" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px"></div>
            <button id="ef-save-btn" onclick="saveElektraEntry()" class="btn-save">KAYDET</button>
        </div>

        <div id="p-status" class="tab-pane">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px" id="status-opts"></div>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lb" onclick="closeLb()">
        <img id="lb-img" src="">
    </div>

    <div class="toast" id="toast"></div>

<script>
const SB = 'https://tpfdsmexywjnsbkfphwq.supabase.co';
const KEY = 'sb_publishable_3pKKUsVjgXPlF-DCzc2ofQ_Qmq3f00L';

let roomStatuses = {};
let roomsWithEntries = new Set();
let currentRoom = null;
let activeStatFilter = null;
let pendingFiles = [];

const q = id => document.getElementById(id);

// Tarih Formatı: 18 Haz 2026
function fmtDate(iso) {
    if (!iso) return '';
    const date = new Date(iso);
    const months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
    return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
}

async function api(path, opts = {}) {
    return fetch(SB + path, {
        ...opts,
        headers: {
            'apikey': KEY,
            'Authorization': 'Bearer ' + KEY,
            'Content-Type': 'application/json',
            ...(opts.headers || {})
        }
    });
}

window.onload = () => {
    setMode('elektrik');
    q('ef-date').value = new Date().toISOString().slice(0,10);
};

function setMode(m) {
    q('mode-d').classList.toggle('active', m === 'demirbaş');
    q('mode-e').classList.toggle('active', m === 'elektrik');
    q('demirbas-ui').style.display = m === 'demirbaş' ? 'block' : 'none';
    q('elektra-ui').style.display = m === 'elektrik' ? 'block' : 'none';
    if(m === 'elektrik') initElektra();
}

async function initElektra() {
    await loadStatuses();
    await loadRoomsWithEntries();
    renderStats();
    renderGrid();
}

async function loadStatuses() {
    try {
        const res = await api('/rest/v1/rooms?select=room_no,status');
        const data = await res.json();
        roomStatuses = {};
        data.forEach(r => roomStatuses[r.room_no] = r.status);
    } catch(e) {}
}

async function loadRoomsWithEntries() {
    try {
        const res = await api(`/rest/v1/entries?mode=eq.elektrik&select=room_no`);
        const data = await res.json();
        roomsWithEntries = new Set(data.map(d => String(d.room_no)));
    } catch(e) {}
}

function renderStats() {
    const counts = { 'dolu-temiz':0, 'dolu-kirli':0, 'cout':0, 'temiz':0, 'kirli':0, 'ooi':0, 'ariza':0, 'onaylı':0 };
    Object.values(roomStatuses).forEach(s => { if(counts[s] !== undefined) counts[s]++; });
    
    const stats = [
        {id:'dolu-temiz', label:'DT', class:'bg-dt'}, {id:'dolu-kirli', label:'DK', class:'bg-dk'},
        {id:'cout', label:'C/O', class:'bg-co'}, {id:'temiz', label:'TEMİZ', class:'bg-t'},
        {id:'kirli', label:'KİRLİ', class:'bg-k'}, {id:'ooi', label:'OOI', class:'bg-ooi'}
    ];

    q('estats').innerHTML = stats.map(s => `
        <div class="stat-badge ${s.class} ${activeStatFilter === s.id ? 'active-filter' : ''}" onclick="toggleFilter('${s.id}')">
            <span class="count">${counts[s.id]}</span>
            <span class="s-label">${s.label}</span>
        </div>
    `).join('');
}

function toggleFilter(status) {
    activeStatFilter = activeStatFilter === status ? null : status;
    renderStats();
    renderGrid();
}

function renderGrid() {
    const grid = q('egrid'); grid.innerHTML = '';
    for (let f = 1; f <= 15; f++) {
        for (let r = 1; r <= 18; r++) {
            const rno = f * 100 + r;
            const status = roomStatuses[rno] || 'bos';
            if(activeStatFilter && status !== activeStatFilter) continue;

            const cell = document.createElement('div');
            cell.className = `room-cell bg-${status === 'bos' ? 'bos' : status.split('-')[0] === 'dolu' ? (status==='dolu-temiz'?'dt':'dk') : (status==='cout'?'co':status==='temiz'?'t':status==='kirli'?'k':status==='ooi'?'ooi':status==='ariza'?'ar':'on')}`;
            cell.textContent = rno;
            if(roomsWithEntries.has(String(rno))) {
                const flag = document.createElement('div');
                flag.className = 'room-flag';
                cell.appendChild(flag);
            }
            cell.onclick = () => openPanel(rno);
            grid.appendChild(cell);
        }
    }
}

async function openPanel(rno) {
    currentRoom = rno;
    q('panel-room-title').textContent = `ODA ${rno}`;
    q('room-panel').classList.add('open');
    q('panel-overlay').style.display = 'block';
    switchPTab('list');
    loadEntries();
}

function closePanel() {
    q('room-panel').classList.remove('open');
    q('panel-overlay').style.display = 'none';
    pendingFiles = []; q('ef-preview').innerHTML = '';
}

function switchPTab(t) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab-btn').forEach(b => b.classList.remove('active'));
    q('p-' + t).classList.add('active');
    q('tab-btn-' + t).classList.add('active');
    if(t === 'status') renderStatusSelection();
}

async function loadEntries() {
    const wrap = q('entries-scroll');
    wrap.innerHTML = '<div style="padding:20px">Yükleniyor...</div>';
    try {
        const res = await api(`/rest/v1/entries?room_no=eq.${currentRoom}&mode=eq.elektrik&order=checkin_date.desc`);
        const data = await res.json();
        if(!data.length) { wrap.innerHTML = '<div style="padding:40px; color:#888">Kayıt yok.</div>'; return; }
        
        wrap.innerHTML = data.map(e => `
            <div class="entry-card-mini">
                <div style="padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between">
                    <span style="font-weight:700">${fmtDate(e.checkin_date)}</span>
                    <div style="display:flex; gap:8px">
                        <button onclick="toggleEdit('${e.id}')" style="border:none; background:none">✏️</button>
                        <button onclick="deleteEntry('${e.id}')" style="border:none; background:none">🗑️</button>
                    </div>
                </div>
                <div class="photo-grid-mini">
                    ${(e.photo_urls || []).map(u => `<div class="photo-item-mini"><img src="${u}" onclick="openLb('${u}')"></div>`).join('')}
                </div>
                <div style="padding:10px; font-size:13px">${e.note || ''}</div>
                <div id="edit-${e.id}" style="display:none; padding:10px; background:#f5f5f5">
                    <input type="date" id="edate-${e.id}" value="${e.checkin_date}">
                    <textarea id="enote-${e.id}">${e.note || ''}</textarea>
                    <button onclick="saveEdit('${e.id}')" style="width:100%; background:var(--accent); color:#fff; border:none; padding:8px; border-radius:5px">GÜNCELLE</button>
                </div>
            </div>
        `).join('');
    } catch(e) { wrap.innerHTML = 'Hata.'; }
}

function handleNewFiles(files) {
    for (let f of files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const id = Math.random().toString(36).substr(2,5);
            pendingFiles.push({ id, file: f, data: e.target.result });
            renderPreviews();
        };
        reader.readAsDataURL(f);
    }
}

function renderPreviews() {
    q('ef-preview').innerHTML = pendingFiles.map(f => `
        <div style="position:relative; width:60px; height:60px">
            <img src="${f.data}" style="width:100%; height:100%; object-fit:cover; border-radius:5px">
            <div style="position:absolute; top:-5px; right:-5px; background:red; color:#fff; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:10px" onclick="pendingFiles = pendingFiles.filter(x=>x.id!=='${f.id}'); renderPreviews();">✕</div>
        </div>
    `).join('');
}

async function saveElektraEntry() {
    if(!pendingFiles.length) { showToast('Resim seçin','error'); return; }
    const btn = q('ef-save-btn'); btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
    try {
        const urls = [];
        for(let f of pendingFiles) {
            const name = `${Date.now()}_${Math.random().toString(36).substr(2,8)}.jpg`;
            const res = await fetch(`${SB}/storage/v1/object/meters/${currentRoom}/${name}`, {
                method: 'POST',
                headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'image/jpeg' },
                body: f.file
            });
            if(res.ok) urls.push(`${SB}/storage/v1/object/public/meters/${currentRoom}/${name}`);
        }
        await api('/rest/v1/entries', {
            method: 'POST',
            body: JSON.stringify({ room_no: String(currentRoom), checkin_date: q('ef-date').value, note: q('ef-note').value, mode: 'elektrik', photo_urls: urls })
        });
        showToast('Başarılı');
        pendingFiles = []; q('ef-preview').innerHTML = ''; q('ef-note').value = '';
        switchPTab('list'); loadEntries(); loadRoomsWithEntries(); renderGrid();
    } catch(e) { showToast('Hata'); }
    finally { btn.disabled = false; btn.innerHTML = 'KAYDET'; }
}

function toggleEdit(id) {
    const el = q('edit-' + id);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function saveEdit(id) {
    try {
        await api(`/rest/v1/entries?id=eq.${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ checkin_date: q('edate-' + id).value, note: q('enote-' + id).value })
        });
        showToast('Güncellendi'); loadEntries();
    } catch(e) { showToast('Hata'); }
}

async function deleteEntry(id) {
    if(!confirm('Silinsin mi?')) return;
    await api(`/rest/v1/entries?id=eq.${id}`, { method: 'DELETE' });
    showToast('Silindi'); loadEntries(); loadRoomsWithEntries(); renderGrid();
}

function renderStatusSelection() {
    const statuses = [
        {id:'dolu-temiz', label:'DOLU TEMİZ', class:'bg-dt'}, {id:'dolu-kirli', label:'DOLU KİRLİ', class:'bg-dk'},
        {id:'cout', label:'C/OUT', class:'bg-co'}, {id:'temiz', label:'TEMİZ', class:'bg-t'},
        {id:'kirli', label:'KİRLİ', class:'bg-k'}, {id:'ooi', label:'OOI', class:'bg-ooi'},
        {id:'ariza', label:'ARIZA', class:'bg-ar'}, {id:'onaylı', label:'ONAYLI', class:'bg-on'},
        {id:'bos', label:'BOŞ', class:'bg-bos'}
    ];
    const current = roomStatuses[currentRoom] || 'bos';
    q('status-opts').innerHTML = statuses.map(s => `
        <div class="stat-badge ${s.class}" style="padding:15px; border-radius:10px; color:${s.id==='bos'?'#888':'#fff'}; font-weight:700; width:100%; border:${current===s.id?'2px solid #000':'none'}" onclick="updateStatus('${s.id}')">
            ${s.label}
        </div>
    `).join('');
}

async function updateStatus(s) {
    await api('/rest/v1/rooms', {
        method: 'POST',
        headers: { 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ room_no: currentRoom, status: s })
    });
    roomStatuses[currentRoom] = s;
    showToast('Durum güncellendi'); renderStatusSelection(); renderStats(); renderGrid();
}

function showToast(msg, type = 'success') {
    const t = q('toast');
    t.textContent = msg;
    t.style.background = type === 'error' ? '#c0392b' : '#333';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function openLb(u) { q('lb-img').src = u; q('lb').classList.add('open'); }
function closeLb() { q('lb').classList.remove('open'); }

async function searchDemirbas() {
    const val = q('ds-input').value;
    if(!val) return;
    const res = await api(`/rest/v1/entries?room_no=eq.${val}&mode=eq.demirbaş&order=checkin_date.desc`);
    const data = await res.json();
    q('ds-results').innerHTML = data.map(e => `
        <div style="background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid #ddd">
            <div style="font-weight:700">${fmtDate(e.checkin_date)}</div>
            <div style="display:flex; gap:5px; margin-top:10px">
                ${(e.photo_urls || []).map(u => `<img src="${u}" style="width:60px; height:60px; object-fit:cover; border-radius:5px" onclick="openLb('${u}')">`).join('')}
            </div>
            <div style="margin-top:10px">${e.note || ''}</div>
        </div>
    `).join('') || 'Kayıt bulunamadı.';
}
</script>
</body>
</html>
