<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Oda Yönetimi · Demirbaş &amp; Elektrik</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e1d9;
    --text:#1a1a18;--muted:#7a7a72;--accent:#1a5c3a;--accent-light:#e8f2ec;
    --accent-mid:#2d7a52;--danger:#c0392b;--danger-light:#fdf0ee;
    --amber:#b45309;--amber-light:#fef3c7;--radius:12px;--radius-sm:8px;
    --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
    --topbar-height: 60px;
    --blue: #2563eb; --blue-light: #eff6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
  .app{max-width:450px;margin:0 auto;min-height:100vh;background:var(--bg)}
  .app.full-width { max-width: none; }

  .topbar{
    background:var(--accent);position:sticky;top:0;z-index:100;
    display:flex;align-items:center;gap:10px;padding:12px 16px;
    flex-wrap: wrap;
  }
  .topbar-icon{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .topbar-title-group{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
  .topbar h1{font-size:16px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar p{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mode-btns{display:flex;gap:5px;flex-shrink:0;margin-left:auto;}
  .mode-btn{padding:5px 10px;font-size:11px;font-weight:600;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.7)}
  .mode-btn.active{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.6);color:#fff}
  
  .add-meter-btn{padding:5px 12px;font-size:11px;font-weight:600;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;margin-left:4px;display:none;align-items:center;gap:4px}
  .add-meter-btn.show{display:inline-flex}

  .nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:99;overflow-x:auto;}
  .nav-btn{flex:1;padding:11px 4px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
  .nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  .screen{display:none;padding:16px}
  .screen.active{display:block}

  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,92,58,.1)}
  
  .field{margin-bottom:14px}
  .label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:500}
  .btn{padding:11px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);width:100%;justify-content:center;padding:13px;font-size:15px}
  .btn-primary:active{background:#144d31}
  
  /* GRID */
  .grid-container { padding: 0; background: var(--bg); }
  .room-grid { display: grid; grid-template-columns: repeat(18, minmax(0,1fr)); gap: 2px; width: 100%; }
  .room-cell {
    min-height: calc((100vh - var(--topbar-height)) / 15.5);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: clamp(10px, 2.5vw, 14px); font-weight: 700; cursor: pointer;
    border: 1px solid rgba(0,0,0,0.06); position: relative; background: #fff;
  }
  .room-flag { position: absolute; top: 1px; right: 1px; width: 5px; height: 5px; border-radius: 50%; background: #00e5ff; }

  /* ODA PANELİ */
  .room-panel { position: fixed; inset: 0; background: #f8f9fa; z-index: 1500; display: flex; flex-direction: column; transform: translateY(100%); transition: 0.4s cubic-bezier(0, 0, 0.2, 1); }
  .room-panel.open { transform: translateY(0); }
  .panel-header { background: var(--accent); padding: 16px; display: flex; align-items: center; justify-content: space-between; color: #fff; }
  .panel-room-badge { background: #fff; color: var(--accent); padding: 4px 12px; border-radius: 6px; font-weight: 800; font-family: 'DM Mono'; font-size: 18px; }
  
  /* SEÇİM EKRANI */
  .choice-container { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 30px; gap: 20px; }
  .choice-card { 
    background: #fff; border: 1px solid var(--border); padding: 25px; border-radius: 16px; 
    text-align: center; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow);
  }
  .choice-card:active { transform: scale(0.97); background: var(--surface2); }
  .choice-card h2 { font-size: 18px; margin-bottom: 5px; color: var(--text); }
  .choice-card p { font-size: 13px; color: var(--muted); }
  .choice-icon { font-size: 32px; margin-bottom: 10px; display: block; }

  /* SUB-PANEL İÇERİĞİ */
  .sub-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .sub-content.active { display: flex; }
  .nav-tabs { display: flex; border-bottom: 1px solid var(--border); background: #fff; }
  .nav-tab-btn { flex: 1; padding: 15px; font-size: 12px; font-weight: 700; border: none; background: #fff; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; }
  .nav-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel-scroll { flex: 1; overflow-y: auto; padding: 20px; }

  /* CARDS */
  .meter-card, .plate-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .meter-card-header, .plate-card-header { padding: 10px 12px; background: #fafafa; border-bottom: 1px solid #f1f1f1; display: flex; justify-content: space-between; font-weight: 700; font-size: 12px; color: var(--accent); }
  .plate-card-body { padding: 12px; }
  .plate-no { font-size: 20px; font-weight: 800; color: var(--text); font-family: 'DM Mono', monospace; letter-spacing: 1px; margin-bottom: 5px; display: block;}
  
  .entry-footer { padding: 10px; background: var(--surface2); display: flex; gap: 6px; justify-content: flex-end; }
  .link-btn, .edit-btn, .del-btn { padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid var(--border); cursor: pointer; background: #fff; }
  .wa-btn { color: #25D366; }

  /* TOAST & UTILS */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 99px; z-index: 9999; display: none; font-size: 13px; }
  .toast.show { display: block; }
  .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .thumb-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .thumb-item { position: relative; width: 70px; height: 70px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-del { position: absolute; top: 2px; right: 2px; background: var(--danger); color: #fff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; }
</style>
</head>
<body>

<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-icon">⚡</div>
    <div class="topbar-title-group">
      <h1 id="topbar-title">Yönetim Paneli</h1>
      <p id="topbar-sub">Bağlanıyor...</p>
    </div>
    <div class="mode-btns">
      <button class="mode-btn active" id="mode-d" onclick="setMode('demirbaş')">Demirbaş</button>
      <button class="mode-btn" id="mode-e" onclick="setMode('elektrik')">Elektra</button>
    </div>
  </div>

  <!-- DEMİRBAŞ ARA / EKLE (Basitleştirilmiş Mevcut Yapı) -->
  <div id="demirbas-ui">
     <div style="padding:40px; text-align:center; color:var(--muted)">Demirbaş modülü burada aktif...</div>
  </div>

  <!-- ELEKTRA GRID -->
  <div id="elektra-ui" style="display:none">
    <div class="grid-container">
      <div class="room-grid" id="egrid"></div>
    </div>
  </div>

  <!-- ODA DETAY PANELİ -->
  <div class="room-panel" id="room-panel">
    <div class="panel-header">
      <div style="display:flex; align-items:center; gap:10px">
        <div class="panel-room-badge" id="panel-room-title">000</div>
        <button id="back-to-choice" style="display:none; background:transparent; border:none; color:#fff; font-size:20px; cursor:pointer;" onclick="showChoiceMenu()">←</button>
      </div>
      <div onclick="closePanel()" style="cursor:pointer; font-size:24px">✕</div>
    </div>

    <!-- SEÇİM EKRANI -->
    <div class="choice-container" id="panel-choice">
      <div class="choice-card" onclick="openSubMode('meter')">
        <span class="choice-icon">⚡</span>
        <h2>SAYAÇ İŞLEMLERİ</h2>
        <p>Okumaları gör ve yeni sayaç ekle</p>
      </div>
      <div class="choice-card" onclick="openSubMode('plate')">
        <span class="choice-icon">🚗</span>
        <h2>PLAKA İŞLEMLERİ</h2>
        <p>Odaya kayıtlı araç plakalarını yönet</p>
      </div>
    </div>

    <!-- SAYAÇ SUB-PANEL -->
    <div class="sub-content" id="sub-meter">
      <div class="nav-tabs">
        <button class="nav-tab-btn active" id="m-tab-list" onclick="switchTab('m', 'list')">OKUMALAR</button>
        <button class="nav-tab-btn" id="m-tab-add" onclick="switchTab('m', 'add')">YENİ SAYAÇ</button>
      </div>
      <div class="panel-scroll">
        <div id="m-list-view"></div>
        <div id="m-add-view" style="display:none">
           <div class="field"><label class="label">Okuma Tarihi</label><input type="date" id="m-date"></div>
           <div class="field"><label class="label">Not</label><textarea id="m-note" rows="3"></textarea></div>
           <div class="field">
             <button class="btn" style="width:100%; margin-bottom:10px" onclick="q('m-file').click()">Fotoğraf Seç</button>
             <input type="file" id="m-file" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files, 'm')">
             <div id="m-preview" class="thumb-grid"></div>
           </div>
           <button class="btn btn-primary" onclick="saveMeter()">KAYDET</button>
        </div>
      </div>
    </div>

    <!-- PLAKA SUB-PANEL -->
    <div class="sub-content" id="sub-plate">
      <div class="nav-tabs">
        <button class="nav-tab-btn active" id="p-tab-list" onclick="switchTab('p', 'list')">PLAKALAR</button>
        <button class="nav-tab-btn" id="p-tab-add" onclick="switchTab('p', 'add')">YENİ PLAKA</button>
      </div>
      <div class="panel-scroll">
        <div id="p-list-view"></div>
        <div id="p-add-view" style="display:none">
           <div class="field"><label class="label">Kayıt Tarihi</label><input type="date" id="p-date"></div>
           <div class="field"><label class="label">Plaka Numarası</label><input type="text" id="p-no" placeholder="34 ABC 123" style="text-transform:uppercase; font-family:monospace; font-weight:800"></div>
           <div class="field"><label class="label">Açıklama / Sahibi</label><textarea id="p-note" rows="3"></textarea></div>
           <button class="btn btn-primary" id="p-save-btn" onclick="savePlate()">PLAKAYI KAYDET</button>
        </div>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lb" onclick="this.classList.remove('open')">
    <img id="lb-img" src="">
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const SB='https://tpfdsmexywjnsbkfphwq.supabase.co';
const KEY='sb_publishable_3pKKUsVjgXPlF-DCzc2ofQ_Qmq3f00L';

let currentRoom = null;
let currentMode = 'demirbaş';
let pendingImages = [];

function q(id){return document.getElementById(id)}
function today(){return new Date().toISOString().slice(0,10)}
function showToast(m){const t=q('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);}

async function api(path, opts={}){
  return fetch(SB+path, {...opts, headers:{'apikey':KEY, 'Authorization':'Bearer '+KEY, 'Content-Type':'application/json', ...(opts.headers||{})}});
}

function setMode(m){
  currentMode = m;
  q('demirbas-ui').style.display = m==='demirbaş'?'block':'none';
  q('elektra-ui').style.display = m==='elektrik'?'block':'none';
  q('mode-d').classList.toggle('active', m==='demirbaş');
  q('mode-e').classList.toggle('active', m==='elektrik');
  if(m==='elektrik') renderGrid();
}

function renderGrid() {
  const grid = q('egrid'); grid.innerHTML = '';
  for (let f = 1; f <= 15; f++) {
    for (let r = 1; r <= 18; r++) {
      const rno = f * 100 + r;
      const cell = document.createElement('div');
      cell.className = 'room-cell';
      cell.textContent = rno;
      cell.onclick = () => openPanel(rno);
      grid.appendChild(cell);
    }
  }
}

function openPanel(rno){
  currentRoom = rno;
  q('panel-room-title').textContent = rno;
  q('room-panel').classList.add('open');
  showChoiceMenu();
}

function closePanel(){
  q('room-panel').classList.remove('open');
}

function showChoiceMenu(){
  q('panel-choice').style.display = 'flex';
  q('sub-meter').classList.remove('active');
  q('sub-plate').classList.remove('active');
  q('back-to-choice').style.display = 'none';
}

function openSubMode(mode){
  q('panel-choice').style.display = 'none';
  q('back-to-choice').style.display = 'block';
  if(mode === 'meter'){
    q('sub-meter').classList.add('active');
    switchTab('m', 'list');
  } else {
    q('sub-plate').classList.add('active');
    switchTab('p', 'list');
  }
}

function switchTab(prefix, type){
  q(`${prefix}-tab-list`).classList.toggle('active', type==='list');
  q(`${prefix}-tab-add`).classList.toggle('active', type==='add');
  q(`${prefix}-list-view`).style.display = type==='list'?'block':'none';
  q(`${prefix}-add-view`).style.display = type==='add'?'block':'none';
  
  if(type === 'add'){
    q(`${prefix}-date`).value = today();
    pendingImages = [];
    if(q(`${prefix}-preview`)) q(`${prefix}-preview`).innerHTML = '';
  } else {
    if(prefix === 'm') loadMeters(); else loadPlates();
  }
}

// FOTOĞRAF İŞLEMLERİ
function handleFiles(files, prefix){
  for(let f of files){
    const reader = new FileReader();
    reader.onload = (e) => {
      const id = Math.random().toString(36).substr(2,5);
      pendingImages.push({id, file: f, data: e.target.result});
      renderPrev(prefix);
    };
    reader.readAsDataURL(f);
  }
}

function renderPrev(prefix){
  q(`${prefix}-preview`).innerHTML = pendingImages.map(img => `
    <div class="thumb-item">
      <img src="${img.data}">
      <div class="thumb-del" onclick="pendingImages=pendingImages.filter(x=>x.id!=='${img.id}'); renderPrev('${prefix}')">✕</div>
    </div>
  `).join('');
}

// SAYAÇ (METER) CRUD
async function loadMeters(){
  const view = q('m-list-view'); view.innerHTML = 'Yükleniyor...';
  const res = await api(`/rest/v1/entries?room_no=eq.${currentRoom}&mode=eq.elektrik&order=checkin_date.desc`);
  const data = await res.json();
  if(!data.length) { view.innerHTML = '<p style="text-align:center; padding:20px; color:#888">Kayıt bulunamadı.</p>'; return; }
  
  view.innerHTML = data.map(e => `
    <div class="meter-card">
      <div class="meter-card-header">📅 ${e.checkin_date}</div>
      <div style="display:flex; overflow-x:auto; padding:10px; gap:8px">
        ${(e.photo_urls||[]).map(u => `<img src="${u}" style="height:80px; border-radius:6px" onclick="openLb('${u}')">`).join('')}
      </div>
      <div style="padding:10px; font-size:13px">${e.note || ''}</div>
      <div class="entry-footer">
        <button class="del-btn" onclick="deleteEntry('${e.id}', 'm')">Sil</button>
      </div>
    </div>
  `).join('');
}

async function saveMeter(){
  if(!pendingImages.length){ showToast('Fotoğraf ekleyin'); return; }
  const urls = [];
  for(let img of pendingImages){
    const name = `${Date.now()}_${img.id}.jpg`;
    const up = await fetch(`${SB}/storage/v1/object/meters/${currentRoom}/${name}`, {
      method:'POST', body: img.file, headers:{'apikey':KEY, 'Authorization':'Bearer '+KEY}
    });
    if(up.ok) urls.push(`${SB}/storage/v1/object/public/meters/${currentRoom}/${name}`);
  }
  await api('/rest/v1/entries', {
    method:'POST', body: JSON.stringify({room_no:String(currentRoom), mode:'elektrik', checkin_date:q('m-date').value, note:q('m-note').value, photo_urls:urls})
  });
  showToast('Kaydedildi');
  switchTab('m', 'list');
}

// PLAKA CRUD
async function loadPlates(){
  const view = q('p-list-view'); view.innerHTML = 'Yükleniyor...';
  const res = await api(`/rest/v1/entries?room_no=eq.${currentRoom}&mode=eq.plaka&order=checkin_date.desc`);
  const data = await res.json();
  if(!data.length) { view.innerHTML = '<p style="text-align:center; padding:20px; color:#888">Kayıtlı plaka yok.</p>'; return; }

  view.innerHTML = data.map(e => `
    <div class="plate-card">
      <div class="plate-card-header">📅 ${e.checkin_date}</div>
      <div class="plate-card-body">
        <span class="plate-no">${e.category}</span>
        <p style="font-size:13px; color:#555">${e.note || 'Açıklama yok'}</p>
      </div>
      <div class="entry-footer">
        <button class="link-btn wa-btn" onclick="sharePlate('${e.category}')">Paylaş</button>
        <button class="edit-btn" onclick="editPlate('${e.id}', '${e.category}', '${e.note}', '${e.checkin_date}')">Düzenle</button>
        <button class="del-btn" onclick="deleteEntry('${e.id}', 'p')">Sil</button>
      </div>
    </div>
  `).join('');
}

async function savePlate(){
  const plaka = q('p-no').value.trim().toUpperCase();
  if(!plaka){ showToast('Plaka girin'); return; }
  const body = {
    room_no: String(currentRoom),
    mode: 'plaka',
    checkin_date: q('p-date').value,
    category: plaka, // Plaka numarasını category alanında saklıyoruz
    note: q('p-note').value
  };
  
  await api('/rest/v1/entries', { method:'POST', body: JSON.stringify(body) });
  showToast('Plaka kaydedildi');
  q('p-no').value = ''; q('p-note').value = '';
  switchTab('p', 'list');
}

async function editPlate(id, plaka, note, date){
  const newPlaka = prompt("Plaka No:", plaka);
  if(newPlaka === null) return;
  const newNote = prompt("Açıklama:", note);
  await api(`/rest/v1/entries?id=eq.${id}`, {
    method:'PATCH', body: JSON.stringify({category: newPlaka.toUpperCase(), note: newNote})
  });
  loadPlates();
}

async function deleteEntry(id, prefix){
  if(!confirm('Bu kaydı silmek istediğinize emin misiniz?')) return;
  await api(`/rest/v1/entries?id=eq.${id}`, {method:'DELETE'});
  showToast('Silindi');
  if(prefix === 'm') loadMeters(); else loadPlates();
}

function sharePlate(plaka){
  const text = `Oda ${currentRoom} - Kayıtlı Plaka: ${plaka}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function openLb(url){
  q('lb-img').src = url;
  q('lb').classList.add('open');
}

// Başlangıç
setMode('elektrik');

</script>
</body>
</html>
