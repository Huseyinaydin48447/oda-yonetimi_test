<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oda Yönetimi · Demirbaş & Elektrik</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
        :root {
            --bg: #f5f4f0;
            --surface: #fff;
            --surface2: #f0efe9;
            --border: #e2e1d9;
            --text: #1a1a18;
            --muted: #7a7a72;
            --accent: #1a5c3a;
            --accent-light: #e8f2ec;
            --accent-mid: #2d7a52;
            --danger: #c0392b;
            --danger-light: #fdf0ee;
            --amber: #b45309;
            --amber-light: #fef3c7;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
        .app { max-width: 550px; margin: 0 auto; min-height: 100vh; background: var(--bg); }
        .app.wide { max-width: 1400px; } /* 18 sütun için genişletildi */
        
        .topbar { background: var(--accent); padding: 14px 16px 12px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
        .topbar h1 { font-size: 16px; font-weight: 600; color: #fff; flex: 1; }
        
        .mode-btns { display: flex; gap: 5px; }
        .mode-btn { padding: 5px 10px; font-size: 11px; font-weight: 600; border-radius: 99px; cursor: pointer; border: 1.5px solid rgba(255,255,255,.25); background: transparent; color: rgba(255,255,255,.7); }
        .mode-btn.active { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.6); color: #fff; }
        
        .nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 62px; z-index: 99; overflow-x: auto; }
        .nav-btn { flex: 1; padding: 11px 4px; font-size: 12px; font-weight: 500; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
        .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .screen { display: none; padding: 16px; }
        .screen.active { display: block; }
        
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; background: var(--surface); font-family: inherit; }
        .label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; font-weight: 500; }
        .btn { padding: 11px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); width: 100%; justify-content: center; padding: 13px; font-size: 15px; }
        
        /* Elektra Grid 18x15 */
        .grid-container { padding: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .room-grid { 
            display: grid; 
            grid-template-columns: repeat(18, 50px); /* 18 Sütun */
            gap: 2px; 
            width: max-content;
            margin: 0 auto;
        }
        .room-cell { 
            height: 38px; border-radius: 4px; display: flex; align-items: center; justify-content: center; 
            font-size: 13px; font-weight: 600; cursor: pointer; position: relative; border: 1px solid rgba(0,0,0,0.05);
        }
        .room-flag { position: absolute; top: 2px; right: 2px; width: 6px; height: 6px; border-radius: 50%; background: #00e5ff; }

        /* Kartlar */
        .entry-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
        .entry-head { padding: 10px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .date-badge { background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px; }
        .photo-gallery { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: var(--surface2); }
        .photo-card { width: 120px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); background: #fff; }
        .photo-card img { width: 100%; height: 90px; object-fit: cover; display: block; cursor: pointer; }
        
        /* Lightbox (Resim Büyütme) */
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 9000; flex-direction: column; }
        .lightbox.open { display: flex; }
        .lb-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #lb-img { max-width: 100%; max-height: 100%; transition: transform 0.2s; }
        .lb-topbar { display: flex; justify-content: space-between; padding: 15px; color: #fff; }
        .lb-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }

        /* Statlar */
        .elektra-top-stats { display: flex; overflow-x: auto; gap: 8px; padding: 12px; background: #fff; border-bottom: 1px solid var(--border); }
        .stat-badge { flex: 0 0 auto; padding: 8px 12px; border-radius: 8px; color: #fff; text-align: center; cursor: pointer; min-width: 80px; }
        
        /* Panel */
        .panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .room-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 450px; background: #fff; z-index: 1001; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; }
        .room-panel.open { transform: translateX(0); }
        
        /* Form */
        .photo-preview-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .photo-preview-item { position: relative; width: 80px; }
        .photo-preview-img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
        .photo-preview-del { position: absolute; top: -5px; right: -5px; background: var(--danger); color: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }

        /* Durum Renkleri */
        .status-dolu-temiz { background: #1565c0; color: #fff; }
        .status-dolu-kirli { background: #6a1a9a; color: #fff; }
        .status-cout { background: #2e7d32; color: #fff; }
        .status-temiz { background: #4caf50; color: #fff; }
        .status-kirli { background: #ff6d00; color: #fff; }
        .status-ooi { background: #880e4f; color: #fff; }
        .status-ariza { background: #546e7a; color: #fff; }
        .status-onaylı { background: #4a148c; color: #fff; }
        .status-bos { background: #fff; color: #888; border: 1px solid #ddd; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; z-index: 10000; display: none; }
        .loader { width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="topbar">
        <h1 id="topbar-title">Yükleniyor...</h1>
        <div class="mode-btns">
            <button class="mode-btn" id="mode-d" onclick="setMode('demirbaş')">Demirbaş</button>
            <button class="mode-btn" id="mode-e" onclick="setMode('elektrik')">Sayaç</button>
        </div>
    </div>

    <!-- ELEKTRA UI -->
    <div id="elektra-ui" style="display:none">
        <div class="elektra-top-stats" id="estats">
            <div class="stat-badge" style="background:#1565c0" onclick="toggleStatFilter('dolu-temiz')">DT: <span id="cnt-dt">0</span></div>
            <div class="stat-badge" style="background:#6a1a9a" onclick="toggleStatFilter('dolu-kirli')">DK: <span id="cnt-dk">0</span></div>
            <div class="stat-badge" style="background:#2e7d32" onclick="toggleStatFilter('cout')">CO: <span id="cnt-co">0</span></div>
            <div class="stat-badge" style="background:#4caf50" onclick="toggleStatFilter('temiz')">T: <span id="cnt-t">0</span></div>
            <div class="stat-badge" style="background:#ff6d00" onclick="toggleStatFilter('kirli')">K: <span id="cnt-k">0</span></div>
            <div class="stat-badge" style="background:#880e4f" onclick="toggleStatFilter('ooi')">OOI: <span id="cnt-ooi">0</span></div>
        </div>
        
        <div class="grid-container">
            <div class="room-grid" id="egrid"></div>
        </div>
    </div>

    <!-- DEMİRBAŞ UI -->
    <div id="demirbas-ui">
        <div class="nav">
            <button class="nav-btn active" onclick="goDemirbasTab(0)">Ara</button>
            <button class="nav-btn" onclick="goDemirbasTab(1)">Ekle</button>
            <button class="nav-btn" onclick="goDemirbasTab(2)">Hepsi</button>
        </div>
        <div class="screen active" id="ds0">
            <input type="number" id="dsinput" placeholder="Oda no girin..." style="margin-bottom:10px">
            <button class="btn btn-primary" onclick="demirbasSearch()">Ara</button>
            <div id="dsresult" style="margin-top:15px"></div>
        </div>
        <div class="screen" id="ds1">
            <div class="field"><span class="label">Oda No *</span><input id="f-room" type="number"></div>
            <div class="field"><span class="label">Tarih *</span><input id="f-date" type="date"></div>
            <div class="field"><span class="label">Not</span><textarea id="f-note" rows="2"></textarea></div>
            <div class="field">
                <span class="label">Fotoğraflar</span>
                <button class="btn" onclick="q('fgal').click()" style="width:100%;margin-bottom:10px">Resim Seç</button>
                <input type="file" id="fgal" multiple style="display:none" onchange="handleFiles(this.files, 'demirbas')">
                <div id="d-prev" class="photo-preview-wrap"></div>
            </div>
            <button class="btn btn-primary" id="d-save-btn" onclick="saveDemirbas()">Kaydet</button>
        </div>
        <div class="screen" id="ds2">
            <div id="rlist"></div>
        </div>
    </div>

    <!-- ODA PANELİ (ELEKTRA) -->
    <div class="panel-overlay" id="epanel-overlay" onclick="closeElektraPanel()"></div>
    <div class="room-panel" id="eroom-panel">
        <div style="background:var(--accent); color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="panel-room-title">Oda -</h2>
            <button onclick="closeElektraPanel()" style="background:none; border:none; color:#fff; font-size:20px;">✕</button>
        </div>
        <div style="display:flex; border-bottom:1px solid #ddd;">
            <button class="nav-btn active" id="btn-tab-list" onclick="switchPanelTab('list')">Kayıtlar</button>
            <button class="nav-btn" id="btn-tab-add" onclick="switchPanelTab('add')">Ekle</button>
            <button class="nav-btn" id="btn-tab-status" onclick="switchPanelTab('status')">Durum</button>
        </div>
        <div style="flex:1; overflow-y:auto; padding:15px;">
            <div id="tab-list" class="ptab-content"></div>
            <div id="tab-add" class="ptab-content" style="display:none">
                <input type="date" id="ef-date" style="margin-bottom:10px">
                <textarea id="ef-note" placeholder="Notunuz..." rows="3" style="margin-bottom:10px"></textarea>
                <button class="btn" onclick="q('ef-photos').click()" style="width:100%; margin-bottom:10px">Fotoğraf Seç</button>
                <input type="file" id="ef-photos" multiple style="display:none" onchange="handleFiles(this.files, 'elektra')">
                <div id="e-prev" class="photo-preview-wrap"></div>
                <button class="btn btn-primary" id="e-save-btn" onclick="saveElektraEntry()" style="margin-top:15px">Kaydet</button>
            </div>
            <div id="tab-status" class="ptab-content" style="display:none">
                <div id="status-opts">
                    <!-- Dinamik dolacak -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lb">
    <div class="lb-topbar">
        <span id="lb-counter">1/1</span>
        <button class="lb-close" onclick="closeLb()">✕</button>
    </div>
    <div class="lb-img-wrap" id="lb-img-wrap">
        <img id="lb-img" src="">
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- CONFIG & STATE ---
const SB = 'https://tpfdsmexywjnsbkfphwq.supabase.co';
const KEY = 'sb_publishable_3pKKUsVjgXPlF-DCzc2ofQ_Qmq3f00L';
const BUCKETS = { demirbaş: 'photos', elektrik: 'meters' };
let mode = 'demirbaş';
let currentRoom = null;
let roomStatuses = {};
let pendingFiles = [];
let roomsWithEntries = new Set();
let activeStatFilter = null;

const q = id => document.getElementById(id);
const today = () => new Date().toISOString().slice(0, 10);

async function api(path, opts = {}) {
    return fetch(SB + path, {
        ...opts,
        headers: {
            'apikey': KEY,
            'Authorization': 'Bearer ' + KEY,
            'Content-Type': 'application/json',
            ...(opts.headers || {})
        }
    });
}

// --- INITIALIZE ---
window.onload = () => {
    const saved = localStorage.getItem('activeMode') || 'demirbaş';
    setMode(saved);
    q('f-date').value = today();
    q('ef-date').value = today();
};

function setMode(m) {
    mode = m;
    localStorage.setItem('activeMode', m);
    q('mode-d').classList.toggle('active', m === 'demirbaş');
    q('mode-e').classList.toggle('active', m === 'elektrik');
    q('demirbas-ui').style.display = m === 'demirbaş' ? 'block' : 'none';
    q('elektra-ui').style.display = m === 'elektrik' ? 'block' : 'none';
    q('topbar-title').textContent = m === 'demirbaş' ? 'Demirbaş Takibi' : 'Elektra Sayaç';
    q('app').classList.toggle('wide', m === 'elektrik');
    
    if (m === 'elektrik') initElektra();
}

// --- ELEKTRA LOGIC ---
async function initElektra() {
    await loadStatuses();
    await loadRoomsWithEntries();
    renderGrid();
    updateStats();
}

async function loadStatuses() {
    try {
        const res = await api('/rest/v1/rooms?select=room_no,status');
        const data = await res.json();
        roomStatuses = {};
        data.forEach(r => roomStatuses[r.room_no] = r.status);
    } catch(e) {}
}

async function loadRoomsWithEntries() {
    try {
        const res = await api('/rest/v1/entries?mode=eq.elektrik&select=room_no');
        const data = await res.json();
        roomsWithEntries = new Set(data.map(d => String(d.room_no)));
    } catch(e) {}
}

function renderGrid() {
    const grid = q('egrid');
    grid.innerHTML = '';
    // 15 Kat, her katta 18 Oda = 270 Hücre
    for (let kat = 1; kat <= 15; kat++) {
        for (let oda = 1; oda <= 18; oda++) {
            const rno = kat * 100 + oda;
            const status = roomStatuses[rno] || 'bos';
            
            if (activeStatFilter && status !== activeStatFilter) {
                // Filtre varsa ve uymuyorsa boş göster veya pasif yap
            }

            const cell = document.createElement('div');
            cell.className = `room-cell status-${status}`;
            cell.textContent = rno;
            if (roomsWithEntries.has(String(rno))) {
                const flag = document.createElement('div');
                flag.className = 'room-flag';
                cell.appendChild(flag);
            }
            cell.onclick = () => openElektraPanel(rno);
            grid.appendChild(cell);
        }
    }
}

function updateStats() {
    const counts = { dt:0, dk:0, co:0, t:0, k:0, ooi:0 };
    Object.values(roomStatuses).forEach(s => {
        if(s === 'dolu-temiz') counts.dt++;
        if(s === 'dolu-kirli') counts.dk++;
        if(s === 'cout') counts.co++;
        if(s === 'temiz') counts.t++;
        if(s === 'kirli') counts.k++;
        if(s === 'ooi') counts.ooi++;
    });
    q('cnt-dt').textContent = counts.dt;
    q('cnt-dk').textContent = counts.dk;
    q('cnt-co').textContent = counts.co;
    q('cnt-t').textContent = counts.t;
    q('cnt-k').textContent = counts.k;
    q('cnt-ooi').textContent = counts.ooi;
}

// --- PANEL LOGIC ---
async function openElektraPanel(rno) {
    currentRoom = rno;
    q('panel-room-title').textContent = `Oda ${rno}`;
    q('eroom-panel').classList.add('open');
    q('epanel-overlay').style.display = 'block';
    switchPanelTab('list');
    loadRoomEntries(rno);
}

function closeElektraPanel() {
    q('eroom-panel').classList.remove('open');
    q('epanel-overlay').style.display = 'none';
    currentRoom = null;
}

function switchPanelTab(t) {
    document.querySelectorAll('.ptab-content').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    q('tab-' + t).style.display = 'block';
    q('btn-tab-' + t).classList.add('active');
    
    if(t === 'status') renderStatusOptions();
}

async function loadRoomEntries(rno) {
    const list = q('tab-list');
    list.innerHTML = 'Yükleniyor...';
    try {
        const res = await api(`/rest/v1/entries?room_no=eq.${rno}&mode=eq.elektrik&order=checkin_date.desc`);
        const data = await res.json();
        if(!data.length) { list.innerHTML = 'Kayıt bulunamadı.'; return; }
        
        list.innerHTML = data.map(entry => {
            const urls = entry.photo_urls || [];
            return `
                <div class="entry-card">
                    <div class="entry-head" onclick="toggleCard(this)">
                        <span class="date-badge">${entry.checkin_date}</span>
                        <div style="flex:1; font-size:13px; margin-left:10px">${entry.note || ''}</div>
                        <span style="font-size:12px; color:#888">📷 ${urls.length}</span>
                    </div>
                    <div class="entry-body" style="display:none; padding:10px; border-top:1px solid #eee">
                        <div class="photo-gallery">
                            ${urls.map((u, i) => `
                                <div class="photo-card">
                                    <img src="${u}" onclick="openLb(${JSON.stringify(urls)}, ${i})">
                                </div>
                            `).join('')}
                        </div>
                        <div style="margin-top:10px; display:flex; gap:5px">
                            <button class="btn" style="font-size:11px" onclick="toggleEdit('${entry.id}')">Düzenle</button>
                            <button class="btn" style="font-size:11px; color:red" onclick="deleteEntry('${entry.id}')">Sil</button>
                        </div>
                        <div id="edit-${entry.id}" style="display:none; margin-top:10px; background:#f9f9f9; padding:10px; border-radius:8px">
                            <input type="date" id="edate-${entry.id}" value="${entry.checkin_date}" style="margin-bottom:5px">
                            <textarea id="enote-${entry.id}" style="margin-bottom:5px">${entry.note || ''}</textarea>
                            <button class="btn btn-primary" onclick="saveUpdate('${entry.id}')">Güncelle</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    } catch(e) { list.innerHTML = 'Hata oluştu.'; }
}

function toggleCard(el) {
    const body = el.nextElementSibling;
    body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

function toggleEdit(id) {
    const el = q('edit-' + id);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// --- DOSYA İŞLEMLERİ ---
async function handleFiles(files, target) {
    for (const file of files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const id = Math.random().toString(36).substr(2, 9);
            pendingFiles.push({ id, file, data: e.target.result });
            renderPreviews(target);
        };
        reader.readAsDataURL(file);
    }
}

function renderPreviews(target) {
    const container = target === 'elektra' ? q('e-prev') : q('d-prev');
    container.innerHTML = pendingFiles.map(f => `
        <div class="photo-preview-item">
            <img src="${f.data}" class="photo-preview-img">
            <div class="photo-preview-del" onclick="removeFile('${f.id}', '${target}')">✕</div>
        </div>
    `).join('');
}

function removeFile(id, target) {
    pendingFiles = pendingFiles.filter(f => f.id !== id);
    renderPreviews(target);
}

// --- KAYDETME FONKSİYONLARI ---
async function saveElektraEntry() {
    if (!currentRoom || pendingFiles.length === 0) {
        toast('Lütfen oda seçin ve en az 1 resim ekleyin.');
        return;
    }
    const btn = q('e-save-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Kaydediliyor...';
    
    try {
        const urls = [];
        for (const f of pendingFiles) {
            const url = await uploadToSupabase(f.file, BUCKETS.elektrik);
            urls.push(url);
        }
        
        const payload = {
            room_no: String(currentRoom),
            checkin_date: q('ef-date').value,
            note: q('ef-note').value,
            mode: 'elektrik',
            photo_urls: urls
        };
        
        const res = await api('/rest/v1/entries', {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        
        if (res.ok) {
            toast('Kayıt başarıyla eklendi!');
            pendingFiles = [];
            q('ef-note').value = '';
            q('e-prev').innerHTML = '';
            loadRoomEntries(currentRoom);
            loadRoomsWithEntries();
            renderGrid();
        } else { throw new Error('DB Hatası'); }
    } catch(e) {
        toast('Hata: ' + e.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Kaydet';
    }
}

async function saveUpdate(id) {
    const date = q('edate-' + id).value;
    const note = q('enote-' + id).value;
    try {
        const res = await api(`/rest/v1/entries?id=eq.${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ checkin_date: date, note: note })
        });
        if(res.ok) {
            toast('Güncellendi');
            loadRoomEntries(currentRoom);
        }
    } catch(e) { toast('Güncellenemedi'); }
}

async function deleteEntry(id) {
    if(!confirm('Bu kaydı silmek istediğinize emin misiniz?')) return;
    try {
        const res = await api(`/rest/v1/entries?id=eq.${id}`, { method: 'DELETE' });
        if(res.ok) {
            toast('Silindi');
            loadRoomEntries(currentRoom);
            loadRoomsWithEntries();
            renderGrid();
        }
    } catch(e) { toast('Silinemedi'); }
}

async function uploadToSupabase(file, bucket) {
    const ext = file.name.split('.').pop();
    const name = `${Date.now()}_${Math.random().toString(36).substr(2,9)}.${ext}`;
    const path = `${currentRoom || 'all'}/${name}`;
    
    const res = await fetch(`${SB}/storage/v1/object/${bucket}/${path}`, {
        method: 'POST',
        headers: {
            'apikey': KEY,
            'Authorization': 'Bearer ' + KEY,
            'Content-Type': file.type
        },
        body: file
    });
    if(!res.ok) throw new Error('Resim yüklenemedi');
    return `${SB}/storage/v1/object/public/${bucket}/${path}`;
}

// --- LIGHTBOX ---
let lbList = [];
let lbIdx = 0;
function openLb(urls, idx) {
    lbList = urls;
    lbIdx = idx;
    q('lb-img').src = urls[idx];
    q('lb-counter').textContent = `${idx + 1} / ${urls.length}`;
    q('lb').classList.add('open');
}
function closeLb() { q('lb').classList.remove('open'); }

// --- UTILS ---
function toast(msg, type = 'success') {
    const t = q('toast');
    t.textContent = msg;
    t.style.display = 'block';
    t.style.background = type === 'error' ? '#c0392b' : '#333';
    setTimeout(() => t.style.display = 'none', 3000);
}

// Demirbaş tabları arası geçiş
function goDemirbasTab(i) {
    document.querySelectorAll('#demirbas-ui .screen').forEach((s, j) => s.classList.toggle('active', i === j));
    document.querySelectorAll('#demirbas-ui .nav-btn').forEach((b, j) => b.classList.toggle('active', i === j));
}

// Durum Güncelleme
function renderStatusOptions() {
    const statuses = [
        {id:'dolu-temiz', label:'Dolu Temiz', color:'#1565c0'},
        {id:'dolu-kirli', label:'Dolu Kirli', color:'#6a1a9a'},
        {id:'cout', label:'C/Out', color:'#2e7d32'},
        {id:'temiz', label:'Temiz', color:'#4caf50'},
        {id:'kirli', label:'Kirli', color:'#ff6d00'},
        {id:'ooi', label:'OOI', color:'#880e4f'},
        {id:'ariza', label:'Arıza', color:'#546e7a'},
        {id:'onaylı', label:'Onaylı', color:'#4a148c'},
        {id:'bos', label:'Boş', color:'#888'}
    ];
    const current = roomStatuses[currentRoom] || 'bos';
    q('status-opts').innerHTML = statuses.map(s => `
        <div onclick="updateRoomStatus('${s.id}')" style="padding:12px; margin-bottom:5px; border-radius:8px; background:${s.color}; color:#fff; cursor:pointer; display:flex; justify-content:space-between;">
            ${s.label} ${current === s.id ? '✓' : ''}
        </div>
    `).join('');
}

async function updateRoomStatus(newStatus) {
    try {
        const res = await api('/rest/v1/rooms', {
            method: 'POST',
            headers: { 'Prefer': 'resolution=merge-duplicates' },
            body: JSON.stringify({ room_no: currentRoom, status: newStatus })
        });
        if(res.ok) {
            roomStatuses[currentRoom] = newStatus;
            toast('Durum güncellendi');
            renderStatusOptions();
            renderGrid();
            updateStats();
        }
    } catch(e) { toast('Hata!'); }
}

</script>
