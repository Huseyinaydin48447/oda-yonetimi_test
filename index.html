<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Oda Yönetimi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e1d9;
    --text:#1a1a18;--muted:#7a7a72;--accent:#1a5c3a;--accent-light:#e8f2ec;
    --accent-mid:#2d7a52;--danger:#c0392b;--danger-light:#fdf0ee;
    --amber:#b45309;--amber-light:#fef3c7;--radius:12px;--radius-sm:8px;
  }
  .wa-btn{ color:#25D366; border-color:#b7f0c8; background:#eafaf0; }
  .wa-btn:active{ background:#dff5e7; }

  /* YAN YANA GÖRÜNÜM İÇİN GRID */
  .entries-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
  }
  
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}
  .topbar{background:var(--accent);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
  .topbar-icon{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .topbar h1{font-size:16px;font-weight:600;color:#fff}
  .topbar p{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
  .mode-btns{display:flex;gap:5px;flex-shrink:0}
  .mode-btn{padding:5px 10px;font-size:11px;font-weight:600;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.7)}
  .mode-btn.active{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.6);color:#fff}
  .nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:99}
  .nav-btn{flex:1;padding:11px 4px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;transition:all .15s}
  .nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  .screen{display:none;padding:16px}
  .screen.active{display:block}
  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif}
  .field{margin-bottom:14px}
  .label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:500}
  .btn{padding:11px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);width:100%;justify-content:center;padding:13px;font-size:15px}
  .btn-sm{padding:9px 14px;font-size:13px}
  .btn-danger{background:var(--danger-light);color:var(--danger);border-color:#f5c6c2}
  .search-wrap{display:flex;gap:8px;margin-bottom:16px}
  .room-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .room-num{background:var(--accent-light);color:var(--accent);font-size:22px;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);font-family:'DM Mono',monospace;flex-shrink:0}
  .room-num.e{background:var(--amber-light);color:var(--amber)}
  .room-summary{flex:1}
  .room-summary strong{font-size:14px;font-weight:500;display:block}
  .room-summary span{font-size:12px;color:var(--muted)}
  .entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px; display: flex; flex-direction: column;}
  .entry-head{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer; border-bottom: 1px solid #f0f0f0;}
  .entry-head:active{background:var(--surface2)}
  .date-badge{display:inline-flex;align-items:center;gap:4px;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:600;padding:4px 8px;border-radius:99px;flex-shrink:0}
  .date-badge.e{background:var(--amber-light);color:var(--amber)}
  .entry-meta{flex:1;min-width:0;overflow:hidden}
  .entry-count{font-size:11px;color:var(--muted);background:var(--surface2);border-radius:99px;padding:3px 8px;white-space:nowrap;flex-shrink:0}
  .chevron{transition:transform .2s;flex-shrink:0}
  .chevron.open{transform:rotate(90deg)}
  .entry-body{display:none}
  .entry-body.open{display:block}
  .img-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;scrollbar-width:none}
  .img-thumb{width:100%; aspect-ratio: 4/3; border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);flex-shrink:0;cursor:pointer;position:relative}
  .img-thumb img{width:100%;height:100%;object-fit:cover}
  .img-label{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;}
  .img-label.giris{background:#1a5c3a;}
  .img-label.cikis{background:#c0392b;}
  .img-thumb-del{display:none;position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(192,57,43,.9);color:#fff;font-size:11px;align-items:center;justify-content:center;border:none;}
  .edit-mode .img-thumb-del{display:flex}
  .entry-footer{border-top:1px solid var(--border);padding:10px 14px;background:var(--surface2); display: flex; flex-direction: column; gap: 8px;}
  .entry-footer-info{font-size:11px;color:var(--muted); font-weight: 500;}
  .entry-footer-actions{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .link-btn, .edit-btn, .del-btn{padding:5px 8px; border-radius:6px; font-size:11px; font-weight:500; border:1px solid var(--border); background:var(--surface); cursor:pointer; display:inline-flex; align-items:center; gap:3px;}
  .del-btn{color:var(--danger); background:var(--danger-light);}
  
  /* SAYAÇ KUTUCUKLARI STİLİ */
  .meter-row { display:flex; gap:4px; margin-top:4px; }
  .meter-box { background:#e8f2ec; color:#1a5c3a; padding:3px 6px; border-radius:6px; font-size:11px; font-family:'DM Mono',monospace; font-weight:600; border:1px solid #b7f0c8; flex:1; text-align:center; }

  /* LIGHTBOX & TOAST (Diğer stiller aynı kalıyor) */
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;}
  .lightbox.open{display:flex}
  .lb-img-wrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;}
  #lb-img{max-width:100%;max-height:100%;object-fit:contain;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:13px;padding:10px 20px;border-radius:99px;z-index:999;display:none;}
  .toast.show{display:block}
  .toast.success{background:var(--accent)}
  .status-bar{background:var(--accent-light);border:1px solid #b8ddc8;border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:6px}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .tag{padding:5px 12px;border-radius:99px;font-size:12px;border:1px solid var(--border);cursor:pointer;color:var(--muted);background:var(--surface);}
  .tag.on{background:var(--accent-light);color:var(--accent);border-color:var(--accent-mid)}
  .all-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;cursor:pointer}
  .all-card-inner{padding:12px 14px;display:flex;align-items:center;gap:10px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2M8 7V5a2 2 0 0 0-4 0v2"/></svg></div>
    <div style="flex:1"><h1 id="topbar-title">Yükleniyor...</h1><p id="topbar-sub">Bağlanıyor...</p></div>
    <div class="mode-btns">
      <button class="mode-btn active" id="mode-d" onclick="setMode('demirbaş')">Demirbaş</button>
      <button class="mode-btn" id="mode-e" onclick="setMode('elektrik')">Sayaç</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="goTab(0)">Ara</button>
    <button class="nav-btn" onclick="goTab(1)">Ekle</button>
    <button class="nav-btn" onclick="goTab(2)">Tüm Odalar</button>
  </div>

  <!-- SEARCH TAB -->
  <div class="screen active" id="s0">
    <div style="display:flex;gap:6px;margin-bottom:14px;background:var(--surface2);border-radius:var(--radius-sm);padding:4px">
      <button id="stab-room" class="btn" style="flex:1;justify-content:center;font-size:13px;padding:8px;background:var(--accent);color:#fff;" onclick="setSTab('room')">Oda No</button>
      <button id="stab-date" class="btn" style="flex:1;justify-content:center;font-size:13px;padding:8px;background:transparent;color:var(--muted);" onclick="setSTab('date')">Tarih Aralığı</button>
    </div>
    <div id="stab-room-content">
      <div class="search-wrap">
        <input id="sinput" type="number" placeholder="Oda no girin"/>
        <button class="btn btn-sm" style="background:var(--accent);color:#fff;" onclick="doSearch(document.getElementById('sinput').value)">Ara</button>
      </div>
    </div>
    <div id="stab-date-content" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:10px;align-items:flex-end">
        <div style="flex:1"><span class="label">Başlangıç</span><input id="d-from" type="date"/></div>
        <div style="flex:1"><span class="label">Bitiş</span><input id="d-to" type="date"/></div>
        <button class="btn btn-sm" style="background:var(--accent);color:#fff;" onclick="doDateSearch()">Ara</button>
      </div>
    </div>
    <div id="sresult"></div>
  </div>

  <!-- ADD TAB -->
  <div class="screen" id="s1">
    <div class="status-bar"><div class="status-dot"></div><span id="conn-text">Bağlanıyor...</span></div>
    <div class="field" id="io-type-field" style="display:none;">
      <span class="label">İşlem Türü</span>
      <select id="f-type"><option value="giris">Giriş</option><option value="cikis">Çıkış</option></select>
    </div>
    <div class="field" id="meter-values-field" style="display:none;">
      <span class="label">Sayaç Değerleri (L1, L2, L3)</span>
      <div style="display:flex; gap:8px;">
        <input type="number" step="0.01" id="f-l1" placeholder="L1" value="0.00" style="text-align:center">
        <input type="number" step="0.01" id="f-l2" placeholder="L2" value="0.00" style="text-align:center">
        <input type="number" step="0.01" id="f-l3" placeholder="L3" value="0.00" style="text-align:center">
      </div>
    </div>
    <div class="field"><span class="label" id="f-room-label">Oda No *</span><input id="f-room" type="number"/></div>
    <div class="field"><span class="label" id="f-date-label">Tarih *</span><input id="f-date" type="date"/></div>
    <div class="field"><span class="label">Kategori</span><div class="tags-row" id="f-tags"></div></div>
    <div class="field"><span class="label">Not</span><textarea id="f-note" rows="2"></textarea></div>
    <div class="field">
      <span class="label">Fotoğraflar *</span>
      <div style="display:flex;gap:10px;margin-bottom:10px;">
        <button class="btn" style="flex:1;flex-direction:column;padding:12px;" onclick="document.getElementById('fcam').click()">Kamera</button>
        <button class="btn" style="flex:1;flex-direction:column;padding:12px;" onclick="document.getElementById('fgal').click()">Galeri</button>
      </div>
      <input type="file" id="fgal" accept="image/*" multiple style="display:none" onchange="addFiles(this.files)"/>
      <input type="file" id="fcam" accept="image/*" capture="environment" style="display:none" onchange="addFiles(this.files)"/>
      <div class="prev-row" id="prev-row"></div>
    </div>
    <button class="btn btn-primary" id="save-btn" onclick="saveEntry()"><span id="save-label">Kaydet</span></button>
  </div>

  <!-- ALL ROOMS -->
  <div class="screen" id="s2"><div id="rlist"></div></div>
</div>

<div class="lightbox" id="lb" onclick="if(event.target===this)closeLb()">
  <div class="lb-img-wrap"><img id="lb-img" src=""/></div>
  <button style="position:absolute;top:20px;right:20px;background:#fff;border:none;padding:10px;border-radius:50%" onclick="closeLb()">✕</button>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const SB='https://tpfdsmexywjnsbkfphwq.supabase.co';
const KEY='sb_publishable_3pKKUsVjgXPlF-DCzc2ofQ_Qmq3f00L';
const BUCKETS={'demirbaş':'photos','elektrik':'meters'};
const MODES={
  'demirbaş':{title:'Demirbaş Takibi',ph:'Oda no girin',rl:'Oda numarası *',dl:'Giriş tarihi *',tags:['1+1','2+1']},
  'elektrik':{title:'Elektrik Sayacı',ph:'Sayaç no girin',rl:'Sayaç / Oda no *',dl:'Okuma tarihi *',tags:['1. Kat','2. Kat','3. Kat','4. Kat','5. Kat']}
};

let mode='demirbaş', tab=0, lastVal='', pending=[], selTags=[], entryImages={}, entryData={}, openEntries=new Set();

// YARDIMCI FONKSİYONLAR
function q(id){return document.getElementById(id)}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');const ay=['Oca','Sub','Mar','Nis','May','Haz','Tem','Agu','Eyl','Eki','Kas','Ara'];return`${parseInt(d)} ${ay[parseInt(m)-1]} ${y}`;}
function showToast(msg,type=''){const t=q('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3000);}

async function api(path,opts={}){return fetch(SB+path,{...opts,headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json',...(opts.headers||{})}});}

// MOD AYARLARI
function setMode(m){
  mode=m;
  const cfg=MODES[m];
  q('topbar-title').textContent=cfg.title;
  q('io-type-field').style.display = (m==='elektrik'?'block':'none');
  q('meter-values-field').style.display = (m==='elektrik'?'block':'none');
  q('f-tags').innerHTML=cfg.tags.map(t=>`<span class="tag" onclick="togTag(this)">${t}</span>`).join('');
  q('mode-d').classList.toggle('active',m==='demirbaş');
  q('mode-e').classList.toggle('active',m==='elektrik');
  if(lastVal) doSearch(lastVal);
}

function togTag(el){
  el.parentNode.querySelectorAll('.tag').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  selTags=[el.textContent];
}

// KART OLUŞTURMA (L1, L2, L3 ALTA ALINDI)
function buildEntryCard(entry, globalIdx, isE, showRoomNum){
  const urls=entry.photo_urls||[];
  entryImages[globalIdx]=urls;
  entryData[globalIdx]=entry;
  
  const meterHtml = (isE && entry.meter_values) ? 
    `<div class="meter-row">
      <div class="meter-box">L1: ${entry.meter_values.l1}</div>
      <div class="meter-box">L2: ${entry.meter_values.l2}</div>
      <div class="meter-box">L3: ${entry.meter_values.l3}</div>
    </div>` : '';

  const imgs=urls.map((u,i)=>`
    <div class="img-thumb" onclick="openLb(${globalIdx},${i})">
      <img src="${u}" loading="lazy"/>
      ${entry.type ? `<div class="img-label ${entry.type}">${entry.type==='cikis'?'Çıkış':'Giriş'}</div>` : ''}
    </div>`).join('');

  return `
  <div class="entry-card">
    <div class="entry-head" onclick="toggleEntry(this)">
      <div class="date-badge ${isE?'e':''}">${entry.type==='cikis'?'Çıkış':'Giriş'}</div>
      <div class="entry-meta" style="font-size:12px;font-weight:500">${fmtDate(entry.checkin_date)}</div>
      <span class="entry-count">${urls.length} foto</span>
    </div>
    <div class="entry-body open">
      <div style="padding:8px 10px">${imgs}</div>
      <div class="entry-footer">
        <div style="display:flex; flex-direction:column;">
          <span class="entry-footer-info">${urls.length} fotoğraf · ${fmtDate(entry.checkin_date)}</span>
          ${meterHtml}
        </div>
        <div class="entry-footer-actions">
          <button class="link-btn wa-btn" onclick="window.open('https://web.whatsapp.com/')">WA</button>
          <button class="link-btn">Link</button>
          <button class="edit-btn">Düzenle</button>
          <button class="del-btn" onclick="deleteEntry('${entry.id}',${globalIdx})">Sil</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ARAMA VE GRID GÖRÜNÜMÜ
async function doSearch(val){
  if(!val) return;
  lastVal=val;
  const el=q('sresult');
  el.innerHTML='<div class="empty">Aranıyor...</div>';
  try{
    const res=await api(`/rest/v1/entries?room_no=eq.${val}&mode=eq.${mode}&order=checkin_date.desc`);
    const data=await res.json();
    if(!data.length){ el.innerHTML='<div class="empty">Kayıt bulunamadı</div>'; return; }
    
    const grouped={};
    data.forEach(e=>{ if(!grouped[e.checkin_date])grouped[e.checkin_date]=[]; grouped[e.checkin_date].push(e); });
    
    let html=`<div class="room-header"><div class="room-num ${mode==='elektrik'?'e':''}">${val}</div><div class="room-summary"><strong>Oda ${val}</strong><span>${data.length} Kayıt</span></div></div>`;
    
    const dates=Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a));
    let gIdx=0;
    dates.forEach(d=>{
      html+=`<div style="margin-bottom:8px;font-size:12px;font-weight:600;color:var(--muted)">📅 ${fmtDate(d)}</div>`;
      html+=`<div class="entries-grid">`;
      grouped[d].forEach(entry=>{
        html+=buildEntryCard(entry, gIdx++, mode==='elektrik', false);
      });
      html+=`</div>`;
    });
    el.innerHTML=html;
  }catch(e){ el.innerHTML='Hata oluştu'; }
}

// KAYIT FONKSİYONU (ONDALIKLI SAYI VE TYPE KONTROLÜ)
async function saveEntry(){
  const roomNo=q('f-room').value, date=q('f-date').value, type=q('f-type').value;
  if(!roomNo || !date || pending.length===0){ showToast('Eksik bilgi!','error'); return; }

  const meterValues = mode==='elektrik' ? {
    l1: parseFloat(q('f-l1').value)||0,
    l2: parseFloat(q('f-l2').value)||0,
    l3: parseFloat(q('f-l3').value)||0
  } : null;

  q('save-btn').disabled=true;
  q('save-label').textContent='Yükleniyor...';

  try {
    const urls=[];
    for(const p of pending) {
      const path=`${roomNo}/${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
      const r=await fetch(`${SB}/storage/v1/object/${BUCKETS[mode]}/${path}`,{
        method:'POST',
        headers:{'apikey':KEY,'Authorization':'Bearer '+KEY, 'Content-Type':p.file.type},
        body:p.file
      });
      if(r.ok) urls.push(`${SB}/storage/v1/object/public/${BUCKETS[mode]}/${path}`);
    }

    const body={ room_no:roomNo, mode:mode, checkin_date:date, type:type, photo_urls:urls, meter_values:meterValues, note:q('f-note').value, category:selTags.join(',') };
    await api('/rest/v1/entries',{method:'POST', body:JSON.stringify(body)});
    
    showToast('Kaydedildi!','success');
    q('f-room').value=''; q('f-note').value=''; pending=[]; q('prev-row').innerHTML='';
    if(lastVal===roomNo) doSearch(roomNo);
  } catch(e) { showToast('Hata!','error'); }
  finally { q('save-btn').disabled=false; q('save-label').textContent='Kaydet'; }
}

// DİĞER FONKSİYONLAR
function goTab(i){
  tab=i;
  document.querySelectorAll('.nav-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
  document.querySelectorAll('.screen').forEach((s,j)=>s.classList.toggle('active',i===j));
  if(i===2) loadAll();
}
function setSTab(t){
  q('stab-room-content').style.display=(t==='room'?'block':'none');
  q('stab-date-content').style.display=(t==='date'?'block':'none');
}
function toggleEntry(h){const b=h.nextElementSibling; b.style.display=(b.style.display==='block'?'none':'block');}
function openLb(ei,ii){ q('lb-img').src=entryImages[ei][ii]; q('lb').classList.add('open'); }
function closeLb(){ q('lb').classList.remove('open'); }
function addFiles(files){ for(const f of files){ pending.push({file:f, url:URL.createObjectURL(f)}); } renderPrev(); }
function renderPrev(){ q('prev-row').innerHTML=pending.map(p=>`<img src="${p.url}" style="width:60px;height:45px;object-fit:cover;border-radius:4px">`).join(' '); }

async function loadAll(){
  const res=await api(`/rest/v1/entries?select=room_no,checkin_date,photo_urls&mode=eq.${mode}&order=room_no.asc`);
  const data=await res.json();
  q('rlist').innerHTML = data.map(r=>`<div class="all-card" onclick="goRoom('${r.room_no}')"><div class="all-card-inner">Oda ${r.room_no} <span style="margin-left:auto;color:var(--muted)">${r.photo_urls?.length||0} Foto</span></div></div>`).join('');
}
function goRoom(n){ q('sinput').value=n; goTab(0); doSearch(n); }

window.onload=()=>{ q('f-date').value=today(); setMode('demirbaş'); };
</script>
</body>
