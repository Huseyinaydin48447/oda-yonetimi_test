<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
    <title>Oda Yönetimi · Demirbaş & Elektrik</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
        :root {
            --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e1d9;
            --text:#1a1a18;--muted:#7a7a72;--accent:#1a5c3a;--accent-light:#e8f2ec;
            --accent-mid:#2d7a52;--danger:#c0392b;--danger-light:#fdf0ee;
            --amber:#b45309;--amber-light:#fef3c7;--radius:12px;--radius-sm:8px;
            --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
        .app{max-width:550px;margin:0 auto;min-height:100vh;background:var(--bg)}
        .topbar{background:var(--accent);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
        .topbar-icon{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .topbar h1{font-size:16px;font-weight:600;color:#fff}
        .topbar p{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
        .mode-btns{display:flex;gap:5px;flex-shrink:0}
        .mode-btn{padding:5px 10px;font-size:11px;font-weight:600;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.7)}
        .mode-btn.active{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.6);color:#fff}
        .nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:99;overflow-x:auto}
        .nav-btn{flex:1;padding:11px 4px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
        .nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
        .screen{display:none;padding:16px}
        .screen.active{display:block}
        input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
        input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,92,58,.1)}
        .field{margin-bottom:14px}
        .label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:500}
        .btn{padding:11px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
        .btn:active{transform:scale(.98)}
        .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);width:100%;justify-content:center;padding:13px;font-size:15px}
        .btn-primary:disabled{background:var(--muted);border-color:var(--muted);cursor:not-allowed}
        .btn-sm{padding:9px 14px;font-size:13px}
        .btn-danger{background:var(--danger-light);color:var(--danger);border-color:#f5c6c2}
        .search-wrap{display:flex;gap:8px;margin-bottom:16px}
        .search-wrap input{flex:1;font-size:16px;font-weight:500}
        .room-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
        .room-num{background:var(--accent-light);color:var(--accent);font-size:22px;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);font-family:'DM Mono',monospace;flex-shrink:0}
        .room-num.e{background:var(--amber-light);color:var(--amber)}
        .room-summary{flex:1}
        .entries-grid{display:flex;flex-wrap:wrap;gap:10px;align-items:start}
        .entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex:1 1 250px;max-width:100%}
        .entry-head{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
        .entry-head:active{background:var(--surface2)}
        .date-badge{display:inline-flex;align-items:center;gap:5px;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:600;padding:4px 10px;border-radius:99px;flex-shrink:0}
        .date-badge.e{background:var(--amber-light);color:var(--amber)}
        .entry-meta{flex:1;min-width:0;overflow:hidden}
        .chevron{transition:transform .2s;flex-shrink:0}
        .chevron.open{transform:rotate(90deg)}
        .entry-body{display:none}
        .entry-body.open{display:block}
        .img-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;scrollbar-width:none}
        .img-scroll::-webkit-scrollbar{display:none}
        .img-thumb{width:120px;height:90px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);flex-shrink:0;cursor:pointer;position:relative}
        .img-thumb img{width:100%;height:100%;object-fit:cover}
        .img-thumb-del{display:none;position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(192,57,43,.9);color:#fff;font-size:11px;align-items:center;justify-content:center;cursor:pointer;z-index:2;border:none}
        .edit-mode .img-thumb-del{display:flex}
        .img-desc{font-size:10px;color:var(--muted);background:var(--surface2);padding:2px 4px;border-radius:4px;word-break:break-word;margin-top:2px}
        .entry-footer{border-top:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surface2);flex-wrap:wrap}
        .tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
        .tag{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500;border:1px solid var(--border);cursor:pointer;color:var(--muted);background:var(--surface);transition:all .12s;font-family:'DM Sans',sans-serif}
        .tag.on{background:var(--accent-light);color:var(--accent);border-color:var(--accent-mid)}
        .drop-zone{border:1.5px dashed var(--border);border-radius:var(--radius);padding:14px;text-align:center;cursor:pointer;background:var(--surface2)}
        .prev-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
        .prev-item{position:relative;width:80px;height:60px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
        .prev-item img{width:100%;height:100%;object-fit:cover}
        .prev-del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(192,57,43,.85);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .all-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;cursor:pointer}
        .all-card-inner{padding:12px 14px;display:flex;align-items:center;gap:10px}
        .empty{text-align:center;padding:40px 16px;color:var(--muted)}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:99px;z-index:999;display:none}
        .toast.show{display:block}
        .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center}
        .lightbox.open{display:flex}
        /* diğer lightbox stilleri aynen korunabilir, kısalttım */
    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <div class="topbar-icon">🏨</div>
        <div style="flex:1"><h1 id="topbar-title">Demirbaş Takibi</h1><p id="topbar-sub">Bağlanıyor...</p></div>
        <div class="mode-btns">
            <button class="mode-btn active" id="mode-d" onclick="setMode('demirbaş')">Demirbaş</button>
            <button class="mode-btn" id="mode-e" onclick="setMode('elektrik')">Sayaç</button>
        </div>
    </div>
    <div class="nav" id="main-nav">
        <button class="nav-btn active" onclick="goTab(0)">Ara</button>
        <button class="nav-btn" onclick="goTab(1)">Ekle</button>
        <button class="nav-btn" onclick="goTab(2)">Tüm Odalar</button>
    </div>

    <!-- ARA -->
    <div class="screen active" id="s0">
        <div style="display:flex;gap:6px;margin-bottom:14px;background:var(--surface2);border-radius:var(--radius-sm);padding:4px">
            <button id="stab-room" class="btn" style="flex:1;justify-content:center;font-size:13px;padding:8px;background:var(--accent);color:#fff;border-color:var(--accent)" onclick="setSTab('room')">Oda No</button>
            <button id="stab-date" class="btn" style="flex:1;justify-content:center;font-size:13px;padding:8px;background:transparent;border-color:transparent;color:var(--muted)" onclick="setSTab('date')">Tarih Aralığı</button>
        </div>
        <div id="stab-room-content"><div class="search-wrap"><input id="sinput" type="number" placeholder="Oda no girin" onkeydown="if(event.key==='Enter')doSearch(this.value)"><button class="btn btn-sm" style="background:var(--accent);color:#fff;border-color:var(--accent)" onclick="doSearch(document.getElementById('sinput').value)">Ara</button></div></div>
        <div id="stab-date-content" style="display:none"><div style="display:flex;gap:8px;align-items:flex-end"><div style="flex:1"><span class="label">Başlangıç</span><input id="d-from" type="date"></div><div style="flex:1"><span class="label">Bitiş</span><input id="d-to" type="date"></div><button class="btn btn-sm" style="background:var(--accent);color:#fff;border-color:var(--accent)" onclick="doDateSearch()">Ara</button></div></div>
        <div id="sresult"><div class="empty">Numara girin</div></div>
    </div>

    <!-- EKLE -->
    <div class="screen" id="s1">
        <div class="field" id="donem-field"><span class="label">Dönem Aralığı</span><select id="f-donem"><option value="">Seçiniz</option><option>1 - 15 Ocak</option><option>16 - 30 Ocak</option></select></div>
        <div class="field" id="io-type-field" style="display:none"><span class="label">İşlem Türü</span><select id="f-type"><option value="giris">Giriş</option><option value="cikis">Çıkış</option></select></div>
        <div class="field"><span class="label" id="f-room-label">Oda numarası *</span><input id="f-room" type="number" placeholder="örn: 307"></div>
        <div class="field"><span class="label" id="f-date-label">Giriş tarihi *</span><input id="f-date" type="date"></div>
        <div class="field"><span class="label">Kategori</span><div class="tags-row" id="f-tags"></div></div>
        <div class="field"><span class="label">Not</span><textarea id="f-note" rows="2" placeholder="Açıklama..."></textarea></div>
        <div class="field"><span class="label">Fotoğraflar *</span>
            <div style="display:flex;gap:10px;margin-bottom:10px">
                <button type="button" class="btn" style="flex:1;justify-content:center;flex-direction:column;gap:6px" onclick="document.getElementById('fcam').click()">📷 Fotoğraf Çek</button>
                <button type="button" class="btn" style="flex:1;justify-content:center;flex-direction:column;gap:6px" onclick="document.getElementById('fgal').click()">🖼 Galeriden Seç</button>
            </div>
            <div class="drop-zone" id="dropz" onclick="document.getElementById('fgal').click()"><p>veya buraya sürükle bırak</p></div>
            <input type="file" id="fgal" accept="image/*" multiple style="display:none" onchange="addFiles(this.files)">
            <input type="file" id="fcam" accept="image/*" capture="environment" style="display:none" onchange="addFiles(this.files)">
            <div id="compress-status"></div>
            <div class="prev-row" id="prev-row"></div>
            <div id="progress-wrap" class="progress-bar-wrap"><div id="progress-bar" class="progress-bar"></div></div>
        </div>
        <button class="btn btn-primary" id="save-btn" onclick="saveEntry()">Kaydet</button>
    </div>

    <!-- TÜM ODALAR -->
    <div class="screen" id="s2"><div id="rlist"><div class="empty">Yükleniyor...</div></div></div>
</div>

<!-- LIGHTBOX, CONFIRM, TOAST aynen kalacak, kısalttım -->
<div class="lightbox" id="lb"><div class="lb-topbar"><span id="lb-lbl"></span><button onclick="closeLb()">✕</button></div><img id="lb-img" src=""></div>
<div class="confirm-overlay" id="confirm-overlay"><div class="confirm-sheet"><h3 id="confirm-title"></h3><p id="confirm-msg"></p><button onclick="closeConfirm()">İptal</button><button id="confirm-ok">Sil</button></div></div>
<div class="toast" id="toast"></div>

<script>
const SB='https://tpfdsmexywjnsbkfphwq.supabase.co',KEY='sb_publishable_3pKKUsVjgXPlF-DCzc2ofQ_Qmq3f00L';
const BUCKETS={demirbaş:'photos',elektrik:'meters'};
const MODES={
  demirbaş:{title:'Demirbaş Takibi',tags:['1+1','2+1']},
  elektrik:{title:'Elektrik Sayacı',tags:['1. Kat','2. Kat','3. Kat','4. Kat','5. Kat','6. Kat','7. Kat','8. Kat']}
};
let mode='demirbaş',tab=0,pending=[],selTags=[],openEntries=new Set(),searchTab='room';
let entryImages={},entryData={},lastVal='';
const CMAX=1600,CQ=0.82;

function q(id){return document.getElementById(id)}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');const ay=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];return parseInt(d)+' '+ay[parseInt(m)-1]+' '+y.slice(2)}
function showToast(msg,type=''){const t=q('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3000)}
function openConfirm(title,msg,cb){q('confirm-title').textContent=title;q('confirm-msg').textContent=msg;q('confirm-ok').onclick=()=>{cb();closeConfirm()};q('confirm-overlay').classList.add('open')}
function closeConfirm(){q('confirm-overlay').classList.remove('open')}

function setMode(m){
  mode=m;const isE=m==='elektrik';
  q('io-type-field').style.display=isE?'block':'none';
  q('donem-field').style.display=isE?'none':'block';
  q('topbar-title').textContent=MODES[m].title;
  q('f-tags').innerHTML=MODES[m].tags.map(t=>`<span class="tag" onclick="togTag(this)">${t}</span>`).join('');
  q('mode-d').classList.toggle('active',!isE); q('mode-e').classList.toggle('active',isE);
  selTags=[];openEntries.clear();if(lastVal)doSearch(lastVal,true);if(tab===2)loadAll(true);
}
function goTab(i){tab=i;document.querySelectorAll('.nav-btn').forEach((b,j)=>b.classList.toggle('active',j===i));document.querySelectorAll('.screen').forEach((s,j)=>s.classList.toggle('active',j===i));if(i===2)loadAll()}
function setSTab(t){searchTab=t;q('stab-room-content').style.display=t==='room'?'block':'none';q('stab-date-content').style.display=t==='date'?'block':'none';}

async function doSearch(val,silent=false){
  val=String(val).trim();lastVal=val;const el=q('sresult');
  if(!val){el.innerHTML='<div class="empty">Numara girin</div>';return;}
  if(!silent)el.innerHTML='<div class="empty">Aranıyor...</div>';
  try{
    const data=await(await api(`/rest/v1/entries?room_no=eq.${val}&mode=eq.${mode}&order=checkin_date.desc`)).json();
    if(!data.length){el.innerHTML='<div class="empty">Kayıt yok</div>';return;}
    let html=`<div class="room-header"><div class="room-num${mode==='elektrik'?' e':''}">${val}</div><div class="room-summary"><strong>${mode==='elektrik'?'Sayaç':'Oda'} ${val}</strong></div></div><div class="entries-grid">`;
    let gi=0;entryImages={};entryData={};
    data.forEach(e=>{html+=buildEntryCard(e,gi++);});
    html+='</div>';el.innerHTML=html;
  }catch(e){if(!silent)el.innerHTML='<div class="empty">Hata</div>'}
}

function buildEntryCard(entry,gi){
  const urls=entry.photo_urls||[],descs=entry.photo_descs||[];
  entryImages[gi]=urls;entryData[gi]=entry;
  const imgs=urls.map((u,i)=>`<div class="img-thumb" onclick="openLb(${gi},${i})"><img src="${u}"><button class="img-thumb-del" onclick="event.stopPropagation();deletePhoto('${entry.id}','${u}',${gi})">✕</button>${descs[i]?`<div class="img-desc">${descs[i]}</div>`:''}</div>`).join('');
  return`<div class="entry-card">
    <div class="entry-head" onclick="toggleEntry(this)" data-ei="${gi}">
      <div class="date-badge${mode==='elektrik'?' e':''}">${fmtDate(entry.checkin_date)}</div>
      <div class="entry-meta">${entry.note||''}</div>
      <svg class="chevron${openEntries.has(gi)?' open':''}" width="14" height="14"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="entry-body${openEntries.has(gi)?' open':''}">
      ${imgs?`<div class="img-scroll">${imgs}</div>`:'<div style="padding:12px">Fotoğraf yok</div>'}
      <div class="entry-footer">
        <button class="btn btn-sm" onclick="event.stopPropagation();createEntryLink('${entry.room_no}','${entry.checkin_date}',this)">Link</button>
        <button class="btn btn-sm" onclick="event.stopPropagation();openEditPanel('${entry.id}',${gi})">Düzenle</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteEntry('${entry.id}',${gi})">Sil</button>
      </div>
    </div>
    <div id="edit-panel-${entry.id}" style="display:none;padding:12px;border-top:1px solid var(--border);background:var(--surface2)">
      <div class="field"><input id="edit-date-${entry.id}" type="date" value="${entry.checkin_date||''}"></div>
      <div class="field"><textarea id="edit-note-${entry.id}" rows="2">${entry.note||''}</textarea></div>
      <div class="field"><div id="edit-descs-${entry.id}">${urls.map((u,i)=>`<div><img src="${u}" style="width:40px;height:30px;object-fit:cover"><input value="${descs[i]||''}" oninput="entryData[${gi}].photo_descs[${i}]=this.value" style="width:calc(100% - 50px)"></div>`).join('')}</div></div>
      <div class="field"><input type="file" id="edit-photos-${entry.id}" multiple></div>
      <button class="btn btn-primary" onclick="event.stopPropagation();saveEdit('${entry.id}',${gi})">Kaydet</button>
    </div>
  </div>`;
}

function toggleEntry(head){const ei=parseInt(head.dataset.ei);const body=head.nextElementSibling;const chev=head.querySelector('.chevron');if(body.classList.contains('open')){body.classList.remove('open');chev.classList.remove('open');openEntries.delete(ei)}else{body.classList.add('open');chev.classList.add('open');openEntries.add(ei)}}

async function openEditPanel(entryId,ei){
  const panel=document.getElementById(`edit-panel-${entryId}`);
  panel.style.display=panel.style.display==='block'?'none':'block';
}
async function saveEdit(entryId,ei){
  const entry=entryData[ei];
  const date=document.getElementById(`edit-date-${entryId}`).value;
  const note=document.getElementById(`edit-note-${entryId}`).value;
  const photoFile=document.getElementById(`edit-photos-${entryId}`).files;
  let urls=[...entry.photo_urls],descs=[...entry.photo_descs];
  if(photoFile.length)for(const f of photoFile){const c=await compressImage(f);urls.push(await uploadImg(c.file,entry.room_no));descs.push('')}
  await api(`/rest/v1/entries?id=eq.${entryId}`,{method:'PATCH',body:JSON.stringify({checkin_date:date,note,photo_urls:urls,photo_descs:descs})});
  entry.photo_urls=urls;entry.photo_descs=descs;entryData[ei]=entry;entryImages[ei]=urls;
  showToast('Güncellendi');doSearch(lastVal,true);
}

async function addFiles(files){for(const f of files){const c=await compressImage(f);pending.push({file:c.file,url:URL.createObjectURL(c.file),desc:''})}renderPrev()}
function renderPrev(){q('prev-row').innerHTML=pending.map((p,i)=>`<div class="prev-item"><img src="${p.url}"><div class="prev-del" onclick="pending.splice(${i},1);renderPrev()">✕</div><input class="img-desc" placeholder="Açıklama" value="${p.desc}" oninput="pending[${i}].desc=this.value"></div>`).join('')}
async function saveEntry(){
  const room=q('f-room').value,date=q('f-date').value,note=q('f-note').value,type=mode==='elektrik'?q('f-type').value:null;
  if(!room||!date||!pending.length)return showToast('Eksik bilgi','error');
  const urls=[],descs=[];for(const p of pending){urls.push(await uploadImg(p.file,room));descs.push(p.desc||'')}
  await api('/rest/v1/entries',{method:'POST',body:JSON.stringify({room_no:room,mode,checkin_date:date,note,photo_urls:urls,photo_descs:descs,type})});
  pending=[];q('f-room').value='';q('f-note').value='';q('prev-row').innerHTML='';showToast('Kaydedildi');
}

async function loadAll(silent){
  const el=q('rlist');if(!silent)el.innerHTML='<div class="empty">Yükleniyor...</div>';
  const data=await(await api(`/rest/v1/entries?select=room_no,photo_urls&mode=eq.${mode}&order=room_no.asc`)).json();
  const gr={};data.forEach(e=>{if(!gr[e.room_no])gr[e.room_no]=[];gr[e.room_no].push(e)});
  el.innerHTML=Object.keys(gr).sort((a,b)=>parseInt(a)-parseInt(b)).map(rno=>`<div class="all-card" onclick="goRoom('${rno}')"><div class="all-card-inner"><div class="room-num${mode==='elektrik'?' e':''}">${rno}</div><div>${gr[rno].length} kayıt</div></div></div>`).join('');
}
function goRoom(rno){q('sinput').value=rno;goTab(0);doSearch(rno)}

// Yardımcı fonksiyonlar, lightbox vs. aynı kalacak.
</script>
</body>
</html>
