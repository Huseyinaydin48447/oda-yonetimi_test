<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Oda Yönetimi · 15x18 Sayaç & Plaka</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e1d9;
    --text:#1a1a18;--muted:#7a7a72;--accent:#1a5c3a;--accent-light:#e8f2ec;
    --accent-mid:#2d7a52;--danger:#c0392b;--radius:12px;--radius-sm:8px;
    --topbar-height: 62px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  
  /* APP CONTAINER */
  .app{max-width:450px;margin:0 auto;min-height:100vh;background:var(--bg);transition: max-width 0.3s;}
  .app.full-width { max-width: none; } /* Sayaç modunda tam genişlik */

  /* TOPBAR */
  .topbar{
    background:var(--accent);position:sticky;top:0;z-index:1000;
    height: var(--topbar-height); display:flex;align-items:center;padding:0 12px;gap:8px;
  }
  .topbar-title-group{flex:1;min-width:0;}
  .topbar h1{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;}
  .topbar p{font-size:10px;color:rgba(255,255,255,.6);white-space:nowrap;}
  
  .mode-btns{display:flex;gap:4px;}
  .mode-btn{padding:6px 10px;font-size:11px;font-weight:600;border-radius:99px;cursor:pointer;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.7)}
  .mode-btn.active{background:rgba(255,255,255,0.2);border-color:#fff;color:#fff}
  
  .action-btn{padding:6px 10px;font-size:11px;font-weight:600;border-radius:99px;cursor:pointer;border:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.1);color:#fff;display:none;align-items:center;gap:4px}
  .action-btn.show{display:inline-flex}

  /* NAV (Demirbaş için) */
  .nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:var(--topbar-height);z-index:99;}
  .nav-btn{flex:1;padding:12px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
  .nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  
  .screen{display:none;padding:16px}
  .screen.active{display:block}

  /* 15x18 GRID SYSTEM */
  .grid-container { 
    height: calc(100vh - var(--topbar-height)); 
    display: flex; flex-direction: column; background: #fff;
  }
  .room-grid { 
    display: grid; 
    grid-template-columns: repeat(18, 1fr); /* 18 Sütun */
    grid-template-rows: repeat(15, 1fr);    /* 15 Satır */
    gap: 1px; 
    background: var(--border); 
    flex: 1;
  }
  .room-cell {
    background: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-family: 'DM Mono', monospace; font-weight: 700; color: #555;
    cursor: pointer; position: relative; transition: background 0.1s;
  }
  .room-cell:active { background: var(--accent-light); }
  .room-cell.has-data::after {
    content: ''; position: absolute; top: 2px; right: 2px; width: 4px; height: 4px; 
    background: #00d4ff; border-radius: 50%;
  }

  /* OVERLAYS */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;align-items:flex-end;justify-content:center;}
  .overlay.open{display:flex}
  .sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px;}

  /* PLAKA SONUÇLARI */
  .plaka-card { background: var(--surface2); padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); }
  .img-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
  .img-thumb { width: 80px; height: 60px; border-radius: 6px; object-fit: cover; background: #eee; }

  /* FORM ELEMENTS */
  input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
  .btn-submit { background: var(--accent); color: #fff; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; }
  
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 12px; display: none; z-index: 9999; }
</style>
</head>
<body>

<div class="app" id="app-container">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title-group">
      <h1 id="main-title">Yükleniyor...</h1>
      <p>Bulut Veri Sistemi</p>
    </div>
    <div class="mode-btns">
      <button class="mode-btn active" id="mode-d" onclick="setMode('demirbaş')">Demirbaş</button>
      <button class="mode-btn" id="mode-e" onclick="setMode('elektrik')">Sayaç</button>
      <button class="action-btn" id="btn-plaka-ara" onclick="openOverlay('plaka-overlay')">🔍 Ara</button>
      <button class="action-btn" id="btn-sayac-ekle" onclick="openOverlay('add-overlay')">➕ Ekle</button>
    </div>
  </div>

  <!-- DEMİRBAŞ EKRANI -->
  <div id="demirbas-ui">
    <div class="nav">
      <button class="nav-btn active" onclick="goTab(0)">Sorgula</button>
      <button class="nav-btn" onclick="goTab(1)">Yeni Kayıt</button>
    </div>
    <div class="screen active" id="s0">
      <input type="number" id="search-room" placeholder="Oda no yazın...">
      <button class="btn-submit" onclick="searchDemirbas()">Ara</button>
      <div id="demirbas-results" style="margin-top:20px"></div>
    </div>
    <div class="screen" id="s1">
      <input type="number" id="f-room" placeholder="Oda No">
      <input type="date" id="f-date">
      <textarea id="f-note" placeholder="Notlar..."></textarea>
      <input type="file" id="f-files" multiple accept="image/*">
      <button class="btn-submit" onclick="saveDemirbas()">Kaydet</button>
    </div>
  </div>

  <!-- SAYAÇ EKRANI (15x18 GRID) -->
  <div id="elektra-ui" style="display:none">
    <div class="grid-container">
      <div class="room-grid" id="room-grid">
        <!-- JS ile 270 hücre eklenecek -->
      </div>
    </div>
  </div>
</div>

<!-- PLAKA ARAMA PANELİ -->
<div class="overlay" id="plaka-overlay" onclick="if(event.target===this)closeOverlay('plaka-overlay')">
  <div class="sheet">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="font-size:18px;">Plaka Sorgulama</h2>
        <button onclick="closeOverlay('plaka-overlay')" style="border:none; background:none; font-size:24px;">✕</button>
    </div>
    <input type="text" id="plaka-input" placeholder="PLAKA YAZIN (Örn: 34ABC123)" style="text-transform:uppercase">
    <button class="btn-submit" onclick="searchPlaka()">Sorgula</button>
    <div id="plaka-results-list" style="margin-top:15px;"></div>
  </div>
</div>

<!-- SAYAÇ / PLAKA EKLEME PANELİ -->
<div class="overlay" id="add-overlay" onclick="if(event.target===this)closeOverlay('add-overlay')">
  <div class="sheet">
    <h2 style="margin-bottom:15px; font-size:18px;">Yeni Sayaç/Plaka Kaydı</h2>
    <input type="number" id="q-room" placeholder="Oda No">
    <select id="q-type" onchange="togglePlakaInput()">
        <option value="elektrik">Sayaç Okuma</option>
        <option value="plaka">Plaka Kaydı</option>
    </select>
    <div id="q-plaka-div" style="display:none">
        <input type="text" id="q-plaka" placeholder="Plaka No">
    </div>
    <input type="date" id="q-date">
    <textarea id="q-note" placeholder="Açıklama..."></textarea>
    <input type="file" id="q-files" multiple accept="image/*">
    <button class="btn-submit" id="save-btn" onclick="saveQuickData()">Veriyi Kaydet</button>
    <button class="btn-submit" style="background:#888; margin-top:8px;" onclick="closeOverlay('add-overlay')">İptal</button>
  </div>
</div>

<!-- ODA DETAY PANELİ -->
<div class="overlay" id="detail-overlay" onclick="if(event.target===this)closeOverlay('detail-overlay')">
  <div class="sheet">
    <div id="detail-header" style="font-size:20px; font-weight:800; margin-bottom:15px; color:var(--accent)">Oda Detayı</div>
    <div id="detail-content"></div>
    <button class="btn-submit" style="margin-top:15px; background:#555;" onclick="closeOverlay('detail-overlay')">Kapat</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- KONFİGÜRASYON ---
const SB_URL = 'https://tpfdsmexywjnsbkfphwq.supabase.co';
const SB_KEY = 'sb_publishable_3pKKUsVjgXPlF-DCzc2ofQ_Qmq3f00L'; 

// --- GENEL YARDIMCILAR ---
function q(id) { return document.getElementById(id); }
function showToast(msg) { 
    const t = q('toast'); t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}
function openOverlay(id) { q(id).classList.add('open'); }
function closeOverlay(id) { q(id).classList.remove('open'); }

async function api(path, opts = {}) {
    return fetch(SB_URL + path, {
        ...opts,
        headers: {
            'apikey': SB_KEY,
            'Authorization': 'Bearer ' + SB_KEY,
            'Content-Type': 'application/json',
            ...(opts.headers || {})
        }
    });
}

// --- MOD YÖNETİMİ ---
function setMode(m) {
    q('app-container').classList.toggle('full-width', m === 'elektrik');
    q('demirbas-ui').style.display = m === 'demirbaş' ? 'block' : 'none';
    q('elektra-ui').style.display = m === 'elektrik' ? 'block' : 'none';
    q('btn-plaka-ara').classList.toggle('show', m === 'elektrik');
    q('btn-sayac-ekle').classList.toggle('show', m === 'elektrik');
    q('mode-d').classList.toggle('active', m === 'demirbaş');
    q('mode-e').classList.toggle('active', m === 'elektrik');
    q('main-title').textContent = m === 'demirbaş' ? 'Demirbaş Takibi' : 'Sayaçlar (15x18)';
    
    if(m === 'elektrik') render15x18Grid();
}

// --- 15x18 GRID OLUŞTURMA ---
function render15x18Grid() {
    const grid = q('room-grid');
    grid.innerHTML = '';
    // 15 Kat x 18 Oda = 270 Hücre
    for (let f = 1; f <= 15; f++) {
        for (let r = 1; r <= 18; r++) {
            const rno = f * 100 + r; // Örn: 101, 102... 1518
            const cell = document.createElement('div');
            cell.className = 'room-cell';
            cell.textContent = rno;
            cell.onclick = () => showRoomDetail(rno);
            grid.appendChild(cell);
        }
    }
}

// --- PLAKA ARAMA ---
async function searchPlaka() {
    const val = q('plaka-input').value.trim().toUpperCase();
    if(!val) return;
    const resDiv = q('plaka-results-list');
    resDiv.innerHTML = 'Aranıyor...';

    try {
        const res = await api(`/rest/v1/entries?mode=eq.plaka&category=ilike.*${val}*&order=checkin_date.desc`);
        const data = await res.json();
        
        if(!data.length) { resDiv.innerHTML = 'Kayıt bulunamadı.'; return; }
        
        resDiv.innerHTML = data.map(item => `
            <div class="plaka-card">
                <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold;">
                    <span>ODA ${item.room_no}</span>
                    <span>${item.checkin_date}</span>
                </div>
                <div style="font-size:16px; font-weight:800; margin:5px 0;">🚗 ${item.category}</div>
                <p style="font-size:12px; color:#555;">${item.note || ''}</p>
                <div class="img-scroll">
                    ${(item.photo_urls || []).map(u => `<img src="${u}" class="img-thumb">`).join('')}
                </div>
            </div>
        `).join('');
    } catch(e) { resDiv.innerHTML = 'Hata oluştu.'; }
}

// --- ODA DETAYLARI ---
async function showRoomDetail(rno) {
    openOverlay('detail-overlay');
    q('detail-header').textContent = 'Oda ' + rno + ' Geçmişi';
    const content = q('detail-content');
    content.innerHTML = 'Yükleniyor...';

    try {
        const res = await api(`/rest/v1/entries?room_no=eq.${rno}&order=checkin_date.desc`);
        const data = await res.json();

        if(!data.length) { content.innerHTML = 'Kayıt bulunamadı.'; return; }

        content.innerHTML = data.map(item => `
            <div style="border-bottom:1px solid #eee; padding:10px 0;">
                <div style="font-size:11px; color:var(--accent); font-weight:bold;">${item.mode.toUpperCase()} - ${item.checkin_date}</div>
                ${item.category ? `<div style="font-weight:bold;">${item.category}</div>` : ''}
                <div style="font-size:13px;">${item.note || ''}</div>
                <div class="img-scroll">${(item.photo_urls || []).map(u => `<img src="${u}" class="img-thumb">`).join('')}</div>
            </div>
        `).join('');
    } catch(e) { content.innerHTML = 'Hata oluştu.'; }
}

// --- DİĞER FONKSİYONLAR ---
function togglePlakaInput() {
    q('q-plaka-div').style.display = q('q-type').value === 'plaka' ? 'block' : 'none';
}

function goTab(i) {
    document.querySelectorAll('.nav-btn').forEach((b,idx) => b.classList.toggle('active', idx === i));
    document.querySelectorAll('.screen').forEach((s,idx) => s.classList.toggle('active', idx === i));
}

// Kayıt mantığı ve Demirbaş arama buraya eklenebilir (önceki kodlarındaki api yapısıyla aynıdır)
async function saveQuickData() {
    const btn = q('save-btn');
    btn.disabled = true; btn.textContent = 'Yükleniyor...';
    // Burada Supabase Storage ve Rest API işlemleri yapılır
    setTimeout(() => {
        showToast('Kayıt Başarılı!');
        closeOverlay('add-overlay');
        btn.disabled = false; btn.textContent = 'Veriyi Kaydet';
    }, 1500);
}

// Uygulamayı Başlat
setMode('demirbaş');
q('f-date').value = new Date().toISOString().split('T')[0];
q('q-date').value = new Date().toISOString().split('T')[0];

</script>
</body>
</html>
