<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Oda Yönetimi PRO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg: #f8f9fa; --surface: #ffffff; --surface2: #f1f3f5; --border: #e9ecef;
    --text: #212529; --muted: #6c757d; --accent: #1a5c3a; --accent-soft: #e8f2ec;
    --plate: #101113; --danger: #e03131; --amber: #f08c00;
    --radius: 16px; --shadow: 0 4px 20px rgba(0,0,0,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

  /* HEADER */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; position: sticky; top: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; }
  .brand-text h1 { font-size: 15px; font-weight: 800; }
  .brand-text p { font-size: 11px; color: var(--muted); }

  /* MOD SELECTOR */
  .mode-switch { background: var(--surface2); padding: 4px; border-radius: 10px; display: flex; gap: 4px; }
  .mode-btn { border: none; padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; color: var(--muted); background: transparent; }
  .mode-btn.active { background: var(--surface); color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

  /* FULL WIDTH GRID */
  .grid-container { width: 100%; padding: 2px; }
  .room-grid { display: grid; grid-template-columns: repeat(18, 1fr); gap: 2px; }
  .room-cell {
    aspect-ratio: 1 / 1.4; background: var(--surface); border: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; cursor: pointer; position: relative; transition: 0.1s;
  }
  .room-cell:active { background: var(--surface2); transform: scale(0.95); }
  .room-cell span { font-size: 10px; font-weight: 800; color: var(--text); }
  .room-cell.has-data::after { content: ''; position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; background: #228be6; border-radius: 50%; }

  /* PANEL */
  .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; display: none; align-items: flex-end; }
  .panel-overlay.open { display: flex; }
  .panel {
    background: var(--surface); width: 100%; border-radius: 24px 24px 0 0;
    max-height: 92vh; display: flex; flex-direction: column;
    transform: translateY(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .panel-overlay.open .panel { transform: translateY(0); }
  
  .panel-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .panel-title { display: flex; align-items: center; gap: 12px; }
  .room-badge { background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 10px; font-family: 'JetBrains Mono'; font-weight: 700; font-size: 18px; }
  
  /* MENU CARDS */
  .menu-grid { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .menu-card {
    background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px;
    box-shadow: var(--shadow); transition: 0.2s; cursor: pointer;
  }
  .menu-card:active { transform: scale(0.96); background: var(--surface2); }
  .menu-card .icon { font-size: 32px; }
  .menu-card h3 { font-size: 14px; font-weight: 700; }
  .menu-card p { font-size: 11px; color: var(--muted); }

  /* SUB-PAGE CONTENT */
  .sub-page { display: none; flex: 1; overflow-y: auto; padding: 16px; }
  .sub-page.active { display: block; }
  
  /* TABS */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; background: var(--surface2); padding: 4px; border-radius: 12px; }
  .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 9px; font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--muted); }
  .tab-btn.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow); }

  /* FORMS */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
  input, textarea, select {
    width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
    font-family: inherit; font-size: 14px; background: var(--surface2);
  }
  input:focus { outline: none; border-color: var(--accent); background: #fff; }

  /* PLATE DESIGN */
  .plate-input { font-family: 'JetBrains Mono', monospace; font-size: 24px !important; font-weight: 800; text-align: center; letter-spacing: 2px; text-transform: uppercase; border: 2px solid var(--plate) !important; }

  /* LIST CARDS */
  .entry-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .entry-date { font-size: 12px; font-weight: 700; color: var(--accent); }
  
  .plate-display {
    background: #fff; border: 2px solid var(--plate); border-radius: 6px; padding: 8px;
    display: inline-flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .plate-blue { width: 15px; height: 35px; background: #003399; margin: -8px 0 -8px -8px; border-radius: 4px 0 0 4px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; color: #fff; font-size: 8px; font-weight: 700; }
  .plate-text { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; letter-spacing: 1px; color: var(--plate); }

  .photo-scroller { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
  .photo-scroller img { height: 90px; width: 120px; object-fit: cover; border-radius: 10px; }

  .actions { display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
  .btn-action { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; }
  .btn-save { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; }
  
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 13px; z-index: 9999; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

  .loader { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">L</div>
      <div class="brand-text">
        <h1 id="main-title">ELEKTRA</h1>
        <p id="main-sub">Oda Yönetim Sistemi</p>
      </div>
    </div>
    <div class="mode-switch">
      <button class="mode-btn" onclick="setAppMode('demirbaş')" id="btn-m-d">Demirbaş</button>
      <button class="mode-btn active" onclick="setAppMode('elektrik')" id="btn-m-e">Elektra</button>
    </div>
  </div>

  <!-- SAYAÇ GRID -->
  <div id="grid-view" class="grid-container">
    <div class="room-grid" id="main-grid"></div>
  </div>

  <!-- PANEL OVERLAY -->
  <div class="panel-overlay" id="panel-ov" onclick="if(event.target===this)closePanel()">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <button id="panel-back" style="display:none; background:none; border:none; font-size:24px; cursor:pointer;" onclick="showMenu()">‹</button>
          <div class="room-badge" id="panel-room-no">307</div>
        </div>
        <button style="background:none; border:none; font-size:24px; color:var(--muted); cursor:pointer;" onclick="closePanel()">×</button>
      </div>

      <!-- ANA SEÇENEKLER -->
      <div id="panel-menu" class="menu-grid">
        <div class="menu-card" onclick="openSection('meter')">
          <span class="icon">⚡</span>
          <h3>SAYAÇ</h3>
          <p>Okuma ve Kayıtlar</p>
        </div>
        <div class="menu-card" onclick="openSection('plate')">
          <span class="icon">🚗</span>
          <h3>PLAKA</h3>
          <p>Araç Kayıtları</p>
        </div>
      </div>

      <!-- SAYAÇ BÖLÜMÜ -->
      <div id="section-meter" class="sub-page">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchSubTab('meter', 'list')">OKUMALAR</button>
          <button class="tab-btn" onclick="switchSubTab('meter', 'add')">YENİ EKLE</button>
        </div>
        <div id="meter-list"></div>
        <div id="meter-add" style="display:none">
          <div class="field"><label>Okuma Tarihi</label><input type="date" id="f-m-date"></div>
          <div class="field"><label>Notlar</label><textarea id="f-m-note" rows="3" placeholder="Enerji tüketimi vb..."></textarea></div>
          <div class="field">
            <label>Fotoğraflar</label>
            <input type="file" id="f-m-file" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
            <button class="btn-action" style="width:100%; padding:15px; border-style:dashed" onclick="document.getElementById('f-m-file').click()">+ FOTOĞRAF EKLE</button>
            <div id="f-m-prev" class="photo-scroller" style="margin-top:10px"></div>
          </div>
          <button class="btn-save" id="btn-m-save" onclick="saveMeter()">KAYDET</button>
        </div>
      </div>

      <!-- PLAKA BÖLÜMÜ -->
      <div id="section-plate" class="sub-page">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchSubTab('plate', 'list')">KAYITLI ARAÇLAR</button>
          <button class="tab-btn" onclick="switchSubTab('plate', 'add')">PLAKA EKLE</button>
        </div>
        <div id="plate-list"></div>
        <div id="plate-add" style="display:none">
          <div class="field"><label>Kayıt Tarihi</label><input type="date" id="f-p-date"></div>
          <div class="field"><label>Plaka Numarası</label><input type="text" id="f-p-no" class="plate-input" placeholder="34 ABC 123"></div>
          <div class="field"><label>Araç Sahibi / Not</label><textarea id="f-p-note" rows="3" placeholder="İsim, telefon veya araç modeli..."></textarea></div>
          <button class="btn-save" id="btn-p-save" onclick="savePlate()">PLAKAYI SİSTEME İŞLE</button>
        </div>
      </div>

      <div style="height:30px"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const SB='https://tpfdsmexywjnsbkfphwq.supabase.co';
const KEY='sb_publishable_3pKKUsVjgXPlF-DCzc2ofQ_Qmq3f00L';

let currentRoom = null;
let currentAppMode = 'elektrik';
let tempPhotos = [];

function q(s){return document.getElementById(s)}
function today(){return new Date().toISOString().slice(0,10)}
function showToast(msg){const t=q('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500);}

async function api(path, opts={}){
  const headers = {'apikey':KEY, 'Authorization':'Bearer '+KEY, 'Content-Type':'application/json', ...(opts.headers||{})};
  return fetch(SB+path, {...opts, headers});
}

// APP MODLARI
function setAppMode(m){
  currentAppMode = m;
  q('btn-m-d').classList.toggle('active', m==='demirbaş');
  q('btn-m-e').classList.toggle('active', m==='elektrik');
  q('main-title').textContent = m.toUpperCase();
  if(m==='elektrik') renderGrid();
  else q('main-grid').innerHTML = '<div style="grid-column:1/-1; padding:50px; text-align:center; color:#888">Demirbaş Modülü Aktif</div>';
}

// GRID OLUŞTURMA
async function renderGrid(){
  const grid = q('main-grid');
  grid.innerHTML = '';
  // Verisi olan odaları çekelim
  const res = await api('/rest/v1/entries?select=room_no');
  const data = await res.json();
  const roomsWithData = new Set(data.map(d => String(d.room_no)));

  for(let f=1; f<=15; f++){
    for(let r=1; r<=18; r++){
      const rno = f*100 + r;
      const cell = document.createElement('div');
      cell.className = 'room-cell' + (roomsWithData.has(String(rno)) ? ' has-data' : '');
      cell.innerHTML = `<span>${rno}</span>`;
      cell.onclick = () => openPanel(rno);
      grid.appendChild(cell);
    }
  }
}

// PANEL YÖNETİMİ
function openPanel(rno){
  currentRoom = rno;
  q('panel-room-no').textContent = rno;
  q('panel-ov').classList.add('open');
  showMenu();
}

function closePanel(){
  q('panel-ov').classList.remove('open');
}

function showMenu(){
  q('panel-menu').style.display = 'grid';
  q('section-meter').classList.remove('active');
  q('section-plate').classList.remove('active');
  q('panel-back').style.display = 'none';
}

function openSection(s){
  q('panel-menu').style.display = 'none';
  q('panel-back').style.display = 'block';
  q('section-' + s).classList.add('active');
  switchSubTab(s, 'list');
}

function switchSubTab(sec, type){
  const container = q('section-' + sec);
  container.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(type==='list'?'OKUMALAR':'EKLE') || b.textContent.includes(type==='list'?'ARAÇLAR':'PLAKA')));
  q(sec + '-list').style.display = type==='list' ? 'block' : 'none';
  q(sec + '-add').style.display = type==='add' ? 'block' : 'none';
  
  if(type==='add'){
    q('f-' + (sec==='meter'?'m':'p') + '-date').value = today();
    tempPhotos = []; q('f-m-prev').innerHTML = '';
  } else {
    if(sec==='meter') loadMeterList(); else loadPlateList();
  }
}

// SAYAÇ İŞLEMLERİ
async function loadMeterList(){
  const list = q('meter-list');
  list.innerHTML = 'Yükleniyor...';
  const res = await api(`/rest/v1/entries?room_no=eq.${currentRoom}&mode=eq.elektrik&order=checkin_date.desc`);
  const data = await res.json();
  if(!data.length){ list.innerHTML = '<p style="text-align:center; padding:30px; color:#999">Kayıt bulunamadı.</p>'; return; }

  list.innerHTML = data.map(e => `
    <div class="entry-card">
      <div class="entry-header"><span class="entry-date">📅 ${e.checkin_date}</span></div>
      <div class="photo-scroller">
        ${(e.photo_urls||[]).map(u => `<img src="${u}">`).join('')}
      </div>
      <p style="font-size:13px; margin-top:8px">${e.note || ''}</p>
      <div class="actions">
        <button class="btn-action" onclick="deleteEntry('${e.id}', 'meter')">Sil</button>
      </div>
    </div>
  `).join('');
}

function handleFiles(files){
  for(let f of files){
    const reader = new FileReader();
    reader.onload = (e) => {
      tempPhotos.push({file: f, data: e.target.result});
      q('f-m-prev').innerHTML = tempPhotos.map(p => `<img src="${p.data}">`).join('');
    };
    reader.readAsDataURL(f);
  }
}

async function saveMeter(){
  const btn = q('btn-m-save');
  btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';
  const urls = [];
  try {
    for(let p of tempPhotos){
      const name = `${Date.now()}_${Math.random().toString(36).substr(2,5)}.jpg`;
      const up = await fetch(`${SB}/storage/v1/object/meters/${currentRoom}/${name}`, {
        method:'POST', body: p.file, headers: {'apikey':KEY, 'Authorization':'Bearer '+KEY}
      });
      if(up.ok) urls.push(`${SB}/storage/v1/object/public/meters/${currentRoom}/${name}`);
    }
    await api('/rest/v1/entries', {
      method:'POST', body: JSON.stringify({room_no:String(currentRoom), mode:'elektrik', checkin_date:q('f-m-date').value, note:q('f-m-note').value, photo_urls:urls})
    });
    showToast('Kayıt Başarılı');
    switchSubTab('meter', 'list');
  } catch(e) { showToast('Hata oluştu!'); }
  btn.disabled = false; btn.innerHTML = 'KAYDET';
}

// PLAKA İŞLEMLERİ
async function loadPlateList(){
  const list = q('plate-list');
  list.innerHTML = 'Yükleniyor...';
  const res = await api(`/rest/v1/entries?room_no=eq.${currentRoom}&mode=eq.plaka&order=checkin_date.desc`);
  const data = await res.json();
  if(!data.length){ list.innerHTML = '<p style="text-align:center; padding:30px; color:#999">Kayıtlı araç yok.</p>'; return; }

  list.innerHTML = data.map(e => `
    <div class="entry-card">
      <div class="entry-header"><span class="entry-date">📅 ${e.checkin_date}</span></div>
      <div class="plate-display">
        <div class="plate-blue">TR</div>
        <div class="plate-text">${e.category}</div>
      </div>
      <p style="font-size:13px; color:var(--muted)">${e.note || 'Not yok'}</p>
      <div class="actions">
        <button class="btn-action" onclick="sharePlate('${e.category}')">Paylaş</button>
        <button class="btn-action" onclick="deleteEntry('${e.id}', 'plate')">Sil</button>
      </div>
    </div>
  `).join('');
}

async function savePlate(){
  const plaka = q('f-p-no').value.trim().toUpperCase();
  if(!plaka){ showToast('Plaka girin!'); return; }
  const btn = q('btn-p-save');
  btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';
  await api('/rest/v1/entries', {
    method:'POST', body: JSON.stringify({room_no:String(currentRoom), mode:'plaka', checkin_date:q('f-p-date').value, category:plaka, note:q('f-p-note').value})
  });
  showToast('Plaka Kaydedildi');
  switchSubTab('plate', 'list');
  btn.disabled = false; btn.innerHTML = 'PLAKAYI SİSTEME İŞLE';
}

async function deleteEntry(id, type){
  if(!confirm('Bu kaydı silmek istediğinize emin misiniz?')) return;
  await api(`/rest/v1/entries?id=eq.${id}`, {method:'DELETE'});
  showToast('Silindi');
  if(type==='meter') loadMeterList(); else loadPlateList();
}

function sharePlate(p){
  const txt = `Oda ${currentRoom} Araç Plakası: ${p}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
}

// BAŞLAT
setAppMode('elektrik');
</script>
</body>
</html>
