<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Elektra Sayaç Paneli</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f4f0; --surface:#fff; --surface2:#f0efe9; --border:#e2e1d9;
    --text:#1a1a18; --muted:#7a7a72; --accent:#1a5c3a; --accent-light:#e8f2ec;
    --accent-mid:#2d7a52; --danger:#c0392b; --danger-light:#fdf0ee;
    --amber:#b45309; --amber-light:#fef3c7; --radius:12px; --radius-sm:8px;
    --shadow:0 2px 12px rgba(0,0,0,.07); --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; }
  .app { max-width:1300px; margin:0 auto; min-height:100vh; background:var(--bg); display:flex; flex-direction:column; }

  .topbar { background:var(--accent); padding:10px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; position:sticky; top:0; z-index:100; }
  .topbar h1 { font-size:16px; font-weight:700; color:#fff; letter-spacing:0.5px; }
  .topbar p { font-size:11px; color:rgba(255,255,255,.65); margin-top:1px; }
  .stat-badge { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; color:#fff; background:rgba(255,255,255,0.15); cursor:default; }
  .stat-badge .count { font-size:14px; font-weight:700; }
  .stat-badge.sb-dolu-temiz { background: #1565c0; }
  .stat-badge.sb-dolu-kirli { background: #6a1a9a; }
  .stat-badge.sb-cout       { background: #2e7d32; }
  .stat-badge.sb-temiz      { background: #4caf50; color:#000; }
  .stat-badge.sb-kirli      { background: #ff6d00; }
  .stat-badge.sb-ooi        { background: #880e4f; }
  .stat-badge.sb-ariza      { background: #546e7a; }
  .stat-badge.sb-onaylı     { background: #4a148c; }
  .conn-badge { font-size:10px; color:#ccc; display:flex; align-items:center; gap:4px; padding:2px 8px; background:rgba(0,0,0,0.2); border-radius:20px; }
  .conn-dot { width:6px; height:6px; border-radius:50%; background:#aaa; }
  .conn-dot.ok { background:#4caf50; }

  .legend { background:var(--surface); padding:6px 12px; display:flex; flex-wrap:wrap; gap:8px; border-bottom:1px solid var(--border); }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--muted); }
  .legend-dot { width:12px; height:12px; border-radius:3px; }

  .filter-bar { padding:6px 12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--surface2); border-bottom:1px solid var(--border); }
  .filter-bar label { font-size:11px; color:var(--muted); }
  .filter-bar select, .filter-bar input { font-size:12px; padding:6px 8px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-family:'DM Sans',sans-serif; }
  .view-toggle { display:flex; gap:4px; margin-left:auto; }
  .view-btn { padding:6px 12px; border-radius:6px; font-size:12px; font-weight:600; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; }
  .view-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .grid-container { padding:12px; overflow-x:auto; }
  .floor-section { margin-bottom:8px; }
  .floor-label { font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:600; }
  .room-grid { display:grid; grid-template-columns:repeat(18, minmax(48px,1fr)); gap:4px; }
  .room-cell { height:38px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; cursor:pointer; border:1px solid rgba(0,0,0,0.05); position:relative; background:var(--surface); color:var(--text); transition:transform 0.1s, filter 0.1s; }
  .room-cell:hover { transform:scale(1.06); z-index:2; filter:brightness(1.15); }
  .room-cell.empty { background:#eee; color:#ccc; pointer-events:none; }
  .status-dolu-temiz  { background:#1565c0; color:#fff; }
  .status-dolu-kirli  { background:#6a1a9a; color:#fff; }
  .status-cout        { background:#2e7d32; color:#fff; }
  .status-cout-b      { background:#1b5e20; color:#fff; }
  .status-temiz       { background:#4caf50; color:#fff; }
  .status-temiz-b     { background:#009688; color:#fff; }
  .status-kirli       { background:#ff6d00; color:#fff; }
  .status-kirli-b     { background:#d32f2f; color:#fff; }
  .status-ooi         { background:#880e4f; color:#fff; }
  .status-ariza       { background:#546e7a; color:#fff; }
  .status-onaylı      { background:#4a148c; color:#fff; }
  .status-onaylı-b    { background:#7b1fa2; color:#fff; }
  .status-bos         { background:#fff; color:#aaa; border:1px dashed #ccc; }
  .room-flag { position:absolute; top:2px; right:2px; width:6px; height:6px; border-radius:50%; background:#00e5ff; }

  .panel-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; }
  .panel-overlay.open { display:block; }
  .room-panel { position:fixed; top:0; right:0; bottom:0; width:540px; max-width:100vw; background:var(--surface); z-index:501; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.28s; overflow:hidden; box-shadow:-4px 0 20px rgba(0,0,0,0.15); }
  .room-panel.open { transform:translateX(0); }
  .panel-header { background:var(--accent); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .panel-header h2 { font-size:15px; color:#fff; }
  .panel-room-badge { background:rgba(255,255,255,0.2); padding:4px 12px; border-radius:6px; font-size:20px; font-weight:700; color:#fff; margin-right:10px; }
  .panel-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
  .panel-tabs { display:flex; border-bottom:1px solid var(--border); }
  .ptab { flex:1; padding:12px; text-align:center; font-size:13px; font-weight:600; border:none; background:transparent; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; font-family:'DM Sans',sans-serif; }
  .ptab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .panel-body { flex:1; overflow-y:auto; }
  .tab-pane { display:none; padding:14px 16px; }
  .tab-pane.active { display:block; }

  .list-container { display:none; padding:12px; }
  .list-container.active { display:block; }
  .grid-container.hidden { display:none; }

  .readonly-view { display:none; padding:16px; }
  .readonly-view.active { display:block; }

  .entry-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
  .entry-head { padding:10px 14px; display:flex; align-items:center; gap:8px; cursor:pointer; }
  .entry-head:hover { background:var(--surface2); }
  .type-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .type-badge.giris { background:#e8f2ec; color:#1a5c3a; }
  .type-badge.cikis { background:#fef3c7; color:#b45309; }
  .entry-meta { flex:1; min-width:0; }
  .entry-date { font-size:12px; color:var(--muted); }
  .entry-note { font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chevron { transition:transform 0.2s; color:var(--muted); }
  .chevron.open { transform:rotate(90deg); }
  .entry-body { max-height:0; overflow:hidden; transition:max-height 0.3s; }
  .entry-body.open { max-height:1000px; }
  .img-scroll { display:flex; gap:6px; overflow-x:auto; padding:8px 14px; }
  .img-thumb { width:80px; height:60px; border-radius:6px; overflow:hidden; border:1px solid var(--border); flex-shrink:0; cursor:pointer; position:relative; }
  .img-thumb img { width:100%; height:100%; object-fit:cover; }
  .img-thumb-del { position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%; background:rgba(192,57,43,0.85); color:#fff; font-size:10px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .entry-actions { display:flex; gap:6px; padding:8px 14px; border-top:1px solid var(--border); flex-wrap:wrap; }
  .btn { padding:8px 14px; border-radius:6px; font-size:12px; font-weight:600; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; font-family:'DM Sans',sans-serif; display:inline-flex; align-items:center; gap:4px; }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-danger { background:var(--danger-light); color:var(--danger); border-color:#f5c6c2; }
  .wa-btn { color:#25D366; border-color:#b7f0c8; background:#eafaf0; }
  .edit-panel { display:none; padding:12px 14px; border-top:1px solid var(--border); background:var(--surface2); }
  .edit-panel.open { display:block; }
  .field { margin-bottom:10px; }
  .field label { font-size:11px; color:var(--muted); display:block; margin-bottom:3px; }
  .field input, .field select, .field textarea { width:100%; padding:8px; border-radius:6px; border:1px solid var(--border); font-size:13px; }
  .tags-row { display:flex; gap:4px; flex-wrap:wrap; }
  .tag { padding:4px 10px; border-radius:20px; font-size:11px; border:1px solid var(--border); cursor:pointer; color:var(--muted); }
  .tag.on { background:var(--accent-light); color:var(--accent); border-color:var(--accent-mid); }

  .status-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .status-row label { font-size:13px; font-weight:600; }
  .status-row select { flex:1; padding:8px; border-radius:6px; border:1px solid var(--border); }

  .form-section { margin-bottom:14px; }
  .form-label { font-size:11px; color:var(--muted); margin-bottom:4px; display:block; font-weight:600; text-transform:uppercase; }
  .type-btns { display:flex; gap:6px; }
  .type-btn { flex:1; padding:10px; border-radius:8px; font-size:13px; font-weight:700; border:2px solid var(--border); background:transparent; cursor:pointer; }
  .type-btn.active-giris { border-color:#2e7d32; background:rgba(46,125,50,0.1); color:#2e7d32; }
  .type-btn.active-cikis { border-color:#b45309; background:rgba(180,83,9,0.1); color:#b45309; }
  .photo-drop { border:2px dashed var(--border); border-radius:8px; padding:14px; text-align:center; cursor:pointer; }
  .photo-drop:hover { border-color:var(--accent); background:var(--accent-light); }
  .preview-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .prev-item { position:relative; width:70px; height:50px; border-radius:6px; overflow:hidden; border:1px solid var(--border); }
  .prev-item img { width:100%; height:100%; object-fit:cover; }
  .prev-del { position:absolute; top:2px; right:2px; background:rgba(192,57,43,0.85); color:#fff; border:none; font-size:10px; cursor:pointer; border-radius:3px; padding:0 4px; }
  .compress-info { font-size:11px; color:var(--accent); margin-top:4px; }
  .progress-wrap { height:4px; background:#eee; border-radius:2px; overflow:hidden; margin-top:8px; display:none; }
  .progress-wrap.show { display:block; }
  .progress-bar { height:100%; background:var(--accent); width:0; transition:width 0.2s; }

  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; flex-direction:column; }
  .lightbox.open { display:flex; }
  .lb-top { display:flex; justify-content:space-between; padding:10px 14px; }
  .lb-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
  .lb-img-wrap { flex:1; display:flex; align-items:center; justify-content:center; }
  .lb-img-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
  .lb-nav { display:flex; gap:10px; justify-content:center; padding:10px; }
  .lb-btn { padding:6px 16px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2); color:#fff; border-radius:6px; cursor:pointer; }

  .confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; }
  .confirm-overlay.open { display:flex; }
  .confirm-sheet { background:var(--surface); border-radius:var(--radius); padding:20px; width:320px; }
  .confirm-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; z-index:9999; display:none; white-space:nowrap; }
  .toast.show { display:block; }
  .toast.success { background:var(--accent); }
  .toast.error { background:var(--danger); }
  .ml-cikis-btn { padding:5px 10px; font-size:11px; font-weight:600; border-radius:6px; border:1px solid #e8a020; background:var(--amber-light); color:var(--amber); cursor:pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar" id="topbar">
    <h1 id="topbar-title">⚡ ELEKTRA SAYAÇ PANELİ</h1>
    <span id="topbar-sub" style="font-size:11px; color:rgba(255,255,255,.65); margin-left:auto;"></span>
    <div class="stat-badge sb-dolu-temiz"><span class="count" id="cnt-dt">0</span>Dolu Temiz</div>
    <div class="stat-badge sb-dolu-kirli"><span class="count" id="cnt-dk">0</span>Dolu Kirli</div>
    <div class="stat-badge sb-cout"><span class="count" id="cnt-co">0</span>C/Out</div>
    <div class="stat-badge sb-temiz"><span class="count" id="cnt-t">0</span>Temiz</div>
    <div class="stat-badge sb-kirli"><span class="count" id="cnt-k">0</span>Kirli</div>
    <div class="stat-badge sb-ooi"><span class="count" id="cnt-ooi">0</span>OOI</div>
    <div class="stat-badge sb-ariza"><span class="count" id="cnt-ar">0</span>Arıza</div>
    <div class="stat-badge sb-onaylı"><span class="count" id="cnt-on">0</span>Onaylı</div>
    <div class="conn-badge"><div class="conn-dot" id="conn-dot"></div><span id="conn-text">Bağlanıyor...</span></div>
  </div>
  <div class="legend" id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1565c0"></div>Dolu Temiz</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6a1a9a"></div>Dolu Kirli</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2e7d32"></div>C/Out</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>Temiz</div>
    <div class="legend-item"><div class="legend-dot" style="background:#009688"></div>Temiz (B)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6d00"></div>Kirli</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d32f2f"></div>Kirli (B)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#880e4f"></div>OOI</div>
    <div class="legend-item"><div class="legend-dot" style="background:#546e7a"></div>Arıza</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4a148c"></div>Onaylı</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff; border:1px dashed #ccc"></div>Boş</div>
  </div>
  <div class="filter-bar" id="filter-bar">
    <label>Durum:</label>
    <select id="filter-status" onchange="renderView()">
      <option value="">Tümü</option><option value="dolu-temiz">Dolu Temiz</option><option value="dolu-kirli">Dolu Kirli</option>
      <option value="cout">C/Out</option><option value="temiz">Temiz</option><option value="kirli">Kirli</option>
      <option value="ooi">OOI</option><option value="ariza">Arıza</option><option value="onaylı">Onaylı</option><option value="bos">Boş</option>
    </select>
    <label>Kat:</label>
    <select id="filter-floor" onchange="renderView()"><option value="">Tümü</option></select>
    <input type="text" id="search-room" placeholder="Oda ara..." oninput="renderView()" style="width:100px;">
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" onclick="setView('grid')">Grid</button>
      <button class="view-btn" id="btn-list" onclick="setView('list')">Liste</button>
    </div>
  </div>

  <div class="grid-container" id="grid-container"></div>
  <div class="list-container" id="list-container"></div>
  <div class="readonly-view" id="readonly-view"></div>

  <div class="panel-overlay" id="panel-overlay" onclick="if(event.target===this)closePanel()"></div>
  <div class="room-panel" id="room-panel">
    <div class="panel-header">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="panel-room-badge" id="panel-room-num">-</div>
        <h2 id="panel-floor-label">-</h2>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-tabs">
      <button class="ptab active" id="ptab-kayitlar" onclick="switchPanelTab('kayitlar')">📋 Kayıtlar</button>
      <button class="ptab" id="ptab-ekle" onclick="switchPanelTab('ekle')">➕ Yeni Kayıt</button>
      <button class="ptab" id="ptab-durum" onclick="switchPanelTab('durum')">🏠 Oda Durumu</button>
    </div>
    <div class="panel-body">
      <div class="tab-pane active" id="pane-kayitlar"><div id="entries-list"></div></div>
      <div class="tab-pane" id="pane-ekle">
        <div class="form-section"><label class="form-label">İşlem Türü</label>
          <div class="type-btns">
            <button class="type-btn" id="btn-giris" onclick="setEntryType('giris')">⬇️ Giriş</button>
            <button class="type-btn" id="btn-cikis" onclick="setEntryType('cikis')">⬆️ Çıkış</button>
          </div>
        </div>
        <div class="form-section"><label class="form-label">Tarih</label><input type="date" id="f-date"></div>
        <div class="form-section"><label class="form-label">Endeks Değeri</label><input type="number" id="f-endeks" step="0.01" placeholder="örn. 1234.56"></div>
        <div class="form-section"><label class="form-label">Kat</label><select id="f-kat"><option value="">Seçin</option></select></div>
        <div class="form-section"><label class="form-label">Not</label><textarea id="f-note" rows="2" placeholder="Açıklama..."></textarea></div>
        <div class="form-section"><label class="form-label">Fotoğraf</label>
          <div class="photo-drop" id="drop-zone" onclick="document.getElementById('f-photos').click()">
            <input type="file" id="f-photos" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
            <div>📷 Fotoğraf seç veya sürükle bırak</div>
          </div>
          <div id="compress-status" class="compress-info"></div>
          <div class="preview-row" id="preview-row"></div>
          <div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        </div>
        <button class="btn btn-primary" id="save-btn" onclick="saveEntry()" style="width:100%">💾 Kaydet</button>
      </div>
      <div class="tab-pane" id="pane-durum">
        <div class="status-row"><label>Oda Durumu</label>
          <select id="f-status">
            <option value="bos">Boş</option><option value="dolu-temiz">Dolu Temiz</option><option value="dolu-kirli">Dolu Kirli</option>
            <option value="cout">C/Out</option><option value="temiz">Temiz</option><option value="kirli">Kirli</option>
            <option value="ooi">OOI</option><option value="ariza">Arıza</option><option value="onaylı">Onaylı</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="saveRoomStatus()">💾 Durumu Kaydet</button>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lb">
    <div class="lb-top"><span id="lb-label"></span><button class="lb-close" onclick="closeLb()">✕</button></div>
    <div class="lb-img-wrap"><img id="lb-img" src=""></div>
    <div class="lb-nav"><button class="lb-btn" onclick="lbMove(-1)">←</button><span id="lb-counter"></span><button class="lb-btn" onclick="lbMove(1)">→</button></div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-sheet"><h3 id="confirm-title">Emin misiniz?</h3><p id="confirm-msg"></p>
      <div class="confirm-actions"><button class="btn" onclick="closeConfirm()">İptal</button><button class="btn btn-danger" id="confirm-ok">Sil</button></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>

let currentEntries = [];
let entryImages = {}, entryData = {};

const q = id => document.getElementById(id);
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = iso => { if(!iso) return ''; const [y,m,d]=iso.split('-'); const a=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara']; return `${parseInt(d)} ${a[parseInt(m)-1]} ${y}`; };
const fmtShort = iso => { if(!iso) return ''; const [y,m,d]=iso.split('-'); const a=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara']; return `${parseInt(d)} ${a[parseInt(m)-1]} ${y.slice(2)}`; };
async function api(path,opts={}) { return fetch(SB+path,{...opts,headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json',...(opts.headers||{})}}); }
function showToast(msg,type='success') { const t=q('toast'); t.textContent=msg; t.className='toast show '+type; setTimeout(()=>t.className='toast',2500); }
function openConfirm(title,msg,cb){ q('confirm-title').textContent=title; q('confirm-msg').textContent=msg; confirmCb=cb; q('confirm-overlay').classList.add('open'); }
function closeConfirm(){ q('confirm-overlay').classList.remove('open'); confirmCb=null; }
q('confirm-ok').addEventListener('click',()=>{ if(confirmCb) confirmCb(); closeConfirm(); });

// Room status local storage
const KEY_PREFIX = 'otel_room_';
const roomKey = num => KEY_PREFIX+num;
function getRoomData(num){ try{ return JSON.parse(localStorage.getItem(roomKey(num))||'null'); }catch{ return null; } }
function setRoomData(num,data){ localStorage.setItem(roomKey(num), JSON.stringify(data)); }
function allRooms(){ const a=[]; FLOORS.forEach(f=>{ for(let i=1;i<=f.rooms;i++) a.push(f.prefix*100+i); }); return a; }

// Initialize all rooms as "bos" (empty/white)
function initDemo(){
  allRooms().forEach(n => {
    if(!getRoomData(n)) setRoomData(n, {status:'bos'});
  });
}

function updateStats(){
  const c = {};
  allRooms().forEach(n => {
    const s = getRoomData(n)?.status || 'bos';
    c[s] = (c[s]||0)+1;
  });
  q('cnt-dt').textContent = c['dolu-temiz']||0;
  q('cnt-dk').textContent = c['dolu-kirli']||0;
  q('cnt-co').textContent = (c['cout']||0)+(c['cout-b']||0);
  q('cnt-t').textContent = (c['temiz']||0)+(c['temiz-b']||0);
  q('cnt-k').textContent = (c['kirli']||0)+(c['kirli-b']||0);
  q('cnt-ooi').textContent = c['ooi']||0;
  q('cnt-ar').textContent = c['ariza']||0;
  q('cnt-on').textContent = (c['onaylı']||0)+(c['onaylı-b']||0);
}

async function checkConn(){
  try{
    const r = await api('/rest/v1/entries?select=id&limit=1');
    if(r.ok){ q('conn-dot').classList.add('ok'); q('conn-text').textContent='Bağlantı aktif'; await loadRoomsWithEntries(); }
    else throw 0;
  }catch{ q('conn-text').textContent='Bağlantı yok'; }
}

async function loadRoomsWithEntries(){
  try{
    const r = await api(`/rest/v1/entries?mode=eq.${MODE}&select=room_no`);
    const data = await r.json();
    roomsWithEntries = new Set(data.map(e=>String(e.room_no)));
    renderView();
  }catch(e){}
}

// View switching
function setView(v){ currentView=v; q('btn-grid').classList.toggle('active',v==='grid'); q('btn-list').classList.toggle('active',v==='list'); renderView(); }
function renderView(){
  if(currentView==='grid'){ q('grid-container').classList.remove('hidden'); q('list-container').classList.remove('active'); renderGrid(); }
  else { q('grid-container').classList.add('hidden'); q('list-container').classList.add('active'); renderList(); }
}

function statusClass(s){
  const m = {
    'dolu-temiz':'status-dolu-temiz','dolu-kirli':'status-dolu-kirli','cout':'status-cout','cout-b':'status-cout-b',
    'temiz':'status-temiz','temiz-b':'status-temiz-b','kirli':'status-kirli','kirli-b':'status-kirli-b',
    'ooi':'status-ooi','ariza':'status-ariza','onaylı':'status-onaylı','onaylı-b':'status-onaylı-b','bos':'status-bos'
  };
  return m[s]||'status-bos';
}

function populateFloorFilter(){
  const sel = q('filter-floor');
  sel.innerHTML = '<option value="">Tümü</option>';
  FLOORS.forEach(f=>{ sel.appendChild(new Option(f.label, f.prefix)); });
  const katSel = q('f-kat');
  katSel.innerHTML = '<option value="">Seçin</option>';
  for(let i=1;i<=15;i++) katSel.appendChild(new Option(i+'. Kat', i+'. Kat'));
}

function renderGrid(){
  const fs = q('filter-status').value, ff = q('filter-floor').value, sv = q('search-room').value.trim().toLowerCase();
  const container = q('grid-container');
  container.innerHTML = '';
  FLOORS.forEach(f=>{
    if(ff && parseInt(ff)!==f.prefix) return;
    const sec = document.createElement('div'); sec.className='floor-section';
    sec.innerHTML = `<div class="floor-label">▸ ${f.label}</div>`;
    const grid = document.createElement('div'); grid.className='room-grid';
    for(let i=1;i<=f.rooms;i++){
      const num = f.prefix*100+i;
      const d = getRoomData(num); const status = d?.status || 'bos';
      if(fs && status!==fs){ grid.appendChild(document.createElement('div')); continue; }
      if(sv && !String(num).includes(sv)){ grid.appendChild(document.createElement('div')); continue; }
      const cell = document.createElement('div');
      cell.className = 'room-cell '+statusClass(status);
      cell.textContent = num;
      if(roomsWithEntries.has(String(num))){
        const flag = document.createElement('div'); flag.className='room-flag'; cell.appendChild(flag);
      }
      cell.addEventListener('click', ()=>openPanel(num));
      grid.appendChild(cell);
    }
    sec.appendChild(grid);
    container.appendChild(sec);
  });
}

async function renderList(){
  const wrap = q('list-container');
  wrap.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted)">Yükleniyor...</div>';
  try{
    const res = await api(`/rest/v1/entries?mode=eq.${MODE}&order=checkin_date.desc,room_no.asc&select=id,room_no,checkin_date,category,note,type`);
    allMeterData = await res.json();
    const katSet = new Set();
    allMeterData.forEach(e=>{ if(e.category) e.category.split(',').filter(Boolean).forEach(k=>katSet.add(k.trim())); });
    const ff = q('filter-floor').value, sv = q('search-room').value.trim().toLowerCase();
    const filtered = allMeterData.filter(e=>{
      if(ff && !(e.category||'').includes(ff)) return false;
      if(sv && !String(e.room_no).includes(sv) && !(e.category||'').toLowerCase().includes(sv) && !(e.note||'').toLowerCase().includes(sv)) return false;
      return true;
    });
    if(!filtered.length){ wrap.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Kayıt yok</div>'; return; }

    const pairedCikisIds = new Set(), pairedGirisIds = new Set();
    const gByRoom={}, cByRoom={};
    allMeterData.forEach(e=>{
      if(e.type==='giris'||!e.type){ if(!gByRoom[e.room_no]) gByRoom[e.room_no]=[]; gByRoom[e.room_no].push(e); }
      else{ if(!cByRoom[e.room_no]) cByRoom[e.room_no]=[]; cByRoom[e.room_no].push(e); }
    });
    Object.keys(gByRoom).forEach(rno=>{
      const gl = [...gByRoom[rno]].sort((a,b)=>new Date(a.checkin_date)-new Date(b.checkin_date));
      const cl = [...(cByRoom[rno]||[])].sort((a,b)=>new Date(a.checkin_date)-new Date(b.checkin_date));
      const used = new Set();
      gl.forEach(g=>{ const m = cl.find(c=>!used.has(c.id)&&c.checkin_date>=g.checkin_date); if(m){ used.add(m.id); pairedCikisIds.add(m.id); pairedGirisIds.add(g.id); } });
    });

    let html = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:var(--surface2)"><th style="padding:8px;text-align:left">Oda</th><th>Kat</th><th>Giriş</th><th>Çıkış</th><th style="text-align:right">İşlem</th></tr></thead><tbody>`;
    const shownCikis = new Set();
    filtered.forEach(e=>{
      const isG = e.type==='giris'||!e.type;
      const cats = (e.category||'').split(',').filter(Boolean);
      const kat = cats.length?cats[0]:'—';
      if(isG){
        const paired = pairedGirisIds.has(e.id);
        const cEntry = paired ? (cByRoom[e.room_no]||[]).find(c=>pairedCikisIds.has(c.id)&&c.checkin_date>=e.checkin_date) : null;
        if(cEntry) shownCikis.add(cEntry.id);
        html += `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="openPanel('${e.room_no}')">
          <td style="padding:8px;font-weight:600">${e.room_no}</td><td>${kat}</td><td style="color:#1a5c3a">${fmtShort(e.checkin_date)}</td>
          <td style="color:#b45309">${cEntry?fmtShort(cEntry.checkin_date):'—'}</td>
          <td style="text-align:right">${cEntry?`<button class="btn" style="font-size:11px;padding:4px 8px" onclick="event.stopPropagation();createPairLink('${e.room_no}','${e.checkin_date}','${cEntry.checkin_date}')">Link</button>`:`<button class="ml-cikis-btn" onclick="event.stopPropagation();quickCikis('${e.room_no}','${e.checkin_date}')">Çıkış Yap</button>`}</td>
        </tr>`;
      } else if(!shownCikis.has(e.id)){
        html += `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="openPanel('${e.room_no}')">
          <td style="padding:8px;font-weight:600">${e.room_no}</td><td>${kat}</td><td>—</td><td style="color:#b45309">${fmtShort(e.checkin_date)}</td><td></td></tr>`;
      }
    });
    html += '</tbody></table></div>';
    wrap.innerHTML = html;
  }catch(e){ wrap.innerHTML='<div style="text-align:center;padding:40px">Bağlantı hatası</div>'; }
}

function quickCikis(roomNo, girisDate){
  openPanel(roomNo);
  setTimeout(()=>{

    setEntryType('cikis');

// Panel open/close
function openPanel(num){
  currentRoom = num;
  q('panel-room-num').textContent = num;
  const fl = Math.floor(num/100);
  const fo = FLOORS.find(f=>f.prefix===fl);
  q('panel-floor-label').textContent = fo ? fo.label : fl+'. Kat';
  const d = getRoomData(num)||{};
  q('f-status').value = d.status||'bos';
  resetAddForm();
  switchPanelTab('kayitlar');
  q('panel-overlay').classList.add('open');
  q('room-panel').classList.add('open');
  document.body.style.overflow='hidden';
  loadEntries();
}
function closePanel(){
  q('panel-overlay').classList.remove('open');
  q('room-panel').classList.remove('open');
  document.body.style.overflow='';
  currentRoom = null;
}
function switchPanelTab(t){
  ['kayitlar','ekle','durum'].forEach(x=>{ q('pane-'+x).classList.toggle('active',x===t); q('ptab-'+x).classList.toggle('active',x===t); });
}

// Load entries
async function loadEntries(){
  q('entries-list').innerHTML = '<div style="text-align:center;padding:20px">Yükleniyor...</div>';
  try{
    const r = await api(`/rest/v1/entries?room_no=eq.${currentRoom}&mode=eq.${MODE}&order=checkin_date.desc&select=*`);
    currentEntries = await r.json();
    renderEntries(currentEntries);
  }catch(e){ q('entries-list').innerHTML='<div style="text-align:center;padding:20px">Hata</div>'; }
}

function renderEntries(entries){
  const wrap = q('entries-list');
  if(!entries.length){ wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Kayıt yok</div>'; return; }
  const girisler = entries.filter(e=>e.type==='giris'||!e.type).sort((a,b)=>new Date(a.checkin_date)-new Date(b.checkin_date));
  const cikisler = entries.filter(e=>e.type==='cikis').sort((a,b)=>new Date(a.checkin_date)-new Date(b.checkin_date));
  const usedCikis = new Set();
  let html = '';
  const buildPair = (g,c) => {
    html += `<div style="margin-bottom:12px">${buildEntryCard(g)}${c?buildEntryCard(c):''}</div>`;
  };
  girisler.forEach(g=>{
    const c = cikisler.find(cc=>!usedCikis.has(cc.id)&&cc.checkin_date>=g.checkin_date);
    if(c) usedCikis.add(c.id);
    buildPair(g,c);
  });
  cikisler.filter(c=>!usedCikis.has(c.id)).forEach(c=>{ html += `<div style="margin-bottom:12px">${buildEntryCard(c)}</div>`; });
  wrap.innerHTML = html;
}

function buildEntryCard(entry){
  const isG = entry.type==='giris'||!entry.type;
  const photos = entry.photo_urls||[];
  const cats = (entry.category||'').split(',').filter(Boolean);
  let endeksVal = null;
  cats.forEach(c=>{ if(c.startsWith('endeks:')) endeksVal = c.replace('endeks:',''); });
  const katVal = cats.filter(c=>!c.startsWith('endeks:')).join(', ');

  return `
    <div class="entry-card" id="card-${entry.id}">
      <div class="entry-head" onclick="this.parentElement.querySelector('.entry-body').classList.toggle('open'); this.querySelector('.chevron').classList.toggle('open')">
        <span class="type-badge ${isG?'giris':'cikis'}">${isG?'GİRİŞ':'ÇIKIŞ'}</span>
        <div class="entry-meta">
          <div class="entry-date">${fmtDate(entry.checkin_date)}</div>
          ${endeksVal ? `<div class="entry-note">⚡ ${endeksVal}</div>` : ''}
          ${katVal ? `<div style="font-size:11px;color:var(--muted)">${katVal}</div>` : ''}
        </div>
        <span>📷${photos.length}</span>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="entry-body">
        ${photos.length ? `<div class="img-scroll">${photos.map((u,i)=>`
          <div class="img-thumb" onclick="openLb(${JSON.stringify(photos)}, ${i})"><img src="${u}" loading="lazy"></div>
        `).join('')}</div>` : ''}
        ${entry.note ? `<div style="padding:0 14px 8px;font-size:12px;color:var(--muted)">📝 ${entry.note}</div>` : ''}
        <div class="entry-actions">
          <button class="btn wa-btn" onclick="window.open('https://web.whatsapp.com/','_blank')">WhatsApp</button>
          <button class="btn" onclick="event.stopPropagation(); createEntryLink('${entry.room_no}','${entry.checkin_date}','${entry.type||'giris'}')">Link</button>
          <button class="btn" onclick="event.stopPropagation(); toggleEditPanel('${entry.id}')">Düzenle</button>
          <button class="btn btn-danger" onclick="event.stopPropagation(); deleteEntry('${entry.id}')">Sil</button>
        </div>
        <div class="edit-panel" id="edit-panel-${entry.id}">
          <div class="field"><label>Tarih</label><input type="date" id="edit-date-${entry.id}" value="${entry.checkin_date||''}"></div>
          <div class="field"><label>Endeks</label><input type="number" step="0.01" id="edit-endeks-${entry.id}" value="${endeksVal||''}"></div>
          <div class="field"><label>Kat</label>
            <select id="edit-kat-${entry.id}">
              <option value="">Seçin</option>
              ${Array.from({length:15},(_,i)=>`<option value="${i+1}. Kat" ${katVal.includes((i+1)+'. Kat')?'selected':''}>${i+1}. Kat</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>Not</label><textarea id="edit-note-${entry.id}" rows="2">${entry.note||''}</textarea></div>
          <div class="field"><label>Yeni Fotoğraf Ekle</label><input type="file" id="edit-photos-${entry.id}" accept="image/*" multiple></div>
          <div id="edit-preview-${entry.id}" class="preview-row"></div>
          <button class="btn btn-primary" onclick="saveEdit('${entry.id}')">Değişiklikleri Kaydet</button>
        </div>
      </div>
    </div>
  `;
}

function toggleEditPanel(id){
  const panel = q(`edit-panel-${id}`);
  panel.classList.toggle('open');
}

async function saveEdit(entryId){
  const panel = q(`edit-panel-${entryId}`);
  const date = q(`edit-date-${entryId}`).value;
  const endeks = q(`edit-endeks-${entryId}`).value.trim();
  const kat = q(`edit-kat-${entryId}`).value;
  const note = q(`edit-note-${entryId}`).value.trim();
  let category = kat;
  if(endeks) category = (category?category+',':'')+'endeks:'+endeks;

  const newPhotoInput = q(`edit-photos-${entryId}`);
  let newUrls = [];
  if(newPhotoInput.files.length){
    const compressedFiles = [];
    for(const f of newPhotoInput.files){
      const r = await compressImage(f);
      compressedFiles.push(r.file);
    }
    for(const file of compressedFiles){
      const url = await uploadImg(file, currentRoom);
      newUrls.push(url);
    }
  }

  const entry = currentEntries.find(e=>e.id===entryId);
  if(!entry) return;
  const mergedPhotos = [...(entry.photo_urls||[]), ...newUrls];
  const body = { checkin_date:date, category, note, photo_urls:mergedPhotos };
  try{
    const r = await api(`/rest/v1/entries?id=eq.${entryId}`,{method:'PATCH',body:JSON.stringify(body)});
    if(!r.ok) throw new Error('Güncelleme başarısız');
    showToast('Güncellendi');
    Object.assign(entry, body);
    loadEntries();
    loadRoomsWithEntries();
  }catch(e){ showToast('Hata: '+e.message,'error'); }
}

async function deleteEntry(id){
  openConfirm('Kaydı sil','Bu sayaç kaydı silinecek.', async ()=>{
    try{
      const entry = currentEntries.find(e=>e.id===id);
      const r = await api(`/rest/v1/entries?id=eq.${id}`,{method:'DELETE'});
      if(!r.ok) throw new Error('Silinemedi');
      if(entry && entry.photo_urls){
        for(const url of entry.photo_urls){
          const path = url.split('/object/public/')[1];
          if(path){
            const [bucket,...rest] = path.split('/');
            await fetch(`${SB}/storage/v1/object/${bucket}/${rest.join('/')}`,{method:'DELETE',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).catch(()=>{});
          }
        }
      }
      showToast('Silindi');
      loadEntries();
      await loadRoomsWithEntries();
    }catch(e){ showToast('Hata: '+e.message,'error'); }
  });
}

// Link generation with token storage
async function createEntryLink(roomNo, date, type){
  const token = Array.from(crypto.getRandomValues(new Uint8Array(12))).map(b=>b.toString(36).padStart(2,'0')).join('').slice(0,16);
  await fetch(`${SB}/rest/v1/tokens?room_no=eq.${encodeURIComponent(roomNo)}&mod=eq.${MODE}&entry_date=eq.${encodeURIComponent(date)}&entry_type=eq.${encodeURIComponent(type)}`, {
    method:'DELETE', headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  });
  await fetch(`${SB}/rest/v1/tokens`, {
    method:'POST',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({room_no:roomNo, mod:MODE, token, entry_date:date, entry_type:type})
  });
  const url = `${location.origin+location.pathname}?oda=${encodeURIComponent(roomNo)}&mod=${MODE}&tarih=${encodeURIComponent(date)}&token=${token}&type=${type}`;
  navigator.clipboard.writeText(url).then(()=>showToast('Link kopyalandı!')).catch(()=>prompt('Link:',url));
}
async function createPairLink(roomNo, girisDate, cikisDate){
  const token = Array.from(crypto.getRandomValues(new Uint8Array(12))).map(b=>b.toString(36).padStart(2,'0')).join('').slice(0,16);
  await fetch(`${SB}/rest/v1/tokens?room_no=eq.${encodeURIComponent(roomNo)}&mod=eq.${MODE}&entry_date=eq.${encodeURIComponent(girisDate)}&entry_type=eq.pair`, {
    method:'DELETE', headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  });
  await fetch(`${SB}/rest/v1/tokens`, {
    method:'POST',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({room_no:roomNo, mod:MODE, token, entry_date:girisDate, entry_type:'pair', paired_date:cikisDate})
  });
  const url = `${location.origin+location.pathname}?oda=${encodeURIComponent(roomNo)}&mod=${MODE}&tarih=${encodeURIComponent(girisDate)}&token=${token}&type=pair`;
  navigator.clipboard.writeText(url).then(()=>showToast('Çift link kopyalandı!')).catch(()=>prompt('Link:',url));
}

// Add entry form
function setEntryType(t){ entryType=t; q('btn-giris').className='type-btn'+(t==='giris'?' active-giris':''); q('btn-cikis').className='type-btn'+(t==='cikis'?' active-cikis':''); }
function resetAddForm(){ entryType=null; pendingPhotos=[]; q('btn-giris').className='type-btn'; q('btn-cikis').className='type-btn'; q('f-date').value=today(); q('f-endeks').value=''; q('f-kat').value=''; q('f-note').value=''; q('preview-row').innerHTML=''; q('compress-status').innerHTML=''; q('progress-wrap').classList.remove('show'); }
async function handleFiles(files){
  const se = q('compress-status'); se.innerHTML=''; let to=0, tn=0, cc=0;
  for(const f of files){
    const r = await compressImage(f);
    pendingPhotos.push({file:r.file, url:URL.createObjectURL(r.file)});
    to+=r.origSize; tn+=r.newSize; if(r.compressed) cc++;
  }
  renderPreviews();
  if(cc>0) se.innerHTML = `${cc} fotoğraf sıkıştırıldı · %${Math.round((1-tn/to)*100)} küçüldü`;
  q('f-photos').value='';
}
async function compressImage(file){return new Promise(resolve=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height;const orig=file.size;if(w<=CMAX&&h<=CMAX&&orig<512000){URL.revokeObjectURL(url);resolve({file,compressed:false,origSize:orig,newSize:orig});return}if(w>h){if(w>CMAX){h=Math.round(h*CMAX/w);w=CMAX}}else{if(h>CMAX){w=Math.round(w*CMAX/h);h=CMAX}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);c.toBlob(b=>{resolve({file:new File([b],file.name.replace(/\.[^.]+$/,'.jpg'),{type:'image/jpeg'}),compressed:true,origSize:orig,newSize:b.size})},'image/jpeg',CQ)};img.src=url})}
function renderPreviews(){ q('preview-row').innerHTML = pendingPhotos.map((p,i)=>`<div class="prev-item"><img src="${p.url}"><button class="prev-del" onclick="pendingPhotos.splice(${i},1);renderPreviews()">✕</button></div>`).join(''); }
async function uploadImg(file, roomNo){
  const ext = file.name.split('.').pop();
  const path = `${roomNo||currentRoom}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const r = await fetch(`${SB}/storage/v1/object/${BUCKET}/${path}`,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':file.type,'x-upsert':'true'},body:file});
  if(!r.ok) throw new Error('Yükleme başarısız');
  return `${SB}/storage/v1/object/public/${BUCKET}/${path}`;
}
async function saveEntry(){
  if(!currentRoom||!entryType||!pendingPhotos.length){ showToast('Eksik bilgi','error'); return; }
  const btn = q('save-btn'), lbl = btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="loader"></span>';
  const pw = q('progress-wrap'), pb = q('progress-bar'); pw.classList.add('show'); pb.style.width='0%';
  try{
    const date = q('f-date').value, endeks = q('f-endeks').value.trim(), kat = q('f-kat').value, note = q('f-note').value.trim();
    let category = kat;
    if(endeks) category += (category?',':'')+'endeks:'+endeks;
    const urls = [];
    for(let i=0;i<pendingPhotos.length;i++){ urls.push(await uploadImg(pendingPhotos[i].file)); pb.style.width=Math.round((i+1)/pendingPhotos.length*100)+'%'; }
    const body = {room_no:String(currentRoom), mode:MODE, checkin_date:date, type:entryType, category, note, photo_urls:urls};
    await api('/rest/v1/entries',{method:'POST',body:JSON.stringify(body)});
    showToast('Kayıt oluşturuldu');
    resetAddForm(); switchPanelTab('kayitlar'); loadEntries(); await loadRoomsWithEntries();
  }catch(e){ showToast('Hata: '+e.message,'error'); }
  finally{ btn.disabled=false; btn.innerHTML=lbl; pw.classList.remove('show'); }
}

// Room status save
function saveRoomStatus(){
  if(!currentRoom) return;
  const d = getRoomData(currentRoom)||{};
  d.status = q('f-status').value;
  setRoomData(currentRoom,d);
  renderView(); updateStats();
  showToast('Durum kaydedildi');
}

// Lightbox
function openLb(photos, idx){
  lbImages = photos; lbIndex = idx;
  updateLb();
  q('lb').classList.add('open');
}
function closeLb(){ q('lb').classList.remove('open'); }
function lbMove(d){ lbIndex = Math.max(0, Math.min(lbImages.length-1, lbIndex+d)); updateLb(); }
function updateLb(){
  q('lb-img').src = lbImages[lbIndex];
  q('lb-counter').textContent = `${lbIndex+1} / ${lbImages.length}`;
  q('lb-label').textContent = `Fotoğraf ${lbIndex+1}`;
}

// Drop zone
const dz = q('drop-zone');
dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.style.borderColor='var(--accent)'; });
dz.addEventListener('dragleave', ()=> dz.style.borderColor='');
dz.addEventListener('drop', e=>{ e.preventDefault(); dz.style.borderColor=''; handleFiles(e.dataTransfer.files); });

// ─── TOKEN / READONLY MODULE ───
function showAccessError(){
  // Hide everything except the topbar message
  q('legend').style.display = 'none';
  q('filter-bar').style.display = 'none';
  q('grid-container').style.display = 'none';
  q('list-container').style.display = 'none';
  q('readonly-view').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:32px">
      <div style="font-size:17px;font-weight:500;margin-bottom:8px">Bu sayfaya erişim yok</div>
      <div style="font-size:13px;color:var(--muted)">Geçersiz veya süresi dolmuş link.</div>
    </div>`;
  q('readonly-view').classList.add('active');
}

function buildReadonlyCard(entry, ei, isE) {
  const urls = entry.photo_urls||[];
  entryImages[ei] = urls;
  const cats = (entry.category||'').split(',').filter(Boolean);
  const imgs = urls.map((u,i)=>`<div class="img-thumb" onclick="openLb(${JSON.stringify(urls)},${i})"><img src="${u}" loading="lazy"/></div>`).join('');
  return `
    <div class="entry-card">
      <div class="entry-head" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.chevron').classList.toggle('open')">
        <span class="type-badge ${entry.type==='cikis'?'cikis':'giris'}">${entry.type==='cikis'?'ÇIKIŞ':'GİRİŞ'}</span>
        <div class="entry-meta">
          <div class="entry-date">${fmtDate(entry.checkin_date)}</div>
          ${cats.length ? `<div style="font-size:11px;color:var(--muted)">${cats.join(' · ')}</div>`:''}
        </div>
        <span>📷${urls.length}</span>
        <svg class="chevron open" width="14" height="14" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="entry-body open">
        ${imgs ? `<div class="img-scroll">${imgs}</div>` : '<div style="padding:12px 14px;font-size:13px;color:var(--muted)">Fotoğraf yok</div>'}
        ${entry.note ? `<div style="padding:0 14px 8px;font-size:12px;color:var(--muted)">📝 ${entry.note}</div>` : ''}
      </div>
    </div>`;
}

async function showReadonlyEntry(oda, mod, tarih, entryType) {
  // Hide normal UI, show readonly container
  q('legend').style.display = 'none';
  q('filter-bar').style.display = 'none';
  q('grid-container').style.display = 'none';
  q('list-container').style.display = 'none';
  q('panel-overlay').classList.remove('open');
  q('room-panel').classList.remove('open');
  const rw = q('readonly-view');
  rw.classList.add('active');
  rw.innerHTML = '<div style="text-align:center;padding:40px">Yükleniyor...</div>';

  const label = mod === 'elektrik' ? 'Sayaç' : 'Oda';
  const isE = mod === 'elektrik';
  q('topbar-title').textContent = `${label} ${oda}`;
  q('topbar-sub').textContent = `${fmtDate(tarih)} · Salt okunur`;

  if (entryType === 'pair') {
    const tokenData = await api(`/rest/v1/tokens?token=eq.${encodeURIComponent(_token)}&select=paired_date`).then(r => r.json()).catch(() => []);
    const cikisDate = tokenData[0]?.paired_date;
    if (!cikisDate) { showAccessError(); return; }
    try {
      const [girisData, cikisData] = await Promise.all([
        api(`/rest/v1/entries?room_no=eq.${encodeURIComponent(oda)}&checkin_date=eq.${encodeURIComponent(tarih)}&mode=eq.${encodeURIComponent(mod)}&type=eq.giris`).then(r=>r.json()),
        api(`/rest/v1/entries?room_no=eq.${encodeURIComponent(oda)}&checkin_date=eq.${encodeURIComponent(cikisDate)}&mode=eq.${encodeURIComponent(mod)}&type=eq.cikis`).then(r=>r.json())
      ]);
      const giris = girisData[0];
      const cikis = cikisData[0];
      if (!giris && !cikis) { rw.innerHTML = '<div class="empty">Kayıt bulunamadı</div>'; return; }
      let ei = 0;
      entryImages = {}; entryData = {};
      const totalP = (giris?.photo_urls?.length||0)+(cikis?.photo_urls?.length||0);
      let html = `<div class="room-header" style="margin-bottom:16px"><div class="room-num e">${oda}</div><div class="room-summary"><strong>${label} ${oda}</strong><span>${fmtDate(tarih)} – ${fmtDate(cikisDate)} · ${totalP} fotoğraf · Salt Okunur</span></div></div>`;
      html += '<div class="entries-grid">';
      if(giris) html += buildReadonlyCard(giris, ei++, isE);
      if(cikis) html += buildReadonlyCard(cikis, ei++, isE);
      html += '</div>';
      rw.innerHTML = html;
    } catch(e) { rw.innerHTML = '<div class="empty">Bağlantı hatası</div>'; }
    return;
  }

  // Single entry
  try {
    let url = `/rest/v1/entries?room_no=eq.${encodeURIComponent(oda)}&checkin_date=eq.${encodeURIComponent(tarih)}&mode=eq.${encodeURIComponent(mod)}&order=checkin_date.desc`;
    if (entryType) url += `&type=eq.${encodeURIComponent(entryType)}`;
    const res = await api(url);
    const data = await res.json();
    if (!data.length) { rw.innerHTML = '<div class="empty">Bu tarihe ait kayıt bulunamadı</div>'; return; }
    const totalP = data.reduce((s,e)=>s+(e.photo_urls||[]).length,0);
    let html = `<div class="room-header" style="margin-bottom:16px"><div class="room-num${isE?' e':''}">${oda}</div><div class="room-summary"><strong>${label} ${oda} · ${fmtDate(tarih)}</strong><span>${data.length} kayıt · ${totalP} fotoğraf · Salt Okunur</span></div></div>`;
    let ei = 0;
    entryImages = {}; entryData = {};
    data.forEach(entry => { html += buildReadonlyCard(entry, ei++, isE); });
    rw.innerHTML = html;
  } catch(e) { rw.innerHTML = '<div class="empty">Bağlantı hatası</div>'; }
}

// URL parameter handling
const _p = new URLSearchParams(location.search);
const _oda = _p.get('oda'), _mod = _p.get('mod'), _token = _p.get('token'), _tarih = _p.get('tarih'), _type = _p.get('type');

if (_oda && _token) {
  // Readonly mode: verify token and show entry
  const _m = _mod === 'elektrik' ? 'elektrik' : 'demirbaş';
  mode = _m;
  // Immediately hide the normal UI (except topbar) and show loading
  q('legend').style.display = 'none';
  q('filter-bar').style.display = 'none';
  q('grid-container').style.display = 'none';
  q('list-container').style.display = 'none';
  q('readonly-view').classList.add('active');
  q('topbar-title').textContent = 'Doğrulanıyor...';
  q('topbar-sub').textContent = '';
  // Verify token
  api(`/rest/v1/tokens?token=eq.${encodeURIComponent(_token)}&room_no=eq.${encodeURIComponent(_oda)}&mod=eq.${encodeURIComponent(_m)}&select=id,entry_date,paired_date`)
    .then(r => r.json())
    .then(data => {
      if (!data || !data.length) { showAccessError(); return; }
      const tr = data[0];
      const tarih = _tarih || tr.entry_date || today();
      if (_tarih && tr.entry_date && tr.entry_date !== _tarih) { showAccessError(); return; }
      showReadonlyEntry(_oda, _m, tarih, _type);
    })
    .catch(() => showAccessError());
} else if (_oda && !_token) {
  showAccessError();
} else {
  // Normal initialization
  initDemo();
  populateFloorFilter();
  renderView();
  updateStats();
  checkConn();
}
</script>
